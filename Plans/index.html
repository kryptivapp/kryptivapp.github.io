<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>KRYPTIV · Plans</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp" rel="stylesheet">
<link rel="stylesheet" href="../_shared/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="../_shared/globals.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;border-radius:0!important;}
@import url('');
.mi{font-family:'Material Icons Sharp';font-size:inherit;vertical-align:middle;line-height:1;font-style:normal;display:inline-block;font-feature-settings:'liga';}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes floatY{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}
@keyframes coinSlide{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.15}}

:root{
  --w:#fff;--w2:rgba(255,255,255,.94);--w3:rgba(255,255,255,.76);
  --w4:rgba(255,255,255,.52);--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18);
  --mono:'DM Mono',monospace;--sans:'Space Grotesk',sans-serif;--disp:'Bebas Neue',sans-serif;
}
html,body{background:#000;color:#fff;font-family:var(--sans);height:100%;overflow:hidden;}
#root{height:100vh;overflow:hidden;}

/* Background */
.wall-bg{position:fixed;inset:-4%;background:url('https://i.ibb.co/5X6swM2n/myersalex216-planet-2638122-1920.jpg') center center/cover no-repeat;filter:blur(22px) saturate(.4) brightness(.28);z-index:0;}
.wall-bg::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.55);}

/* Plans layout */
.plans-page{position:fixed;inset:0;overflow-y:auto;overflow-x:hidden;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;z-index:10;}
.plans-page::-webkit-scrollbar{display:none;}
.plan-snap{min-height:100vh;scroll-snap-align:start;display:flex;align-items:center;justify-content:center;padding:66px 24px 40px;}

/* Cards */
.plan-card{width:100%;max-width:500px;background:rgba(0,0,0,.08);backdrop-filter:blur(36px);-webkit-backdrop-filter:blur(36px);border:1px solid rgba(255,255,255,.09);padding:32px;animation:fadeUp .5s ease both;}
.plan-hd{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:4px;}
.plan-nm{font-family:var(--disp);font-size:40px;letter-spacing:3px;line-height:1;}
.plan-pr{font-family:var(--disp);font-size:30px;letter-spacing:1px;}
.plan-desc{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--w4);text-transform:uppercase;margin-bottom:18px;}
.plan-feats{margin-bottom:20px;}
.plan-feat{font-size:12px;color:var(--w3);padding:5px 0;display:flex;align-items:flex-start;gap:8px;line-height:1.5;border-bottom:1px solid rgba(255,255,255,.03);}
.plan-feat .mi{font-size:10px;color:var(--w4);margin-top:2px;flex-shrink:0;}
.plan-cta{width:100%;padding:12px;background:var(--w);border:none;color:#000;font-family:var(--sans);font-weight:700;font-size:10px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;}
.plan-cta:hover{opacity:.85;}
.plan-cta.ghost{background:none;border:1px solid var(--border2);color:var(--w3);}
.plan-cta.ghost:hover{color:var(--w2);border-color:var(--w3);}
.plan-current{width:100%;padding:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.2);color:var(--w2);font-family:var(--mono);font-size:9px;letter-spacing:3px;text-transform:uppercase;text-align:center;}

/* Nav */
.plan-nav{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:14px 22px;background:rgba(0,0,0,.14);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.05);}
.plan-nav-logo{font-family:var(--disp);font-size:18px;letter-spacing:2px;cursor:pointer;color:#fff;}
.plan-dots{display:flex;gap:5px;align-items:center;}
.plan-dot{width:4px;height:4px;background:var(--w4);transition:all .3s;cursor:pointer;}
.plan-dot.on{background:var(--w);width:14px;}
.plan-back{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--w3);cursor:pointer;background:none;border:none;}
.plan-back:hover{color:var(--w);}
.plan-hint{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:7px;letter-spacing:3px;color:var(--w4);text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:3px;animation:floatY 2s ease-in-out infinite;z-index:20;pointer-events:none;}
.plan-hint .mi{font-size:15px;}

/* Payment notification modal */
.pay-modal-bg{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .18s both;}
@media(min-width:600px){.pay-modal-bg{align-items:center;}}
.pay-modal-bd{position:absolute;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(16px);}
.pay-modal{position:relative;z-index:1;background:rgba(8,8,8,.98);border:1px solid var(--border2);border-bottom:none;padding:28px;width:100%;max-width:420px;animation:coinSlide .25s cubic-bezier(.4,0,.2,1) both;}
@media(min-width:600px){.pay-modal{border-bottom:1px solid var(--border2);}}
.pay-modal-icon{font-size:32px;color:var(--w4);display:block;margin-bottom:14px;}
.pay-modal-title{font-family:var(--disp);font-size:28px;letter-spacing:3px;margin-bottom:6px;}
.pay-modal-sub{font-family:var(--mono);font-size:8px;color:var(--w4);letter-spacing:2px;line-height:2;margin-bottom:20px;text-transform:uppercase;}
.pay-modal-plan{padding:14px;border:1px solid var(--border);margin-bottom:16px;}
.pay-modal-plan-nm{font-family:var(--disp);font-size:24px;letter-spacing:2px;margin-bottom:2px;}
.pay-modal-plan-pr{font-family:var(--mono);font-size:11px;color:var(--w3);}
.pay-modal-notify-btn{width:100%;padding:12px;background:var(--w);color:#000;border:none;font-family:var(--sans);font-weight:700;font-size:9px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;margin-bottom:6px;}
.pay-modal-notify-btn:hover{opacity:.85;}
.pay-modal-cancel{width:100%;padding:10px;background:none;border:1px solid var(--border);color:var(--w4);font-family:var(--mono);font-size:8px;letter-spacing:3px;cursor:pointer;transition:all .15s;}
.pay-modal-cancel:hover{border-color:var(--border2);color:var(--w3);}
.pay-modal-success{text-align:center;padding:8px 0;}
.pay-modal-success .mi{font-size:28px;color:rgba(130,255,150,.8);margin-bottom:8px;display:block;}
.pay-modal-success-txt{font-family:var(--mono);font-size:8px;color:rgba(130,255,150,.7);letter-spacing:2px;line-height:2;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

function PaymentModal({plan, onClose}) {
  const [notified, setNotified] = useState(false);
  const [email,    setEmail]    = useState('');

  // Try to pre-fill from saved user
  useEffect(()=>{
    const u = LS.get();
    if (u?.email) setEmail(u.email);
  }, []);

  const notify = () => {
    // Save interest to localStorage
    const interests = JSON.parse(localStorage.getItem('kryptiv_plan_interest')||'[]');
    if (!interests.includes(plan.id)) interests.push(plan.id);
    localStorage.setItem('kryptiv_plan_interest', JSON.stringify(interests));
    setNotified(true);
  };

  return (
    <div className="pay-modal-bg">
      <div className="pay-modal-bd" onClick={onClose}/>
      <div className="pay-modal">
        {notified ? (
          <div className="pay-modal-success">
            <span className="mi">check_circle</span>
            <div className="pay-modal-success-txt">
              GOT IT. WE'LL LET YOU KNOW WHEN<br/>
              {plan.nm} PLAN PAYMENTS ARE LIVE.
            </div>
            <button className="pay-modal-cancel" style={{marginTop:16}} onClick={onClose}>CLOSE</button>
          </div>
        ) : (<>
          <span className="mi pay-modal-icon">credit_card</span>
          <div className="pay-modal-title">PAYMENTS COMING SOON</div>
          <div className="pay-modal-sub">
            We're integrating Stripe for secure<br/>
            subscription payments. Check back soon.
          </div>
          <div className="pay-modal-plan">
            <div className="pay-modal-plan-nm">{plan.nm}</div>
            <div className="pay-modal-plan-pr">{plan.pr} — {plan.desc}</div>
          </div>
          <button className="pay-modal-notify-btn" onClick={notify}>
            NOTIFY ME WHEN AVAILABLE
          </button>
          <button className="pay-modal-cancel" onClick={onClose}>MAYBE LATER</button>
        </>)}
      </div>
    </div>
  );
}

function Plans() {
  const user = LS.get() || {tier:'free'};
  const [active,   setActive]   = useState(0);
  const [payModal, setPayModal] = useState(null); // plan object
  const cRef = useRef(null);
  const TOTAL = PLANS.length;

  useEffect(()=>{
    const el = cRef.current; if(!el) return;
    const fn = ()=> setActive(Math.max(0,Math.min(TOTAL-1,Math.round(el.scrollTop/window.innerHeight))));
    el.addEventListener('scroll',fn,{passive:true});
    return()=>el.removeEventListener('scroll',fn);
  },[]);

  const scrollTo = i => cRef.current?.scrollTo({top:i*window.innerHeight,behavior:'smooth'});

  const selectFree = () => {
    const updated = {...user, tier:'free'};
    LS.set(updated);
    window.location.href = '/Dashboard/';
  };

  return (<>
    <div className="wall-bg"/>
    <div className="plan-nav">
      <div className="plan-nav-logo" onClick={()=>window.location.href='/Dashboard/'}>KRYPTIV</div>
      <div className="plan-dots">
        {Array.from({length:TOTAL},(_,i)=>
          <div key={i} className={`plan-dot${active===i?' on':''}`} onClick={()=>scrollTo(i)}/>
        )}
      </div>
      <button className="plan-back" onClick={()=>window.location.href='/Dashboard/'}>
        <span className="mi">arrow_back</span><span>BACK</span>
      </button>
    </div>

    <div className="plans-page" ref={cRef}>
      {PLANS.map((p,i)=>{
        const isCurrent = user.tier === p.id;
        const isPaid    = p.id !== 'free';
        return (
          <div key={p.id} className="plan-snap">
            <div className="plan-card">
              <div className="plan-hd">
                <div className="plan-nm">{p.nm}</div>
                <div className="plan-pr">{p.pr}</div>
              </div>
              <div className="plan-desc">{p.desc}</div>
              <div className="plan-feats">
                {p.feats.map((f,j)=>(
                  <div key={j} className="plan-feat">
                    <span className="mi">chevron_right</span>{f}
                  </div>
                ))}
              </div>
              {isCurrent
                ? <div className="plan-current">✓ CURRENT PLAN</div>
                : isPaid
                  ? <button className="plan-cta ghost" onClick={()=>setPayModal(p)}>
                      SELECT {p.nm}
                    </button>
                  : <button className="plan-cta" onClick={selectFree}>
                      SELECT FREE
                    </button>
              }
            </div>
          </div>
        );
      })}
    </div>

    <div className="plan-hint">
      <span className="mi">expand_more</span>
      <span>SCROLL</span>
    </div>

    {payModal && <PaymentModal plan={payModal} onClose={()=>setPayModal(null)}/>}
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<Plans/>);
</script>
</body>
</html>
