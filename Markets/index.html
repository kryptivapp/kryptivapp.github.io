<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    const sw=`self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(clients.claim());});
self.addEventListener('fetch',e=>{
  if(e.request.url.includes('api.coingecko.com')||e.request.url.includes('api.binance.com')||e.request.url.includes('api.kraken.com'))return;
  e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));
});`;
    const blob=new Blob([sw],{type:'application/javascript'});
    const url=URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(()=>{});
  });
}
</script>

<!--  STATE GATE  -->
<script>
(function(){
  fetch('../state.txt?_='+Date.now())
    .then(function(r){return r.ok?r.text():null;})
    .then(function(txt){
      if(!txt) return;
      var lines=txt.split('\n');
      for(var i=0;i<lines.length;i++){
        var l=lines[i].trim();
        if(!l||l[0]==='#') continue;
        if(l[0]==='!'&&l.slice(1).toUpperCase()!=='ONLINE') window.location.replace('../msg.html');
        break;
      }
    }).catch(function(){});
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&display=block">
<style>
/* KRYPTIV v14 — SHARED BASE STYLES */
/* 1.3× desktop zoom via root font scaling */
@media (min-width: 769px) {
  html { font-size: 130%; }
  /* Counter-scale so layout doesn't overflow */
  #root { zoom: 1.3; }
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}

:root{
  --w:#fff;
  --w2:rgba(255,255,255,.94);
  --w3:rgba(255,255,255,.76);
  --w4:rgba(255,255,255,.52);
  --w5:rgba(255,255,255,.14);
  --border:rgba(255,255,255,.10);
  --border2:rgba(255,255,255,.18);
  --glass:rgba(0,0,0,.32);
  --glass2:rgba(0,0,0,.18);
  --mono:'DM Mono',monospace;
  --sans:'Space Grotesk',sans-serif;
  --disp:'Bebas Neue',sans-serif;
  --err:rgba(255,100,80,.85);
  --ok:rgba(130,255,150,.70);
  --up:rgba(130,255,150,.90);
  --dn:rgba(255,100,80,.85);
}

html,body{background:#000;color:#fff;font-family:var(--sans);height:100%;overflow:hidden}
#root{height:100vh;overflow:hidden}
@supports(height:100dvh){html,body{height:100dvh}#root{height:100dvh}}

/* Material Icons — force block display so ligature text never shows */
.mi{
  width:20px;height:20px;
  display:inline-block;
  vertical-align:middle;
  flex-shrink:0;
  fill:currentColor;
  user-select:none;
}

::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:var(--border2)}
input:-webkit-autofill{-webkit-box-shadow:0 0 0 100px rgba(0,0,0,0) inset!important;-webkit-text-fill-color:#fff!important}
input,textarea,select{font-family:var(--sans)}

/* WALL */
.wall{position:fixed;inset:-4%;z-index:0;
  background:url('https://i.ibb.co/5X6swM2n/myersalex216-planet-2638122-1920.jpg') center/cover no-repeat;
  will-change:filter,opacity;transition:filter .7s ease,opacity .7s ease}
.wall::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,0,0,.75) 0%,rgba(0,0,0,.35) 55%,rgba(0,0,0,.75) 100%)}
.wall.intro{filter:blur(28px) saturate(0) brightness(.18);opacity:1;animation:wIntro .9s ease forwards}
.wall.clear{filter:blur(0px) saturate(1) brightness(.55);opacity:1}
.wall.plans-bg{filter:blur(22px) saturate(.4) brightness(.28);transition:filter .7s ease}
@media(max-width:768px){.wall{background-position:72% center}}

/* ANIMATIONS */
@keyframes wIntro{0%{filter:blur(28px) saturate(0) brightness(.18)}100%{filter:blur(0px) saturate(1) brightness(.55)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}
@keyframes floatY{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}
@keyframes coinSlide{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes txSlide{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}

/* PAGE TRANSITION OVERLAY */
.page-transition{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#000;gap:14px;
  animation:fadeIn .15s ease both;
  pointer-events:none;
}
.pt-logo{font-family:var(--disp);font-size:48px;letter-spacing:2px;animation:pulse 1.5s ease-in-out infinite}
.pt-bar{width:120px;height:1px;background:rgba(255,255,255,.08);overflow:hidden;position:relative}
.pt-fill{position:absolute;inset:0;background:rgba(255,255,255,.5);
  animation:shimmer 1s ease-in-out infinite;left:-100%}
.pt-txt{font-family:var(--mono);font-size:7px;letter-spacing:5px;color:var(--w4);text-transform:uppercase}

/* LOADING SCREEN */
.loading-screen{position:fixed;inset:0;z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;gap:16px}
.loading-logo{font-family:var(--disp);font-size:clamp(48px,10vw,96px);letter-spacing:-1px;animation:pulse 1.8s ease-in-out infinite}
.loading-sub{font-family:var(--mono);font-size:8px;letter-spacing:6px;color:var(--w4);text-transform:uppercase}
.loading-dots{display:flex;gap:6px;margin-top:8px}
.loading-dots span{width:3px;height:3px;background:var(--w4);animation:pulse 1.2s ease-in-out infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}

/* AUTH */
.auth{position:relative;z-index:10;height:100vh;display:flex;flex-direction:column;justify-content:flex-start;padding:6vh 8vw 0;animation:fadeIn .5s .1s both;overflow-y:auto}
.auth-logo{font-family:var(--disp);font-size:clamp(52px,10vw,110px);line-height:.88;letter-spacing:-1px;margin-bottom:5px}
.auth-tag{font-family:var(--mono);font-size:clamp(9px,1.1vw,12px);letter-spacing:5px;color:var(--w3);text-transform:uppercase;margin-bottom:36px}
.auth-tabs{display:flex;gap:24px;margin-bottom:26px}
.auth-tab{background:none;border:none;color:var(--w4);font-family:var(--mono);font-size:11px;letter-spacing:4px;text-transform:uppercase;cursor:pointer;padding:0 0 6px;position:relative;transition:color .2s}
.auth-tab.on{color:var(--w)}
.auth-tab.on::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--w)}
.auth-modetabs{display:flex;margin-bottom:22px;width:240px}
.auth-modetab{flex:1;padding:7px;background:none;border:1px solid var(--border);color:var(--w4);font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.auth-modetab.on{background:rgba(255,255,255,.08);color:var(--w2);border-color:var(--border2)}
.auth-fields{display:flex;flex-direction:column;gap:18px;width:100%;max-width:300px}
.af{display:flex;flex-direction:column;gap:6px}
.af-lbl{font-family:var(--mono);font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(--w4)}
.af-in{background:none;border:none;border-bottom:1px solid var(--border);color:var(--w);font-size:16px;font-weight:300;padding:8px 0;outline:none;transition:border-color .2s;caret-color:#fff;width:100%}
.af-in:focus{border-bottom-color:var(--border2)}
.af-in::placeholder{color:rgba(255,255,255,.28)}
.af-err{font-family:var(--mono);font-size:8px;color:var(--err);letter-spacing:1px;padding:6px 0;animation:fadeIn .2s both;line-height:1.6}
.af-ok{font-family:var(--mono);font-size:8px;color:var(--ok);letter-spacing:1px;padding:6px 0;animation:fadeIn .2s both}
.auth-btn{width:100%;max-width:300px;padding:13px;background:var(--w);border:none;color:#000;font-family:var(--sans);font-weight:700;font-size:10px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;position:relative;overflow:hidden}
.auth-btn:hover{opacity:.85}
.auth-btn:disabled{opacity:.25;cursor:not-allowed}
.auth-btn::after{content:'';position:absolute;top:0;bottom:0;width:40%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:shimmer 2s infinite}
.auth-skip{width:100%;max-width:300px;padding:11px;background:none;border:1px solid var(--border);color:var(--w4);font-family:var(--mono);font-size:9px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .2s;text-align:center}
.auth-skip:hover{border-color:var(--border2);color:var(--w3)}
.auth-link{font-family:var(--mono);font-size:8px;color:var(--w4);cursor:pointer;letter-spacing:2px;background:none;border:none;text-align:left}
.auth-link:hover{color:var(--w3)}
.kid-reveal{padding:16px 0 4px}
.kid-lbl{font-family:var(--mono);font-size:8px;letter-spacing:4px;color:var(--w4);text-transform:uppercase;margin-bottom:8px}
.kid-val{font-family:var(--disp);font-size:50px;letter-spacing:12px;color:var(--w);line-height:1}
.kid-val .cursor{animation:blink 1s step-end infinite;color:var(--w3)}
.kid-hint{font-size:10px;color:var(--w4);margin-top:6px;font-weight:300}
.plan-sel-row{display:flex;flex-direction:column;gap:8px;max-width:300px}
.plan-sel-opt{padding:10px 14px;border:1px solid var(--border);background:none;color:var(--w4);font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .15s;display:flex;justify-content:space-between;align-items:center}
.plan-sel-opt.on{border-color:var(--w2);color:var(--w2);background:rgba(255,255,255,.06)}
.plan-sel-opt .ps-price{color:var(--w3);font-size:9px}
.plan-sel-opt.on .ps-price{color:var(--w)}
.plan-sel-note{font-family:var(--mono);font-size:7px;color:var(--w4);letter-spacing:1px;line-height:1.8;padding:10px 0}

/* APP SHELL */
.app{position:relative;z-index:10;height:100vh;display:flex;overflow:hidden;animation:fadeIn .4s both}
.sidebar{width:200px;min-width:200px;display:flex;flex-direction:column;border-right:1px solid var(--border);background:rgba(0,0,0,.25);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px)}
@media(max-width:768px){.sidebar{display:none}}
.sb-head{padding:24px 22px 18px}
.sb-logo{font-family:var(--disp);font-size:24px;letter-spacing:3px}
.sb-uid{font-family:var(--mono);font-size:8px;color:var(--w4);letter-spacing:2px;margin-top:4px}
.sb-uid span{color:var(--w3)}
.sb-hr{height:1px;background:rgba(255,255,255,.06);margin:0 22px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-grp{font-family:var(--mono);font-size:7px;letter-spacing:4px;color:var(--w4);text-transform:uppercase;padding:14px 14px 6px}
.nav-it{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:all .15s;font-size:13px;color:var(--w3);position:relative}
.nav-it:hover{color:var(--w);background:rgba(255,255,255,.03)}
.nav-it.on{color:var(--w)}
.nav-it.on::before{content:'';position:absolute;left:0;top:15%;bottom:15%;width:2px;background:var(--w)}
.nav-it .mi{width:16px;height:16px;opacity:.7}
.nav-it.on .mi,.nav-it:hover .mi{opacity:1}
.nav-badge{margin-left:auto;font-family:var(--mono);font-size:7px;border:1px solid var(--border);color:var(--w4);padding:1px 5px;letter-spacing:1px}
.sb-foot{padding:8px;border-top:1px solid rgba(255,255,255,.06)}
.tier-row{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;color:var(--w3)}
.tier-row:hover{color:var(--w)}
.tier-dot{width:5px;height:5px;background:var(--w3)}
.tier-info{flex:1}
.tier-lbl{font-family:var(--mono);font-size:7px;letter-spacing:3px;color:var(--w4);text-transform:uppercase;margin-bottom:1px}
.tier-nm{font-size:12px;font-weight:600}
.sb-logout{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;color:var(--w4);font-size:12px;transition:color .15s}
.sb-logout:hover{color:var(--w3)}
.sb-settings{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;color:var(--w4);font-size:12px;transition:color .15s}
.sb-settings:hover{color:var(--w3)}

/* CONTENT + TOPBAR */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:46px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.20);backdrop-filter:blur(36px);-webkit-backdrop-filter:blur(36px);display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0}
.tb-logo{font-family:var(--disp);font-size:22px;letter-spacing:2px;display:none}
@media(max-width:768px){.tb-logo{display:block}}
.tb-title{font-family:var(--mono);font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--w3);white-space:nowrap}
@media(max-width:768px){.tb-title{display:none}}
.tb-ticker{flex:1;overflow:hidden;position:relative}
.tb-ticker::before,.tb-ticker::after{content:'';position:absolute;top:0;bottom:0;width:28px;z-index:2}
.tb-ticker::before{left:0;background:linear-gradient(to right,rgba(0,0,0,.3),transparent)}
.tb-ticker::after{right:0;background:linear-gradient(to left,rgba(0,0,0,.3),transparent)}
@media(max-width:768px){.tb-ticker{display:none}}
.ticker-track{display:flex;white-space:nowrap;animation:ticker 35s linear infinite}
.tick{display:inline-flex;align-items:center;gap:6px;padding:0 14px;border-right:1px solid var(--border)}
.tick-sym{font-family:var(--mono);font-size:8px;color:var(--w4)}
.tick-pr{font-family:var(--mono);font-size:9px;color:var(--w2)}
.tick-ch{font-family:var(--mono);font-size:8px}
.tick-ch.up{color:var(--up)}
.tick-ch.dn{color:var(--dn)}
.tb-right{display:flex;align-items:center;gap:6px}
.ic-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--w3);cursor:pointer;transition:all .15s}
.ic-btn:hover{border-color:var(--border2);color:var(--w)}
.ic-btn .mi{width:14px;height:14px}
.tier-chip{height:30px;padding:0 10px;font-family:var(--mono);font-size:8px;letter-spacing:3px;border:1px solid var(--border);color:var(--w3);cursor:pointer;background:rgba(255,255,255,.03);display:flex;align-items:center;transition:all .15s}
.tier-chip:hover{border-color:var(--border2);color:var(--w2)}
.main{flex:1;overflow-y:auto;overflow-x:hidden}
.scr{padding:24px 28px;min-height:100%}
@media(max-width:768px){.scr{padding:16px 14px;padding-bottom:90px}}

/* SECTION LABELS */
.s-lbl{font-family:var(--mono);font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(--w4);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.s-lbl::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.05)}
.s-lbl .mi{width:11px;height:11px}
.s-mb{margin-bottom:30px}

/* STAT CELLS */
.stat-row{display:flex;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,.05)}
.stat-cell{flex:1;min-width:90px;padding:14px 16px 14px 0}
.stat-cell+.stat-cell{border-left:1px solid rgba(255,255,255,.05);padding-left:16px}
@media(max-width:500px){.stat-cell{min-width:50%;padding:12px 0}.stat-cell:nth-child(odd){padding-right:8px}.stat-cell:nth-child(even){border-left:1px solid rgba(255,255,255,.05);padding-left:8px}}
.sc-lbl{font-family:var(--mono);font-size:7px;letter-spacing:3px;text-transform:uppercase;color:var(--w4);margin-bottom:5px}
.sc-val{font-family:var(--disp);font-size:26px;letter-spacing:1px;line-height:1;color:var(--w)}
.sc-sub{font-size:11px;color:var(--w3);margin-top:3px}

/* COIN LINES */
.coin-line{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:padding-left .15s;position:relative}
.coin-line:hover{padding-left:8px}
.coin-line:hover::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:rgba(255,255,255,.4)}
.c-rank{font-family:var(--mono);font-size:8px;color:var(--w4);width:24px;flex-shrink:0}
.c-sym{font-family:var(--mono);font-size:12px;color:var(--w);min-width:40px;flex-shrink:0;font-weight:500}
.c-nm{font-size:12px;color:var(--w3);flex:1;min-width:30px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-spark{width:44px;flex-shrink:0;padding:0 3px}
.c-pr{font-family:var(--mono);font-size:12px;color:var(--w);min-width:72px;text-align:right;flex-shrink:0}
.c-ch{font-family:var(--mono);font-size:10px;min-width:54px;text-align:right;flex-shrink:0}
.c-ch.up{color:var(--up)}
.c-ch.dn{color:var(--dn)}
.hl-star{width:20px;flex-shrink:0;font-size:13px;color:var(--w4);text-align:center;cursor:pointer}
.hl-star.on{color:#ffc}
.blurred-row{opacity:.22;pointer-events:none}
.blur-row-spark{filter:blur(4px)}

/* LOCK OVERLAY */
.lock-ov{position:absolute;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:5}
.lock-ov .mi{width:20px;height:20px;color:var(--w3)}
.lock-lbl{font-family:var(--mono);font-size:8px;letter-spacing:3px;color:var(--w4);text-transform:uppercase}
.lock-btn{padding:7px 16px;background:var(--w);color:#000;border:none;font-family:var(--sans);font-weight:700;font-size:8px;letter-spacing:2px;cursor:pointer;margin-top:2px}

/* TABS */
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:20px}
.tab{padding:9px 0;margin-right:24px;font-family:var(--mono);font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--w4);cursor:pointer;position:relative;transition:color .15s}
.tab.on{color:var(--w2)}
.tab.on::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:var(--w2)}

/* BOTTOM NAV */
.botnav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.35);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border-top:1px solid var(--border);z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
@media(max-width:768px){.botnav{display:flex}}
.bn-it{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 2px;cursor:pointer;color:var(--w4);font-family:var(--mono);font-size:6px;letter-spacing:1px;text-transform:uppercase;background:none;border:none;transition:color .15s}
.bn-it.on{color:var(--w2)}
.bn-it .mi{width:18px;height:18px}
.bn-more-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 2px;cursor:pointer;background:none;border:none}
.bn-sq{width:30px;height:30px;border:1px solid var(--border);background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center}
.bn-sq .mi{width:16px;height:16px;color:var(--w3)}
.bn-sq-lbl{font-family:var(--mono);font-size:6px;letter-spacing:1px;text-transform:uppercase;color:var(--w4);margin-top:2px}

/* MOBILE NAV OVERLAY */
.nav-ov{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.85);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);display:flex;flex-direction:column;animation:fadeIn .18s both}
.nav-ov-list{flex:1;display:flex;flex-direction:column;padding:0;overflow-y:auto}
.nav-ov-it{display:flex;align-items:center;gap:14px;padding:18px 28px;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;font-family:var(--sans);font-size:15px;font-weight:400;color:var(--w3);transition:all .12s}
.nav-ov-it:hover,.nav-ov-it.on{background:rgba(255,255,255,.05);color:var(--w)}
.nav-ov-it .mi{width:20px;height:20px;opacity:.7}
.nav-ov-it.on .mi{opacity:1}
.nav-ov-header{padding:20px 28px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between}
.nav-ov-logo{font-family:var(--disp);font-size:22px;letter-spacing:3px}
.nav-ov-close-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:none;color:var(--w3);cursor:pointer}
.nav-ov-close-btn .mi{width:18px;height:18px}

/* COIN DETAIL PANEL */
.coin-detail{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;justify-content:flex-end;animation:fadeIn .2s both}
.cd-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(14px)}
.cd-panel{position:relative;z-index:1;background:rgba(6,6,6,.97);border-top:1px solid var(--border);padding:28px;max-height:90vh;overflow-y:auto;animation:coinSlide .3s cubic-bezier(.4,0,.2,1) both}
@media(min-width:768px){.cd-panel{max-width:540px;margin:0 auto;border:1px solid var(--border);border-bottom:none}}
.cd-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px}
.cd-sym{font-family:var(--disp);font-size:40px;letter-spacing:3px}
.cd-nm{font-family:var(--mono);font-size:8px;color:var(--w4);letter-spacing:3px;margin-top:2px;text-transform:uppercase}
.cd-price{font-family:var(--mono);font-size:22px;color:var(--w);text-align:right}
.cd-ch-big{font-family:var(--mono);font-size:12px;margin-top:3px;text-align:right}
.cd-close{background:none;border:none;color:var(--w3);cursor:pointer}
.cd-close .mi{width:22px;height:22px}
.cd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid rgba(255,255,255,.05);margin-bottom:20px}
.cd-gs{padding:12px 0}
.cd-gs+.cd-gs{border-left:1px solid rgba(255,255,255,.05);padding-left:14px}
.cd-gs-lbl{font-family:var(--mono);font-size:7px;letter-spacing:3px;color:var(--w4);text-transform:uppercase;margin-bottom:4px}
.cd-gs-val{font-family:var(--mono);font-size:14px;color:var(--w)}
.cd-verdict{padding:16px;background:rgba(255,255,255,.04);border:1px solid var(--border);margin-bottom:16px}
.cd-vt{font-family:var(--mono);font-size:7px;letter-spacing:3px;color:var(--w4);text-transform:uppercase;margin-bottom:6px}
.cd-vtxt{font-size:13px;line-height:1.65;color:var(--w2)}
.cd-vdis{font-family:var(--mono);font-size:7px;color:var(--w4);margin-top:8px;letter-spacing:1px}

/* LIVE BADGE */
.live-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:7px;color:rgba(130,255,150,.65);letter-spacing:2px}
.live-dot{width:5px;height:5px;background:rgba(130,255,150,.85);animation:pulse 2s infinite;flex-shrink:0}

/* HERO COIN */
.hero-coin{padding:16px 0 14px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hero-sym{font-family:var(--disp);font-size:clamp(40px,8vw,60px);letter-spacing:3px;line-height:1}
.hero-nm{font-family:var(--mono);font-size:7px;color:var(--w4);letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.hero-right{text-align:right}
.hero-price{font-family:var(--mono);font-size:clamp(20px,4vw,28px);color:var(--w)}
.hero-ch{font-family:var(--mono);font-size:13px;margin-top:3px}
.hero-ch.up{color:var(--up)}
.hero-ch.dn{color:var(--dn)}
.hero-meta{font-family:var(--mono);font-size:9px;color:var(--w4);margin-top:5px;line-height:2}
.change-btn{background:none;border:1px solid var(--border);color:var(--w4);font-family:var(--mono);font-size:7px;letter-spacing:2px;padding:5px 10px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .15s;margin-top:12px}
.change-btn:hover{border-color:var(--border2);color:var(--w3)}
.change-btn .mi{width:11px;height:11px}

/* MOVER ROWS */
.mover-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:padding-left .1s;position:relative}
.mover-row:hover{padding-left:6px}
.mover-row:hover::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:rgba(255,255,255,.3)}
.mover-rank{font-family:var(--mono);font-size:8px;color:var(--w4);width:20px;flex-shrink:0}
.mover-sym{font-family:var(--mono);font-size:12px;font-weight:500;width:52px;flex-shrink:0}
.mover-nm{font-size:12px;color:var(--w3);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mover-price{font-family:var(--mono);font-size:12px;color:var(--w);text-align:right;flex-shrink:0;margin-right:6px}
.mover-ch{font-family:var(--mono);font-size:11px;width:60px;text-align:right;flex-shrink:0}
.mover-ch.up{color:var(--up)}
.mover-ch.dn{color:var(--dn)}

/* MARKET STRIP */
.mkt-strip{display:flex;gap:0;border:1px solid var(--border);margin-bottom:20px;overflow:hidden}
.strip-cell{flex:1;padding:12px 14px;border-right:1px solid var(--border)}
.strip-cell:last-child{border-right:none}
.strip-lbl{font-family:var(--mono);font-size:7px;letter-spacing:2px;color:var(--w4);text-transform:uppercase;margin-bottom:4px}
.strip-val{font-family:var(--mono);font-size:12px;color:var(--w)}
.strip-val.up{color:var(--up)}
.strip-val.dn{color:var(--dn)}

/* PORTFOLIO */
.holding-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:8px}
.h-sym{font-family:var(--mono);font-size:13px;font-weight:500;width:46px;flex-shrink:0}
.h-detail{flex:1;min-width:0}
.h-amt{font-family:var(--mono);font-size:10px;color:var(--w2);margin-bottom:2px}
.h-price{font-family:var(--mono);font-size:8px;color:var(--w4);letter-spacing:1px}
.h-val{font-family:var(--mono);font-size:12px;color:var(--w);width:80px;text-align:right;flex-shrink:0}
.h-pnl{font-family:var(--mono);font-size:11px;width:62px;text-align:right;flex-shrink:0}
.h-pnl.up{color:var(--up)}
.h-pnl.dn{color:var(--dn)}
.h-del{background:none;border:none;color:var(--w4);cursor:pointer;padding:4px;transition:color .15s;flex-shrink:0}
.h-del:hover{color:var(--w3)}
.h-del .mi{width:14px;height:14px}
.add-btn{display:flex;align-items:center;gap:8px;padding:11px 0;font-family:var(--mono);font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--w4);background:none;border:none;cursor:pointer;transition:color .15s;margin-top:8px}
.add-btn:hover{color:var(--w3)}
.add-btn .mi{width:14px;height:14px}
.summary-stat{flex:1;padding:14px 0}
.summary-lbl{font-family:var(--mono);font-size:7px;letter-spacing:3px;color:var(--w4);text-transform:uppercase;margin-bottom:6px}
.summary-val{font-family:var(--disp);font-size:26px;letter-spacing:1px;line-height:1}
.summary-sub{font-size:11px;color:var(--w3);margin-top:3px}
.alloc-bar2{height:2px;display:flex;margin:12px 0 8px;overflow:hidden}
.alloc-seg2{height:100%;transition:width .5s ease}
.alloc-legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.alloc-dot{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:8px;color:var(--w3)}
.alloc-dot span{width:8px;height:8px;flex-shrink:0;display:inline-block}
.empty-state{padding:40px 0;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center}
.empty-icon{width:32px!important;height:32px!important;color:var(--w4)}
.empty-txt{font-family:var(--mono);font-size:8px;color:var(--w4);letter-spacing:2px;line-height:2;text-transform:uppercase}

/* MODAL */
.modal-bg{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn .18s both}
.modal-bd{position:absolute;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(16px)}
.modal-panel{position:relative;z-index:1;background:rgba(6,6,6,.98);border:1px solid var(--border);padding:28px;width:92%;max-width:440px;animation:fadeUp .2s both}
.modal-title{font-family:var(--disp);font-size:24px;letter-spacing:3px;margin-bottom:22px}
.modal-fields{display:flex;flex-direction:column;gap:18px;margin-bottom:22px}
.modal-row{display:flex;gap:16px}
.modal-row .af{flex:1}
.modal-btn{width:100%;padding:12px;background:var(--w);border:none;color:#000;font-family:var(--sans);font-weight:700;font-size:9px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;margin-bottom:8px}
.modal-btn:hover{opacity:.85}
.modal-cancel{width:100%;padding:10px;background:none;border:1px solid var(--border);color:var(--w4);font-family:var(--mono);font-size:8px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.modal-cancel:hover{border-color:var(--border2);color:var(--w3)}
.coin-select-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.cs-btn{padding:5px 10px;background:none;border:1px solid var(--border);color:var(--w4);font-family:var(--mono);font-size:9px;letter-spacing:1px;cursor:pointer;transition:all .12s}
.cs-btn.on{background:rgba(255,255,255,.08);border-color:var(--border2);color:var(--w)}

/* SIMULATOR */
.sim-box{padding:20px;background:rgba(255,255,255,.03);border:1px solid var(--border);margin-bottom:22px}
.sim-title{font-family:var(--mono);font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(--w4);margin-bottom:16px}
.sim-row{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:16px}
.sim-field{flex:1;min-width:100px}
.sim-lbl{font-family:var(--mono);font-size:7px;letter-spacing:3px;text-transform:uppercase;color:var(--w4);margin-bottom:6px}
.sim-in{width:100%;background:none;border-bottom:1px solid var(--border);color:var(--w);font-size:15px;font-weight:300;padding:6px 0;outline:none;caret-color:#fff}
.sim-in:focus{border-bottom-color:var(--border2)}
.sim-sel{width:100%;background:none;border-bottom:1px solid var(--border);color:var(--w);font-size:12px;padding:6px 0;outline:none;appearance:none;cursor:pointer}
.sim-sel option{background:#0a0a0a}
.sim-btn{padding:11px 22px;background:var(--w);border:none;color:#000;font-family:var(--sans);font-weight:700;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .2s}
.sim-btn:hover{opacity:.85}
.sim-result{padding:18px;background:rgba(255,255,255,.04);border:1px solid var(--border);margin-top:16px;animation:fadeUp .3s ease both}
.sim-rh{font-family:var(--disp);font-size:34px;letter-spacing:1px;margin-bottom:5px}
.sim-rs{font-size:13px;line-height:1.7;color:var(--w3);margin-bottom:14px}
.sim-verdict{font-family:var(--mono);font-size:8px;letter-spacing:3px;text-transform:uppercase;padding:5px 12px;display:inline-block}
.sim-verdict.good{border:1px solid rgba(130,255,150,.3);color:var(--up)}
.sim-verdict.bad{border:1px solid rgba(255,100,80,.2);color:var(--dn)}
.sim-dis{font-family:var(--mono);font-size:7px;color:var(--w4);margin-top:10px;letter-spacing:1px;line-height:1.7}

/* COIN PICKER */
.cp-modal{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn .18s both}
.cp-bd{position:absolute;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(16px)}
.cp-panel{position:relative;z-index:1;background:rgba(6,6,6,.98);border:1px solid var(--border);padding:24px;width:92%;max-width:420px;max-height:84vh;display:flex;flex-direction:column;animation:fadeUp .2s both}
.cp-title{font-family:var(--disp);font-size:24px;letter-spacing:3px;margin-bottom:4px}
.cp-sub{font-family:var(--mono);font-size:7px;color:var(--w4);letter-spacing:2px;margin-bottom:16px;line-height:1.8}
.cp-list{overflow-y:auto;flex:1}
.cp-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;transition:padding-left .1s}
.cp-row:hover{padding-left:5px}
.cp-sym{font-family:var(--mono);font-size:13px;font-weight:500;width:54px;flex-shrink:0}
.cp-nm{font-size:12px;color:var(--w3);flex:1}
.cp-pr{font-family:var(--mono);font-size:12px;color:var(--w2);text-align:right;flex-shrink:0;margin-right:8px}
.cp-ch{font-family:var(--mono);font-size:10px;width:58px;text-align:right;flex-shrink:0}
.cp-ch.up{color:var(--up)}
.cp-ch.dn{color:var(--dn)}
.cp-tick{width:18px;text-align:right;flex-shrink:0;font-size:14px}
.cp-close{margin-top:14px;width:100%;padding:10px;background:none;border:1px solid var(--border);color:var(--w4);font-family:var(--mono);font-size:8px;letter-spacing:3px;cursor:pointer;transition:all .15s}
.cp-close:hover{border-color:var(--border2);color:var(--w3)}

/* AI */
.ai-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.ai-header{padding:16px 28px 14px;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;background:rgba(0,0,0,.10)}
@media(max-width:768px){.ai-header{padding:12px 14px 10px}}
.ai-model-row{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.ai-mb{font-family:var(--mono);font-size:8px;letter-spacing:3px;border:1px solid var(--border2);color:var(--w3);padding:3px 9px;text-transform:uppercase}
.ai-dot{width:6px;height:6px;background:var(--up);animation:pulse 2s infinite;flex-shrink:0}
.ai-dis{font-family:var(--mono);font-size:8px;color:var(--w4);letter-spacing:1px;line-height:1.5}
.live-price-row{font-family:var(--mono);font-size:8px;color:rgba(130,255,150,.65);letter-spacing:2px;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.live-price-row .mi{width:8px;height:8px}
.qb-wrap{padding:12px 28px 12px;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0}
@media(max-width:768px){.qb-wrap{padding:10px 14px}}
.qb-lbl{font-family:var(--mono);font-size:7px;letter-spacing:4px;text-transform:uppercase;color:var(--w4);margin-bottom:9px}
.qb-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.preset-btn{padding:7px 12px;background:none;border:1px solid var(--border);color:var(--w4);font-family:var(--mono);font-size:7px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .12s;display:flex;flex-direction:column;gap:2px;text-align:left}
.preset-btn.on{border-color:var(--border2);color:var(--w2);background:rgba(255,255,255,.06)}
.preset-lbl{font-size:8px;font-weight:600;color:inherit}
.coin-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.coin-pill{padding:4px 10px;background:none;border:1px solid var(--border);color:var(--w4);font-family:var(--mono);font-size:8px;letter-spacing:1px;cursor:pointer;transition:all .12s}
.coin-pill.on{background:rgba(255,255,255,.08);border-color:var(--border2);color:var(--w)}
.ask-btn{padding:10px 20px;background:var(--w);border:none;color:#000;font-family:var(--sans);font-weight:700;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .2s}
.ask-btn:hover{opacity:.85}
.ask-btn:disabled{opacity:.3;cursor:not-allowed}
.ai-msgs{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;gap:18px}
@media(max-width:768px){.ai-msgs{padding:14px}}
.msg-wrap{animation:fadeUp .22s ease both}
.msg-meta{font-family:var(--mono);font-size:7px;letter-spacing:3px;color:var(--w4);text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.msg-meta .mi{width:11px;height:11px}
.msg-body{font-size:13px;line-height:1.78;color:var(--w2);font-weight:300;max-width:700px;white-space:pre-wrap}
.msg-body.usr{color:var(--w);font-weight:400}
.thinking{display:flex;gap:5px;padding:4px 0;align-items:center}
.thinking span{width:4px;height:4px;background:var(--w4);animation:pulse 1.2s ease-in-out infinite}
.thinking span:nth-child(2){animation-delay:.2s}
.thinking span:nth-child(3){animation-delay:.4s}
.ai-bar{padding:14px 28px;border-top:1px solid rgba(255,255,255,.05);background:rgba(0,0,0,.15);backdrop-filter:blur(28px);display:flex;gap:12px;align-items:flex-end;flex-shrink:0}
@media(max-width:768px){.ai-bar{padding:10px 14px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0))}}
.ai-in{flex:1;background:none;border:none;border-bottom:1px solid var(--border);color:var(--w);font-size:13px;font-weight:300;padding:8px 0;outline:none;resize:none;min-height:34px;max-height:100px;caret-color:#fff}
.ai-in:focus{border-bottom-color:var(--border2)}
.ai-in::placeholder{color:var(--w4)}
.ai-send{background:none;border:none;color:var(--w3);cursor:pointer;padding:5px;transition:color .15s}
.ai-send:hover{color:var(--w2)}
.ai-send:disabled{opacity:.2;cursor:not-allowed}
.ai-send .mi{width:20px;height:20px}

/* NEWS */
.live-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.live-label{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:8px;letter-spacing:3px;color:var(--w3);text-transform:uppercase}
.filter-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:18px}
.filter-btn{padding:5px 12px;background:none;border:1px solid var(--border);color:var(--w4);font-family:var(--mono);font-size:7px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .12s}
.filter-btn.on{background:rgba(255,255,255,.07);border-color:var(--border2);color:var(--w2)}
.news-it{display:block;padding:16px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:padding-left .15s;position:relative;text-decoration:none;color:inherit}
.news-it:hover{padding-left:8px}
.news-it:hover::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:rgba(255,255,255,.35)}
.news-src{font-family:var(--mono);font-size:7px;letter-spacing:3px;color:var(--w4);text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.news-src .mi{width:9px;height:9px}
.news-ttl{font-size:13px;font-weight:400;line-height:1.55;color:var(--w2);margin-bottom:6px}
.news-meta{display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.news-time{font-family:var(--mono);font-size:7px;color:var(--w4)}
.news-coins{display:flex;gap:4px;flex-wrap:wrap}
.news-coin-tag{font-family:var(--mono);font-size:7px;border:1px solid var(--border);color:var(--w4);padding:1px 5px;letter-spacing:1px}
.news-votes{display:flex;gap:6px;margin-left:auto}
.news-vote{display:flex;align-items:center;gap:3px;font-family:var(--mono);font-size:7px;color:var(--w4)}
.news-vote .mi{width:9px;height:9px}
.news-vote.bull{color:rgba(130,255,150,.5)}
.news-vote.bear{color:rgba(255,100,80,.5)}
.news-err{padding:36px 0;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center}
.news-err-icon{width:32px!important;height:32px!important;color:var(--w4)}
.news-err-txt{font-family:var(--mono);font-size:8px;color:var(--w4);letter-spacing:2px;line-height:2;text-transform:uppercase}
.news-err-retry{padding:9px 20px;background:var(--w);border:none;color:#000;font-family:var(--sans);font-weight:700;font-size:8px;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
.news-loading{display:flex;align-items:center;gap:10px;padding:28px 0;justify-content:center}
.spin-icon{width:20px!important;height:20px!important;color:var(--w4);animation:spin 1s linear infinite}

<script>
/* 
   KRYPTIV v14 · GLOBALS
   Real live prices — CoinGecko → Binance → Kraken
   Caching: sessionStorage (60s TTL)
   Babel cache: localStorage (compiled script cache)
 */

/*  LOCAL STORAGE  */
const LS = {
  get:   ()  => { try { return JSON.parse(localStorage.getItem('kryptiv_u') || 'null'); } catch { return null; } },
  set:   u   => { try { localStorage.setItem('kryptiv_u', JSON.stringify(u)); } catch {} },
  clear: ()  => { try { localStorage.removeItem('kryptiv_u'); } catch {} },
};

/*  CACHE CLEAR (settings)  */
function clearAllCache() {
  try {
    // Clear price cache
    sessionStorage.removeItem('kryptiv_prices');
    // Clear all kryptiv_ keys from localStorage except user account
    const keys = Object.keys(localStorage).filter(k => k.startsWith('kryptiv_') && k !== 'kryptiv_u');
    keys.forEach(k => localStorage.removeItem(k));
    // Clear babel transform cache
    const babelKeys = Object.keys(localStorage).filter(k => k.startsWith('babel-'));
    babelKeys.forEach(k => localStorage.removeItem(k));
    return true;
  } catch { return false; }
}

function nukeEverything() {
  try { localStorage.clear(); sessionStorage.clear(); } catch {}
  window.location.href = '/';
}

/*  COIN MANIFEST  */

/*  UTILITIES  */
function genId() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:5}, ()=>c[Math.floor(Math.random()*c.length)]).join('');
}
const CURRENCY_KEY = 'kryptiv_currency'; // 'usd' | 'eur'
const EUR_RATE     = 0.92; // approx USD→EUR — good enough for display
function getCurrency() { try { return localStorage.getItem(CURRENCY_KEY)||'usd'; } catch { return 'usd'; } }
function setCurrency(v) { try { localStorage.setItem(CURRENCY_KEY,v); } catch {} }
function csym() { return getCurrency()==='eur'?'€':'$'; }
function cval(p) { return getCurrency()==='eur'?p*EUR_RATE:p; }

const fp = p => {
  if (p == null || isNaN(p)) return '—';
  const v = cval(p), s = csym();
  if (v >= 1000) return s + v.toLocaleString('en', {minimumFractionDigits:2, maximumFractionDigits:2});
  if (v >= 1)    return s + v.toFixed(2);
  if (v >= 0.01) return s + v.toFixed(4);
  if (v > 0)     return '~'+s+'1';  // show ~$1 / ~€1 for tiny amounts
  return s + v.toFixed(6);
};
const fc = c => { if (c == null || isNaN(c)) return '—'; const abs = Math.abs(c); const digits = abs < 0.01 ? 6 : abs < 0.1 ? 4 : 2; return (c >= 0 ? '+' : '') + c.toFixed(digits) + '%'; };
const fv = v => {
  if (v == null || isNaN(v)) return '—';
  const val = cval(v), s = csym();
  if (val >= 1e12) return s + (val/1e12).toFixed(2) + 'T';
  if (val >= 1e9)  return s + (val/1e9).toFixed(2) + 'B';
  if (val >= 1e6)  return s + (val/1e6).toFixed(2) + 'M';
  return s + val.toLocaleString('en', {maximumFractionDigits:0});
};
const fbtc = sats => (sats / 1e8).toFixed(6) + ' BTC';

/*  PRICE CACHE  */
const PRICE_CACHE_KEY   = 'kryptiv_prices';
const FLASH_MODE_KEY    = 'kryptiv_flash';
// Normal: 60s live TTL, 5s UI refresh (shows cached). Flash: 5s live TTL.
const LIVE_TTL_NORMAL   = 60_000;
const LIVE_TTL_FLASH    = 5_000;
const UI_TICK_MS        = 5_000;   // always refresh UI display every 5s

function isFlashMode() { try { return localStorage.getItem(FLASH_MODE_KEY)==='1'; } catch { return false; } }
function setFlashMode(on) { try { localStorage.setItem(FLASH_MODE_KEY, on?'1':'0'); } catch {} }

function cgToCoins(data) {
  return data.map((c, i) => ({
    id:    c.id,
    sym:   c.symbol.toUpperCase(),
    name:  c.name,
    price: c.current_price,
    ch:    c.price_change_percentage_24h ?? 0,
    ch1h:  c.price_change_percentage_1h_in_currency ?? null,
    ch7d:  c.price_change_percentage_7d_in_currency ?? null,
    mc:    c.market_cap ? c.market_cap / 1e9 : null,
    vol:   c.total_volume ? c.total_volume / 1e9 : null,
    rank:  c.market_cap_rank ?? (i + 1),
    ath:   c.ath, atl:c.atl, supply:c.circulating_supply,
    hist:  null, _src:'coingecko',
  }));
}

const BINANCE_SYMS = ['BTCUSDT','ETHUSDT','SOLUSDT','BNBUSDT','XRPUSDT',
                      'ADAUSDT','AVAXUSDT','DOTUSDT','LINKUSDT','DOGEUSDT',
                      'UNIUSDT','NEARUSDT','ARBUSDT','OPUSDT'];
const BINANCE_MAP  = {
  'BTCUSDT':'BTC','ETHUSDT':'ETH','SOLUSDT':'SOL','BNBUSDT':'BNB','XRPUSDT':'XRP',
  'ADAUSDT':'ADA','AVAXUSDT':'AVAX','DOTUSDT':'DOT','LINKUSDT':'LINK','DOGEUSDT':'DOGE',
  'UNIUSDT':'UNI','NEARUSDT':'NEAR','ARBUSDT':'ARB','OPUSDT':'OP'
};

async function fetchBinance() {
  const syms = BINANCE_SYMS.map(s => `"${s}"`).join(',');
  const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=[${syms}]`);
  if (!r.ok) throw new Error('Binance ' + r.status);
  const data = await r.json();
  return data.map((t, i) => {
    const sym  = BINANCE_MAP[t.symbol] || t.symbol.replace('USDT','');
    const meta = COIN_LIST.find(c => c.sym === sym) || { id:sym.toLowerCase(), name:sym };
    return { id:meta.id, sym, name:meta.name, price:parseFloat(t.lastPrice),
             ch:parseFloat(t.priceChangePercent), ch1h:null, ch7d:null, mc:null,
             vol:parseFloat(t.quoteVolume)/1e9, rank:i+1, ath:null, atl:null,
             supply:null, hist:null, _src:'binance' };
  }).filter(c => c.price > 0);
}

async function fetchCoinGecko() {
  // Single request for all 15 coins — avoids per-coin API limits
  const ids = COIN_LIST.map(c => c.id).join(',');
  const url = 'https://api.coingecko.com/api/v3/coins/markets' +
    '?vs_currency=usd&ids=' + ids + '&order=market_cap_desc&per_page=15&page=1' +
    '&sparkline=false&price_change_percentage=1h%2C24h%2C7d';
  const r = await fetch(url);
  if (r.status === 429) throw new Error('RATE_LIMITED');
  if (!r.ok) throw new Error('CoinGecko ' + r.status);
  const data = await r.json();
  if (!Array.isArray(data) || !data.length) throw new Error('CoinGecko: empty');
  return cgToCoins(data);
}

async function fetchKraken() {
  const pairs = 'XBTUSD,ETHUSD,SOLUSD,XRPUSD,ADAUSD,LINKUSD,DOGEUSD,UNIUSD,NEARUSD';
  const r = await fetch('https://api.kraken.com/0/public/Ticker?pair=' + pairs);
  if (!r.ok) throw new Error('Kraken ' + r.status);
  const data = await r.json();
  if (data.error?.length) throw new Error('Kraken: ' + data.error[0]);
  const KMAP = {'XXBTZUSD':'BTC','XETHZUSD':'ETH','SOLUSD':'SOL','XXRPZUSD':'XRP',
                'XADAZUSD':'ADA','LINKUSD':'LINK','XDGUSD':'DOGE','UNIUSD':'UNI','NEARUSD':'NEAR'};
  return Object.entries(data.result).map(([pair, t], i) => {
    const sym  = KMAP[pair] || pair.replace('USD','').replace(/^X/,'');
    const meta = COIN_LIST.find(c => c.sym === sym) || { id:sym.toLowerCase(), name:sym };
    const price = parseFloat(t.c[0]);
    const open  = parseFloat(t.o);
    const ch    = open > 0 ? ((price - open) / open) * 100 : 0;
    return { id:meta.id, sym, name:meta.name, price, ch, ch1h:null, ch7d:null, mc:null,
             vol:parseFloat(t.v[1])*price/1e9, rank:i+1, ath:null, atl:null,
             supply:null, hist:null, _src:'kraken' };
  }).filter(c => c.price > 0);
}

// Returns {coins, src, cached, ageMs, rateLimited}
async function fetchLivePrices() {
  const flash = isFlashMode();
  const ttl   = flash ? LIVE_TTL_FLASH : LIVE_TTL_NORMAL;
  try {
    const stored = JSON.parse(sessionStorage.getItem(PRICE_CACHE_KEY) || 'null');
    if (stored && (Date.now() - stored.ts) < ttl) {
      return { coins:stored.coins, src:stored.src, cached:true, ageMs:Date.now()-stored.ts, rateLimited:false };
    }
  } catch {}
  // Try live fetch
  let rateLimited = false;
  try {
    const coins = await fetchCoinGecko();
    sessionStorage.setItem(PRICE_CACHE_KEY, JSON.stringify({ coins, ts:Date.now(), src:'CoinGecko' }));
    return { coins, src:'CoinGecko', cached:false, ageMs:0, rateLimited:false };
  } catch(e) {
    if (e.message === 'RATE_LIMITED') rateLimited = true;
  }
  try {
    const coins = await fetchBinance();
    sessionStorage.setItem(PRICE_CACHE_KEY, JSON.stringify({ coins, ts:Date.now(), src:'Binance' }));
    return { coins, src:'Binance', cached:false, ageMs:0, rateLimited:false };
  } catch {}
  try {
    const coins = await fetchKraken();
    sessionStorage.setItem(PRICE_CACHE_KEY, JSON.stringify({ coins, ts:Date.now(), src:'Kraken' }));
    return { coins, src:'Kraken', cached:false, ageMs:0, rateLimited:false };
  } catch {}
  // If all fail, return last cached even if stale
  try {
    const stored = JSON.parse(sessionStorage.getItem(PRICE_CACHE_KEY) || 'null');
    if (stored) return { coins:stored.coins, src:stored.src, cached:true, ageMs:Date.now()-stored.ts, rateLimited };
  } catch {}
  return { coins:null, src:null, cached:false, ageMs:0, rateLimited };
}

/*  SPARKLINE CACHE  */
const SPARK_CACHE = {};
async function fetchSparkline(coinId) {
  if (SPARK_CACHE[coinId]) return SPARK_CACHE[coinId];
  try {
    const r = await fetch(
      'https://api.coingecko.com/api/v3/coins/' + coinId + '/market_chart?vs_currency=usd&days=7&interval=hourly'
    );
    if (!r.ok) return null;
    const d = await r.json();
    const pts = (d.prices || []).map(p => p[1]);
    if (pts.length > 2) SPARK_CACHE[coinId] = pts;
    return pts.length > 2 ? pts : null;
  } catch { return null; }
}

/*  LIVE PRICE UPDATER  */
let _priceInterval = null;
function startPriceUpdates(onUpdate, onError) {
  async function tick() {
    const result = await fetchLivePrices();
    if (result.coins) {
      window._liveCoins   = result.coins;
      window._priceSource = result.src;
      window._priceAge    = result.ageMs;
      window._rateLimited = result.rateLimited;
      if (onUpdate) onUpdate(result.coins, result.src, result);
    } else {
      if (onError) onError(result.rateLimited);
    }
  }
  tick();
  if (_priceInterval) clearInterval(_priceInterval);
  // Always tick every 5s — uses cache if still fresh, fetches live when cache expires
  _priceInterval = setInterval(tick, UI_TICK_MS);
  return () => clearInterval(_priceInterval);
}

/*  SESSION  */
function getUser()  { return LS.get(); }
function requireAuth() {
  const u = getUser();
  if (!u?.kryptid) { window.location.href = '/'; return null; }
  return u;
}

/*  PAGE NAVIGATE with transition  */
function navigate(path) {
  // Minimal transition — just a thin progress bar, no logo text
  const ov = document.createElement('div');
  ov.className = 'page-transition';
  ov.innerHTML = '<div class="pt-bar" style="position:fixed;top:0;left:0;right:0;width:100%;height:2px;background:rgba(255,255,255,.08)"><div class="pt-fill"></div></div>';
  document.body.appendChild(ov);
  setTimeout(function() { window.location.href = path; }, 180);
}

/*  MEMPOOL (live BTC chain data via Blockchain.info public API)  */
async function fetchMempoolTxs() {
  try {
    // Use blockchain.info unconfirmed transactions (public, CORS-enabled)
    const r = await fetch('https://blockchain.info/unconfirmed-transactions?format=json&cors=true');
    if (!r.ok) throw new Error('blockchain.info ' + r.status);
    const d = await r.json();
    const txs = (d.txs || []).slice(0, 8).map(tx => {
      const outVal = tx.out.reduce((a, o) => a + (o.value || 0), 0);
      return {
        hash: tx.hash,
        shortHash: tx.hash.slice(0,8) + '…' + tx.hash.slice(-6),
        value: outVal,  // in satoshis
        btc: (outVal / 1e8).toFixed(4),
        fee: tx.fee || 0,
        inputs: tx.inputs?.length || 0,
        outputs: tx.out?.length || 0,
        time: tx.time ? new Date(tx.time * 1000) : new Date(),
      };
    });
    return txs;
  } catch(e) {
    // Fallback: blockstream.info
    try {
      const r2 = await fetch('https://blockstream.info/api/mempool/recent');
      if (!r2.ok) throw new Error('blockstream ' + r2.status);
      const txs2 = await r2.json();
      return (txs2 || []).slice(0, 8).map(tx => ({
        hash: tx.txid,
        shortHash: tx.txid.slice(0,8) + '…' + tx.txid.slice(-6),
        value: tx.value || 0,
        btc: ((tx.value || 0) / 1e8).toFixed(4),
        fee: tx.fee || 0,
        inputs: 1, outputs: 1,
        time: new Date(),
      }));
    } catch { return null; }
  }
}

function MI({n, style, className}) {
  const d = ICONS[n];
  if (!d) return null;
  // Convert fontSize to width/height so SVG actually sizes correctly
  const s = style || {};
  const sz = s.fontSize || s.width;
  const svgStyle = {...s};
  if (sz !== undefined) {
    svgStyle.width  = typeof sz === 'number' ? sz + 'px' : sz;
    svgStyle.height = typeof sz === 'number' ? sz + 'px' : sz;
    delete svgStyle.fontSize;
  }
  return (
    <svg viewBox="0 0 24 24" className={'mi' + (className ? ' '+className : '')} style={svgStyle}>
      <path d={d}/>
    </svg>
  );
}

const {useState, useEffect, useRef, useCallback, useMemo} = React;

/*  KRYPTIV CUSTOM SPARK  TV-inspired mini chart with area fill + VWAP band  */
function Spark({prices, ch, w=46, h=20}) {
  const isUp = (ch||0) >= 0;
  const colLine = isUp ? 'rgba(130,255,150,.85)' : 'rgba(255,100,80,.75)';
  const colFill = isUp ? 'rgba(130,255,150,.13)' : 'rgba(255,100,80,.10)';
  const uid = Math.random().toString(36).slice(2,7);

  let vals;
  if (prices && prices.length >= 2) {
    vals = prices.slice(-18).map(p => typeof p === 'number' ? p : p[1]);
  } else {
    // Deterministic placeholder shaped by ch
    const seed = Math.abs(ch||1.3) * 137.5;
    vals = Array.from({length:18}, (_,i) => {
      const t = i/17;
      const trend = (ch||0)/100 * 2 * t;
      const wave  = Math.sin(i*1.1 + seed) * 0.04 + Math.sin(i*2.7 + seed*0.3) * 0.015;
      return 100 + trend + wave;
    });
  }

  const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx - mn || 1;
  const pad = 1;
  const toX = i => pad + (i / (vals.length-1)) * (w - pad*2);
  const toY = v => (h - pad) - ((v - mn) / rng) * (h - pad*2);

  // Catmull-Rom smooth path
  function smoothPath(xs, ys) {
    if (xs.length < 2) return '';
    let d = `M${xs[0].toFixed(1)},${ys[0].toFixed(1)}`;
    for (let i = 0; i < xs.length - 1; i++) {
      const p0x = xs[Math.max(0,i-1)], p0y = ys[Math.max(0,i-1)];
      const p1x = xs[i],   p1y = ys[i];
      const p2x = xs[i+1], p2y = ys[i+1];
      const p3x = xs[Math.min(xs.length-1,i+2)], p3y = ys[Math.min(ys.length-1,i+2)];
      const cp1x = p1x + (p2x-p0x)/6, cp1y = p1y + (p2y-p0y)/6;
      const cp2x = p2x - (p3x-p1x)/6, cp2y = p2y - (p3y-p1y)/6;
      d += ` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2x.toFixed(1)},${p2y.toFixed(1)}`;
    }
    return d;
  }

  const xs = vals.map((_,i) => toX(i));
  const ys = vals.map(v => toY(v));
  const linePath = smoothPath(xs, ys);
  const areaPath = linePath + ` L${xs[xs.length-1].toFixed(1)},${h} L${xs[0].toFixed(1)},${h} Z`;

  // Simple VWAP-style midline (rolling mean of first half vs second half)
  const mid = (mn + mx) / 2;
  const midY = toY(mid).toFixed(1);

  // Last-point dot
  const lx = xs[xs.length-1].toFixed(1);
  const ly = ys[ys.length-1].toFixed(1);

  return (
    <svg width={w} height={h} style={{display:'block',overflow:'visible'}}>
      <defs>
        <linearGradient id={`spfg-${uid}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={colLine} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={colLine} stopOpacity="0"/>
        </linearGradient>
        <clipPath id={`spclip-${uid}`}><rect x="0" y="0" width={w} height={h}/></clipPath>
      </defs>
      {/* Mid reference dashes */}
      <line x1={pad} y1={midY} x2={w-pad} y2={midY}
        stroke={colLine} strokeWidth="0.4" strokeDasharray="2,2" opacity="0.25"
        clipPath={`url(#spclip-${uid})`}/>
      {/* Area fill */}
      <path d={areaPath} fill={`url(#spfg-${uid})`} clipPath={`url(#spclip-${uid})`}/>
      {/* Price line */}
      <path d={linePath} fill="none" stroke={colLine} strokeWidth="1.3"
        clipPath={`url(#spclip-${uid})`}/>
      {/* Live dot */}
      <circle cx={lx} cy={ly} r="1.6" fill={colLine} opacity="0.9"/>
    </svg>
  );
}

/*  KRYPTIV CUSTOM BIGSPARK  Full 7d area chart with bands and volume bars  */
function BigSpark({prices, ch}) {
  const sw=340, sh=76;
  const isUp = (ch||0) >= 0;
  const colLine = isUp ? 'rgba(130,255,150,.85)' : 'rgba(255,100,80,.75)';
  const uid = 'bs' + Math.random().toString(36).slice(2,6);

  let vals;
  if (prices && prices.length >= 2) {
    vals = prices.map(p => typeof p === 'number' ? p : p[1]);
  } else {
    vals = Array.from({length:48}, (_,i) => {
      const t = i/47, base=(ch||0)/100*2;
      return 100 + base*t + Math.sin(i*0.9)*0.05 + Math.sin(i*2.3)*0.02;
    });
  }

  const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx-mn||1;
  const padX=2, padT=6, padB=12;
  const toX = i => padX + (i/(vals.length-1))*(sw-padX*2);
  const toY = v => padT + (1-((v-mn)/rng))*(sh-padT-padB);

  // Smooth path
  function smoothPath(xs, ys) {
    let d = `M${xs[0].toFixed(1)},${ys[0].toFixed(1)}`;
    for (let i=0;i<xs.length-1;i++){
      const p0x=xs[Math.max(0,i-1)],p0y=ys[Math.max(0,i-1)];
      const p1x=xs[i],p1y=ys[i],p2x=xs[i+1],p2y=ys[i+1];
      const p3x=xs[Math.min(xs.length-1,i+2)],p3y=ys[Math.min(ys.length-1,i+2)];
      const c1x=p1x+(p2x-p0x)/6,c1y=p1y+(p2y-p0y)/6;
      const c2x=p2x-(p3x-p1x)/6,c2y=p2y-(p3y-p1y)/6;
      d+=` C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2x.toFixed(1)},${p2y.toFixed(1)}`;
    }
    return d;
  }

  const xs = vals.map((_,i)=>toX(i));
  const ys = vals.map(v=>toY(v));
  const linePath = smoothPath(xs,ys);
  const areaPath = linePath + ` L${xs[xs.length-1].toFixed(1)},${sh} L${xs[0].toFixed(1)},${sh} Z`;

  // Bollinger-style band (rolling 20-period ±1σ)
  const W=20;
  const bands = vals.map((_,i)=>{
    if(i<W-1) return null;
    const slice=vals.slice(i-W+1,i+1);
    const avg=slice.reduce((a,b)=>a+b,0)/W;
    const σ=Math.sqrt(slice.reduce((a,b)=>a+(b-avg)**2,0)/W);
    return {hi:avg+σ, lo:avg-σ, mid:avg};
  }).filter(Boolean);
  const bOff = vals.length - bands.length;
  const bandHiPath = bands.map((b,i)=>`${i===0?'M':'L'}${toX(i+bOff).toFixed(1)},${toY(b.hi).toFixed(1)}`).join(' ');
  const bandLoPath = bands.map((b,i)=>`${i===0?'M':'L'}${toX(i+bOff).toFixed(1)},${toY(b.lo).toFixed(1)}`).join(' ');
  const bandFillPath = bandHiPath + ' ' + bands.map((b,i)=>`L${toX(bands.length-1-i+bOff).toFixed(1)},${toY(bands[bands.length-1-i].lo).toFixed(1)}`).join(' ') + ' Z';

  // Volume-proxy bars (use price delta as volume proxy when no real vol)
  const barCount = Math.min(24, vals.length);
  const step = Math.max(1, Math.floor(vals.length/barCount));
  const volBars = [];
  for(let i=step;i<vals.length;i+=step){
    const delta=Math.abs(vals[i]-vals[i-step]);
    volBars.push({x:toX(i), delta});
  }
  const maxDelta=Math.max(...volBars.map(b=>b.delta),0.0001);
  const barMaxH=8;

  // Grid lines (3 horizontal)
  const gridLevels=[0.25,0.5,0.75].map(t=>({y:toY(mn+t*rng).toFixed(1),v:mn+t*rng}));

  const lx=xs[xs.length-1].toFixed(1), ly=ys[ys.length-1].toFixed(1);
  const lastPrice=vals[vals.length-1];
  const firstPrice=vals[0];
  const pctChange=((lastPrice-firstPrice)/firstPrice*100);

  return (
    <svg viewBox={`0 0 ${sw} ${sh}`} preserveAspectRatio="none"
      style={{width:'100%',display:'block'}}>
      <defs>
        <linearGradient id={`bsfg-${uid}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={colLine} stopOpacity="0.18"/>
          <stop offset="75%" stopColor={colLine} stopOpacity="0.03"/>
          <stop offset="100%" stopColor={colLine} stopOpacity="0"/>
        </linearGradient>
        <linearGradient id={`bsband-${uid}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={colLine} stopOpacity="0.07"/>
          <stop offset="100%" stopColor={colLine} stopOpacity="0.02"/>
        </linearGradient>
        <clipPath id={`bsclip-${uid}`}><rect x="0" y="0" width={sw} height={sh}/></clipPath>
      </defs>

      {/* Horizontal grid lines */}
      {gridLevels.map((g,i)=>(
        <line key={i} x1={padX} y1={g.y} x2={sw-padX} y2={g.y}
          stroke="rgba(255,255,255,.04)" strokeWidth="1"/>
      ))}

      {/* Volume bars at bottom */}
      {volBars.map((b,i)=>{
        const bh = Math.max(1, (b.delta/maxDelta)*barMaxH);
        return <rect key={i} x={b.x-1} y={sh-padB+2+barMaxH-bh}
          width={2} height={bh} fill={colLine} opacity="0.18"
          clipPath={`url(#bsclip-${uid})`}/>;
      })}

      {/* Bollinger band fill */}
      {bands.length>1 && <path d={bandFillPath} fill={`url(#bsband-${uid})`}
        clipPath={`url(#bsclip-${uid})`}/>}
      {/* Bollinger band hi/lo outlines */}
      {bands.length>1 && <>
        <path d={bandHiPath} fill="none" stroke={colLine} strokeWidth="0.5" opacity="0.2"
          strokeDasharray="2,3" clipPath={`url(#bsclip-${uid})`}/>
        <path d={bandLoPath} fill="none" stroke={colLine} strokeWidth="0.5" opacity="0.2"
          strokeDasharray="2,3" clipPath={`url(#bsclip-${uid})`}/>
      </>}

      {/* Area fill */}
      <path d={areaPath} fill={`url(#bsfg-${uid})`} clipPath={`url(#bsclip-${uid})`}/>

      {/* Main price line */}
      <path d={linePath} fill="none" stroke={colLine} strokeWidth="1.5"
        clipPath={`url(#bsclip-${uid})`}/>

      {/* Start price horizontal reference */}
      <line x1={padX} y1={toY(firstPrice).toFixed(1)} x2={sw-padX} y2={toY(firstPrice).toFixed(1)}
        stroke="rgba(255,255,255,.12)" strokeWidth="0.6" strokeDasharray="3,4"/>

      {/* Live dot + ring */}
      <circle cx={lx} cy={ly} r="3.5" fill={colLine} opacity="0.9"/>
      <circle cx={lx} cy={ly} r="6" fill="none" stroke={colLine} strokeWidth="0.8" opacity="0.3"/>

      {/* Price label top-right */}
      <text x={sw-3} y={padT+1} textAnchor="end" dominantBaseline="hanging"
        fill="rgba(255,255,255,.35)" fontSize="6" fontFamily="monospace">
        {pctChange>=0?'+':''}{pctChange.toFixed(2)}%
      </text>
    </svg>
  );
}

/*  TRADING CHART — responsive ResizeObserver, candlestick-style  */
function TradingChart({coinId, coin, range, onRangeChange, showRangeSelector, livePrice}) {
  const [prices,  setPrices]  = useState(null);
  const [volumes, setVolumes] = useState(null);
  const [loading, setLoading] = useState(true);
  const [hover,   setHover]   = useState(null);
  const [isSynth, setIsSynth] = useState(false);
  const [dims,    setDims]    = useState({w:600,h:200});
  const wrapRef = useRef(null);
  const svgRef  = useRef(null);
  const uid     = useRef('tc'+(coinId||'x')+Math.random().toString(36).slice(2,6)).current;

  const RANGES = [
    {id:'1h',  label:'1H',   days:1,  interval:'minutely', last:60  },
    {id:'1d',  label:'24H',  days:1,  interval:'hourly',   last:9999},
    {id:'1m',  label:'1M',   days:30, interval:'daily',    last:9999},
    {id:'1y',  label:'1Y',   days:365,interval:'daily',    last:9999},
  ];
  const activeRange = range || '1d';

  useEffect(()=>{
    if(!wrapRef.current) return;
    const ro = new ResizeObserver(es=>{
      const w=Math.floor(es[0].contentRect.width)||600;
      setDims({w, h:Math.round(w*0.38)});
    });
    ro.observe(wrapRef.current);
    const w=Math.floor(wrapRef.current.offsetWidth)||600;
    setDims({w,h:Math.round(w*0.38)});
    return ()=>ro.disconnect();
  },[]);

  function makeSynth(n) {
    if(!coin||!coin.price) return null;
    const now=Date.now(), base=coin.price;
    const vol=Math.max(0.01,Math.abs(coin.ch||2)/100*0.6);
    let seed=0; for(let c of coinId) seed=(seed*31+c.charCodeAt(0))&0xffff;
    const rng2=i=>{let x=Math.sin(seed+i*9301+49297)*233280;return x-Math.floor(x);};
    const startP=base/(1+(coin.ch||0)/100);
    const drift=(base-startP)/n;
    const pts=[];
    for(let i=0;i<n;i++){
      const z=(rng2(i)-0.5)*2;
      const trend=startP+drift*i;
      const wave=Math.sin(i/n*Math.PI*4+seed*0.1)*base*vol*0.5
                +Math.sin(i/n*Math.PI*9+seed*0.3)*base*vol*0.18;
      pts.push({t:now-(n-i)*60000,v:Math.max(base*0.3,trend+z*base*vol*0.25+wave)});
    }
    pts[pts.length-1]={t:now,v:base};
    return pts;
  }

  useEffect(()=>{
    if(!coinId) return;
    let cancelled=false;
    setLoading(true); setPrices(null); setVolumes(null);
    const r=RANGES.find(x=>x.id===activeRange)||RANGES[1];
    fetch('https://api.coingecko.com/api/v3/coins/'+coinId+'/market_chart?vs_currency=usd&days='+r.days+'&interval='+r.interval)
      .then(res=>{if(res.status===429||!res.ok)throw new Error('fail');return res.json();})
      .then(d=>{
        if(cancelled) return;
        if(!d||!d.prices||d.prices.length<2) throw new Error('empty');
        let pts=d.prices.map(p=>({t:p[0],v:p[1]}));
        let vols=d.total_volumes?d.total_volumes.map(p=>({t:p[0],v:p[1]})):null;
        if(r.last<pts.length){pts=pts.slice(-r.last);if(vols)vols=vols.slice(-r.last);}
        setPrices(pts); setVolumes(vols); setIsSynth(false); setLoading(false);
      })
      .catch(()=>{
        if(cancelled) return;
        const n=r.last<9999?r.last:(r.days>7?90:r.days>1?168:240);
        const s=makeSynth(n);
        if(s){setPrices(s);setVolumes(null);setIsSynth(true);}
        setLoading(false);
      });
    return ()=>{cancelled=true;};
  },[coinId,activeRange]);

  const allPts=useMemo(()=>{
    if(!prices||!prices.length) return prices;
    if(livePrice&&livePrice!==prices[prices.length-1].v)
      return [...prices,{t:Date.now(),v:livePrice}];
    return prices;
  },[prices,livePrice]);

  function handleMove(e){
    if(!allPts||!svgRef.current) return;
    const rect=svgRef.current.getBoundingClientRect();
    const ratio=(e.clientX-rect.left)/rect.width;
    const idx=Math.min(Math.max(0,Math.round(ratio*(allPts.length-1))),allPts.length-1);
    setHover({price:allPts[idx].v,time:allPts[idx].t,idx});
  }

  const W=dims.w, H=dims.h;
  const VOL_H=Math.round(H*0.13);
  const CH=H-VOL_H-4;
  const PAD={l:2,r:2,t:20,b:2};

  if(loading) return <div ref={wrapRef} style={{height:H||160,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--mono)',fontSize:7,color:'var(--w4)',letterSpacing:3}}>LOADING</div>;
  if(!allPts||allPts.length<2) return <div ref={wrapRef} style={{height:H||160,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--mono)',fontSize:7,color:'var(--w4)',letterSpacing:3}}>NO DATA</div>;

  const vals=allPts.map(p=>p.v);
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||mn*0.01||1;
  const toY=v=>PAD.t+(1-((v-mn)/rng))*(CH-PAD.t-PAD.b);
  const toX=i=>PAD.l+(i/(allPts.length-1))*(W-PAD.l-PAD.r);
  const isUp=vals[vals.length-1]>=vals[0];
  const color=isUp?'rgba(130,255,150,.85)':'rgba(255,100,80,.75)';

  // Path
  const step=Math.max(1,Math.floor(allPts.length/200));
  const sp=allPts.filter((_,i)=>i%step===0||i===allPts.length-1);
  const spX=sp.map((_,j)=>{
    const realIdx=j*step; return toX(realIdx<allPts.length?realIdx:allPts.length-1);
  });
  const spY=sp.map(p=>toY(p.v));
  function mkPath(){
    let d=`M${spX[0].toFixed(1)},${spY[0].toFixed(1)}`;
    for(let i=1;i<sp.length;i++){
      const cp=(spX[i]-spX[i-1])*0.18;
      d+=` C${(spX[i-1]+cp).toFixed(1)},${spY[i-1].toFixed(1)} ${(spX[i]-cp).toFixed(1)},${spY[i].toFixed(1)} ${spX[i].toFixed(1)},${spY[i].toFixed(1)}`;
    }
    return d;
  }
  const pathD=mkPath();
  const fillD=pathD+` L${(W-PAD.r).toFixed(1)},${CH} L${PAD.l},${CH} Z`;

  // Peaks/troughs
  const win=Math.max(3,Math.floor(vals.length/8));
  let peaks=[],troughs=[];
  for(let i=win;i<vals.length-win;i++){
    const sl=vals.slice(i-win,i+win+1);
    if(vals[i]===Math.max(...sl)) peaks.push(i);
    if(vals[i]===Math.min(...sl)) troughs.push(i);
  }
  peaks=peaks.sort((a,b)=>vals[b]-vals[a]).slice(0,2);
  troughs=troughs.sort((a,b)=>vals[a]-vals[b]).slice(0,2);

  // Bollinger
  const BW=Math.min(20,Math.max(3,Math.floor(allPts.length/5)));
  const bands=[];
  for(let i=BW-1;i<vals.length;i++){
    const sl=vals.slice(i-BW+1,i+1);
    const avg=sl.reduce((a,b)=>a+b)/BW;
    const sig=Math.sqrt(sl.reduce((a,b)=>a+(b-avg)**2,0)/BW);
    bands.push({i,hi:avg+sig,lo:avg-sig});
  }
  const bStep=Math.max(1,Math.floor(bands.length/80));
  const bS=bands.filter((_,k)=>k%bStep===0||k===bands.length-1);
  const bHi=bS.map((b,k)=>`${k?'L':'M'}${toX(b.i).toFixed(1)},${toY(b.hi).toFixed(1)}`).join('');
  const bLo=bS.map((b,k)=>`${k?'L':'M'}${toX(b.i).toFixed(1)},${toY(b.lo).toFixed(1)}`).join('');
  const bFill=bHi+bS.slice().reverse().map(b=>`L${toX(b.i).toFixed(1)},${toY(b.lo).toFixed(1)}`).join('')+'Z';

  // Volume
  const volSrc=volumes&&volumes.length>=2?volumes.slice(-allPts.length):null;
  const maxVol=volSrc?Math.max(...volSrc.map(v=>v.v),1):1;
  const bw=Math.max(1,(W/allPts.length)*0.5);

  // Grid
  const gridY=[0,.2,.4,.6,.8,1].map(t=>({y:toY(mn+t*rng),v:mn+t*rng}));
  const nX=Math.min(5,allPts.length);
  const gridX=Array.from({length:nX},(_,k)=>({x:(k/(nX-1||1))*(W-PAD.l-PAD.r)+PAD.l,t:allPts[Math.floor((k/(nX-1||1))*(allPts.length-1))].t}));
  const hx=hover?toX(hover.idx):null,hy=hover?toY(hover.price):null;

  function fmtTime(ts){
    const d=new Date(ts);
    if(activeRange==='1y'||activeRange==='1m') return d.toLocaleDateString('en',{month:'short',day:'numeric'});
    return d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',hour12:false});
  }

  return (
    <div ref={wrapRef} style={{position:'relative',width:'100%',userSelect:'none'}}>
      {showRangeSelector&&(
        <div style={{display:'flex',gap:4,marginBottom:8,alignItems:'center'}}>
          {RANGES.map(r=>(
            <button key={r.id} onClick={()=>onRangeChange&&onRangeChange(r.id)}
              style={{padding:'4px 9px',
                background:activeRange===r.id?'rgba(255,255,255,.12)':'none',
