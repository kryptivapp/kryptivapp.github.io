function getVerdict(c) {
  const ch=c.ch||0, ch7=c.ch7d||0;
  const pos = (ch>2?1:0)+(ch7>5?1:0)+((c.ch1h||0)>0.5?1:0);
  if (pos>=2) return {rating:'BULLISH',   color:'rgba(130,255,150,.9)'};
  if (pos===0) return {rating:'BEARISH',  color:'rgba(255,100,80,.85)'};
  return {rating:'NEUTRAL', color:'rgba(255,200,80,.7)'};
}

function CoinDetail({coin, onClose}) {
  const v = getVerdict(coin);
  const [range, setRange] = useState('1m');
  return (
    <div className="coin-detail">
      <div className="cd-backdrop" onClick={onClose}/>
      <div className="cd-panel" style={{maxHeight:'92vh',paddingBottom:28}}>
        <div className="cd-head" style={{marginBottom:14}}>
          <div>
            <div className="cd-sym">{coin.sym}</div>
            <div className="cd-nm" style={{display:'flex',alignItems:'center',gap:8}}>
              {coin.name}{coin.rank?` · #${coin.rank}`:''}
              <span style={{fontFamily:'var(--mono)',fontSize:7,padding:'2px 7px',
                border:'1px solid '+v.color,color:v.color,letterSpacing:2}}>
                {v.rating}
              </span>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'flex-start',gap:16}}>
            <div>
              <div className="cd-price">{fp(coin.price)}</div>
              <div className={`cd-ch-big ${(coin.ch||0)>=0?'up':'dn'}`}>{fc(coin.ch)} 24h</div>
            </div>
            <button className="cd-close" onClick={onClose}><MI n="close"/></button>
          </div>
        </div>

        <div style={{display:'flex',gap:0,borderTop:'1px solid rgba(255,255,255,.05)',
          borderBottom:'1px solid rgba(255,255,255,.05)',marginBottom:16}}>
          {[
            ['1H', coin.ch1h!=null?fc(coin.ch1h):'—', coin.ch1h],
            ['24H', fc(coin.ch), coin.ch],
            ['7D', coin.ch7d!=null?fc(coin.ch7d):'—', coin.ch7d],
            ['MCap', coin.mc?fv(coin.mc*1e9):'—', null],
            ['Vol', coin.vol?fv(coin.vol*1e9):'—', null],
          ].map(([l,val,chg])=>(
            <div key={l} style={{flex:1,padding:'10px 8px 10px 0',borderRight:'1px solid rgba(255,255,255,.05)'}}>
              <div style={{fontFamily:'var(--mono)',fontSize:6,color:'var(--w4)',letterSpacing:2,textTransform:'uppercase',marginBottom:3}}>{l}</div>
              <div style={{fontFamily:'var(--mono)',fontSize:11,
                color:chg!=null?(chg>=0?'rgba(130,255,150,.9)':'rgba(255,100,80,.8)'):'var(--w)'}}>
                {val}
              </div>
            </div>
          ))}
        </div>

        <TradingChart coinId={coin.id} coin={coin} range={range} onRangeChange={setRange}
          height={180} showRangeSelector={true} livePrice={coin.price}/>

        <ProbCalc coin={coin}/>

        <button onClick={()=>navigate('/AI/')} style={{width:'100%',padding:11,background:'var(--w)',
          border:'none',color:'#000',fontFamily:'var(--sans)',fontWeight:700,fontSize:9,
          letterSpacing:3,textTransform:'uppercase',cursor:'pointer',marginTop:14}}>
          ASK AI ABOUT {coin.sym} ▸
        </button>
      </div>
    </div>
  );
}

function Markets({user, coins, availCoins, priceSrc}) {
  const isFree = user.tier==='free';
  const [pinned, setPinned] = useState(function() {
    try { return JSON.parse(localStorage.getItem('kryptiv_pinned')||'["BTC","SOL"]'); } catch { return ['BTC','SOL']; }
  });
  const togglePin = function(sym) {
    setPinned(function(prev) {
      var next = prev.includes(sym) ? prev.filter(function(s){return s!==sym;}) : prev.length < (isFree?2:99) ? prev.concat([sym]) : prev;
      localStorage.setItem('kryptiv_pinned', JSON.stringify(next));
      return next;
    });
  };
  const [query,    setQuery]    = useState('');
  const [detail,   setDetail]   = useState(null);
  const [tab,      setTab]      = useState('all');

  const filtered = useMemo(()=>{
    let list = coins || [];
    if (tab==='top') list = [...list].sort((a,b)=>(b.ch7d||b.ch||0)-(a.ch7d||a.ch||0)).slice(0,5);
    if (tab==='down') list = [...list].sort((a,b)=>(a.ch7d||a.ch||0)-(b.ch7d||b.ch||0)).slice(0,5);
    else list = [...list].sort((a,b)=>(b.ch7d||b.ch||0)-(a.ch7d||a.ch||0));
    if (query) list = list.filter(c=>c.sym.includes(query.toUpperCase())||c.name.toLowerCase().includes(query.toLowerCase()));
    return list;
  }, [coins, tab, query]);

  if (!coins) return null;

  return (
    <div className="scr">
      <div className="s-lbl">
        <MI n="candlestick_chart"/>LIVE MARKETS
        <span className="live-badge" style={{marginLeft:'auto'}}>
          <span className="live-dot"/>LIVE · {priceSrc}
        </span>
      </div>

      <div className="srch-row" style={{display:'flex',alignItems:'center',gap:8,borderBottom:'1px solid rgba(255,255,255,.05)',marginBottom:14,paddingBottom:10}}>
        <MI n="search" style={{fontSize:15,color:'var(--w4)'}}/>
        <input
          style={{flex:1,background:'none',border:'none',color:'var(--w)',fontSize:13,
            fontWeight:300,outline:'none',caretColor:'#fff'}}
          placeholder="Search coins…"
          value={query}
          onChange={e=>setQuery(e.target.value)}
        />
        {query && <MI n="close" style={{fontSize:15,color:'var(--w4)',cursor:'pointer'}} onClick={function(){setQuery('');}}/>}
      </div>

      <div className="tabs">
        {[['all','All'],['top','Top Gainers'],['down','Top Losers']].map(([id,lbl])=>(
          <div key={id} className={`tab${tab===id?' on':''}`} onClick={()=>setTab(id)}>{lbl}</div>
        ))}
      </div>

      <div className="mkt-table-header">
        <div className="mth-rank">#</div>
        <div className="mth-name">COIN</div>
        <div className="mth-spark">7D</div>
        <div className="mth-price">PRICE</div>
        <div className="mth-ch">7D</div>
      </div>

      {filtered.map((c,i)=>{
        const locked = isFree && !FREE_COINS.includes(c.sym);
        const row = (
          <div className="coin-line" onClick={()=>!locked&&setDetail(c)} style={{cursor:locked?'default':'pointer'}}>
            {!locked&&<span className={'hl-star'+(pinned.includes(c.sym)?' on':'')}
              onClick={e=>{e.stopPropagation();togglePin(c.sym);}}>★</span>}
            {locked&&<span className="hl-star" style={{opacity:.3}}>★</span>}
            <div className="c-rank">{c.rank||i+1}</div>
            <div style={{flex:1,display:'flex',alignItems:'center',gap:8,minWidth:0}}>
              <div className="c-sym">{c.sym}</div>
              <div className="c-nm">{c.name}</div>
            </div>
            <div className="c-spark"><Spark ch={c.ch}/></div>
            <div className="c-pr">{fp(c.price)}</div>
            <div className={`c-ch ${(c.ch7d!=null?c.ch7d:c.ch||0)>=0?'up':'dn'}`}>
              {Math.abs(c.ch7d!=null?c.ch7d:(c.ch||0)).toFixed(2)}%
            </div>
          </div>
        );
        if (!locked) return <React.Fragment key={c.id}>{row}</React.Fragment>;
        return (
          <div key={c.id} className="pro-blur-wrap">
            <div className="pro-blur-content">{row}</div>
            <div className="pro-lock-ov">
              <div className="pro-lock-left">
                <MI n="lock" className="pro-lock-icon"/>
                <div className="pro-lock-lbl">BUDGET & PRO</div>
              </div>
              <button className="pro-lock-btn" onClick={()=>navigate('/Plans/')}>UPGRADE</button>
            </div>
          </div>
        );
      })}

      {detail && <CoinDetail coin={detail} onClose={()=>setDetail(null)}/>}
    </div>
  );
}

function Page() {
  const [u, setU] = React.useState(() => LS.get());
  React.useEffect(() => {
    if (!u?.kryptid) { window.location.href = '/'; }
  }, []);
  if (!u?.kryptid) return null;
  return (<>
    <div className="wall clear"/>
    <AppShell user={u} setUser={setU} view="markets">
      <Markets user={u}/>
    </AppShell>
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Page/>);

</script>
</body>
</html>
