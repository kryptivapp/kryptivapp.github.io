<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>KRYPTIV · Markets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   KRYPTIV · SHARED STYLES
═══════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; border-radius:0 !important; }

:root {
  --w:  #fff;
  --w2: rgba(255,255,255,.94);
  --w3: rgba(255,255,255,.76);
  --w4: rgba(255,255,255,.52);
  --w5: rgba(255,255,255,.14);
  --border:  rgba(255,255,255,.10);
  --border2: rgba(255,255,255,.18);
  --glass:  rgba(0,0,0,.32);
  --glass2: rgba(0,0,0,.18);
  --mono: 'DM Mono', monospace;
  --sans: 'Space Grotesk', sans-serif;
  --disp: 'Bebas Neue', sans-serif;
  --err: rgba(255,100,80,.85);
  --ok:  rgba(130,255,150,.70);
}

html, body { background:#000; color:#fff; font-family:var(--sans); height:100%; overflow:hidden; }
#root { height:100vh; overflow:hidden; }
@supports(height:100dvh){
  html,body { height:100dvh; }
  #root { height:100dvh; }
}

/* Material Icons */
.mi {
  font-family: 'Material Icons Sharp';
  font-size: inherit;
  vertical-align: middle;
  line-height: 1;
  font-style: normal;
  display: inline-block;
  font-feature-settings: 'liga';
  -webkit-font-feature-settings: 'liga';
  text-rendering: optimizeLegibility;
}

::-webkit-scrollbar { width:1px; }
::-webkit-scrollbar-thumb { background:var(--border2); }
input:-webkit-autofill { -webkit-box-shadow:0 0 0 100px rgba(0,0,0,0) inset !important; -webkit-text-fill-color:#fff !important; }
input, textarea, select { font-family:var(--sans); }

/* ── WALL / BACKGROUND ── */
.wall {
  position: fixed; inset: -4%; z-index: 0;
  background: url('https://i.ibb.co/5X6swM2n/myersalex216-planet-2638122-1920.jpg') center center / cover no-repeat;
  will-change: filter, opacity;
  transition: filter .7s ease, opacity .7s ease;
}
.wall::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(0,0,0,.72) 0%,rgba(0,0,0,.32) 55%,rgba(0,0,0,.72) 100%); }
.wall.intro    { filter:blur(28px) saturate(0) brightness(.18); opacity:1; animation:wIntro .9s ease forwards; }
.wall.clear    { filter:blur(0px) saturate(1) brightness(.58); opacity:1; }
.wall.plans-bg { filter:blur(22px) saturate(.4) brightness(.28); transition:filter .7s ease; }
@media(max-width:768px){ .wall { background-position: 72% center; } }

@keyframes wIntro {
  0%   { filter:blur(28px) saturate(0) brightness(.18); }
  100% { filter:blur(0px)  saturate(1) brightness(.58); }
}

/* ── ANIMATIONS ── */
@keyframes fadeUp  { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }
@keyframes ticker  { from{transform:translateX(0)} to{transform:translateX(-50%)} }
@keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.15} }
@keyframes blink   { 0%,49%{opacity:1} 50%,100%{opacity:0} }
@keyframes shimmer { 0%{left:-100%} 100%{left:200%} }
@keyframes floatY  { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-5px)} }
@keyframes coinSlide { from{opacity:0;transform:translateY(100%)} to{opacity:1;transform:translateY(0)} }
@keyframes spin    { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

/* ── LOADING ── */
.loading-screen { position:fixed; inset:0; z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000; gap:16px; }
.loading-logo   { font-family:var(--disp); font-size:clamp(48px,10vw,96px); letter-spacing:-1px; animation:pulse 1.8s ease-in-out infinite; }
.loading-sub    { font-family:var(--mono); font-size:8px; letter-spacing:6px; color:var(--w4); text-transform:uppercase; }
.loading-dots   { display:flex; gap:6px; margin-top:8px; }
.loading-dots span { width:3px; height:3px; background:var(--w4); animation:pulse 1.2s ease-in-out infinite; }
.loading-dots span:nth-child(2) { animation-delay:.2s; }
.loading-dots span:nth-child(3) { animation-delay:.4s; }

/* ── AUTH ── */
.auth { position:relative; z-index:10; height:100vh; display:flex; flex-direction:column; justify-content:flex-start; padding:6vh 8vw 0; animation:fadeIn .5s .1s both; overflow-y:auto; }
.auth-logo { font-family:var(--disp); font-size:clamp(52px,10vw,110px); line-height:.88; letter-spacing:-1px; margin-bottom:5px; }
.auth-tag  { font-family:var(--mono); font-size:clamp(9px,1.1vw,12px); letter-spacing:5px; color:var(--w3); text-transform:uppercase; margin-bottom:36px; }
.auth-tabs { display:flex; gap:24px; margin-bottom:26px; }
.auth-tab  { background:none; border:none; color:var(--w4); font-family:var(--mono); font-size:11px; letter-spacing:4px; text-transform:uppercase; cursor:pointer; padding:0 0 6px; position:relative; transition:color .2s; }
.auth-tab.on { color:var(--w); }
.auth-tab.on::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:var(--w); }

.auth-modetabs { display:flex; margin-bottom:22px; width:240px; }
.auth-modetab  { flex:1; padding:7px; background:none; border:1px solid var(--border); color:var(--w4); font-family:var(--mono); font-size:9px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .15s; }
.auth-modetab.on { background:rgba(255,255,255,.08); color:var(--w2); border-color:var(--border2); }

.auth-fields { display:flex; flex-direction:column; gap:18px; width:100%; max-width:300px; }
.af { display:flex; flex-direction:column; gap:6px; }
.af-lbl { font-family:var(--mono); font-size:8px; letter-spacing:4px; text-transform:uppercase; color:var(--w4); }
.af-in  { background:none; border:none; border-bottom:1px solid var(--border); color:var(--w); font-size:16px; font-weight:300; padding:8px 0; outline:none; transition:border-color .2s; caret-color:#fff; width:100%; }
.af-in:focus { border-bottom-color:var(--border2); }
.af-in::placeholder { color:rgba(255,255,255,.28); }
.af-err { font-family:var(--mono); font-size:8px; color:var(--err); letter-spacing:1px; padding:6px 0; animation:fadeIn .2s both; line-height:1.6; }
.af-ok  { font-family:var(--mono); font-size:8px; color:var(--ok);  letter-spacing:1px; padding:6px 0; animation:fadeIn .2s both; }

.auth-btn { width:100%; max-width:300px; padding:13px; background:var(--w); border:none; color:#000; font-family:var(--sans); font-weight:700; font-size:10px; letter-spacing:3px; text-transform:uppercase; cursor:pointer; transition:opacity .2s; position:relative; overflow:hidden; }
.auth-btn:hover    { opacity:.85; }
.auth-btn:disabled { opacity:.25; cursor:not-allowed; }
.auth-btn::after   { content:''; position:absolute; top:0; bottom:0; width:40%; background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent); animation:shimmer 2s infinite; }

.auth-skip { width:100%; max-width:300px; padding:11px; background:none; border:1px solid var(--border); color:var(--w4); font-family:var(--mono); font-size:9px; letter-spacing:3px; text-transform:uppercase; cursor:pointer; transition:all .2s; text-align:center; }
.auth-skip:hover { border-color:var(--border2); color:var(--w3); }

.auth-link  { font-family:var(--mono); font-size:8px; color:var(--w4); cursor:pointer; letter-spacing:2px; background:none; border:none; text-align:left; }
.auth-link:hover { color:var(--w3); }

.kid-reveal { padding:16px 0 4px; }
.kid-lbl { font-family:var(--mono); font-size:8px; letter-spacing:4px; color:var(--w4); text-transform:uppercase; margin-bottom:8px; }
.kid-val  { font-family:var(--disp); font-size:50px; letter-spacing:12px; color:var(--w); line-height:1; }
.kid-val .cursor { animation:blink 1s step-end infinite; color:var(--w3); }
.kid-hint { font-size:10px; color:var(--w4); margin-top:6px; font-weight:300; }

/* Plan selection in signup */
.plan-sel-row { display:flex; flex-direction:column; gap:8px; max-width:300px; }
.plan-sel-opt { padding:10px 14px; border:1px solid var(--border); background:none; color:var(--w4); font-family:var(--mono); font-size:8px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .15s; display:flex; justify-content:space-between; align-items:center; }
.plan-sel-opt.on  { border-color:var(--w2); color:var(--w2); background:rgba(255,255,255,.06); }
.plan-sel-opt .ps-price { color:var(--w3); font-size:9px; }
.plan-sel-opt.on .ps-price { color:var(--w); }
.plan-sel-note { font-family:var(--mono); font-size:7px; color:var(--w4); letter-spacing:1px; line-height:1.8; padding:10px 0; }

/* ── APP SHELL ── */
.app { position:relative; z-index:10; height:100vh; display:flex; overflow:hidden; animation:fadeIn .4s both; }

/* Sidebar */
.sidebar { width:190px; min-width:190px; display:flex; flex-direction:column; border-right:1px solid var(--border); background:rgba(0,0,0,.22); backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px); }
@media(max-width:768px){ .sidebar { display:none; } }
.sb-head { padding:22px 20px 16px; }
.sb-logo { font-family:var(--disp); font-size:22px; letter-spacing:3px; }
.sb-uid  { font-family:var(--mono); font-size:8px; color:var(--w4); letter-spacing:2px; margin-top:4px; }
.sb-uid span { color:var(--w3); }
.sb-hr   { height:1px; background:rgba(255,255,255,.06); margin:0 20px; }
.sb-nav  { flex:1; padding:8px 6px; overflow-y:auto; }
.nav-grp { font-family:var(--mono); font-size:7px; letter-spacing:4px; color:var(--w4); text-transform:uppercase; padding:12px 14px 5px; }
.nav-it  { display:flex; align-items:center; gap:9px; padding:9px 14px; cursor:pointer; transition:all .15s; font-size:12px; color:var(--w3); position:relative; }
.nav-it:hover { color:var(--w); }
.nav-it.on    { color:var(--w); }
.nav-it.on::before { content:''; position:absolute; left:0; top:15%; bottom:15%; width:1px; background:var(--w); }
.nav-it .mi   { font-size:14px; opacity:.7; }
.nav-it.on .mi, .nav-it:hover .mi { opacity:1; }
.nav-badge { margin-left:auto; font-family:var(--mono); font-size:7px; border:1px solid var(--border); color:var(--w4); padding:1px 4px; letter-spacing:1px; }
.sb-foot { padding:8px 6px; border-top:1px solid rgba(255,255,255,.06); }
.tier-row { display:flex; align-items:center; gap:8px; padding:9px 14px; cursor:pointer; color:var(--w3); }
.tier-row:hover { color:var(--w); }
.tier-dot  { width:5px; height:5px; background:var(--w3); }
.tier-info { flex:1; }
.tier-lbl  { font-family:var(--mono); font-size:7px; letter-spacing:3px; color:var(--w4); text-transform:uppercase; margin-bottom:1px; }
.tier-nm   { font-size:11px; font-weight:600; }
.sb-logout { display:flex; align-items:center; gap:8px; padding:8px 14px; cursor:pointer; color:var(--w4); font-size:11px; transition:color .15s; }
.sb-logout:hover { color:var(--w3); }

/* Topbar */
.content { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
.topbar  { height:44px; border-bottom:1px solid var(--border); background:rgba(0,0,0,.18); backdrop-filter:blur(36px); -webkit-backdrop-filter:blur(36px); display:flex; align-items:center; padding:0 16px; gap:12px; flex-shrink:0; }
.tb-logo  { font-family:var(--disp); font-size:20px; letter-spacing:2px; display:none; }
@media(max-width:768px){ .tb-logo { display:block; } }
.tb-title { font-family:var(--mono); font-size:9px; letter-spacing:4px; text-transform:uppercase; color:var(--w3); white-space:nowrap; }
@media(max-width:768px){ .tb-title { display:none; } }
.tb-ticker { flex:1; overflow:hidden; position:relative; }
.tb-ticker::before, .tb-ticker::after { content:''; position:absolute; top:0; bottom:0; width:24px; z-index:2; }
.tb-ticker::before { left:0;  background:linear-gradient(to right,rgba(0,0,0,.25),transparent); }
.tb-ticker::after  { right:0; background:linear-gradient(to left, rgba(0,0,0,.25),transparent); }
@media(max-width:768px){ .tb-ticker { display:none; } }
.ticker-track { display:flex; white-space:nowrap; animation:ticker 35s linear infinite; }
.tick     { display:inline-flex; align-items:center; gap:6px; padding:0 12px; border-right:1px solid var(--border); }
.tick-sym { font-family:var(--mono); font-size:8px; color:var(--w4); }
.tick-pr  { font-family:var(--mono); font-size:9px; color:var(--w2); }
.tick-ch  { font-family:var(--mono); font-size:8px; }
.tick-ch.up { color:var(--w2); }
.tick-ch.dn { color:var(--w4); }
.tb-right { display:flex; align-items:center; gap:5px; }
.ic-btn   { width:28px; height:28px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.04); border:1px solid var(--border); color:var(--w3); cursor:pointer; transition:all .15s; }
.ic-btn:hover { border-color:var(--border2); color:var(--w); }
.ic-btn .mi   { font-size:13px; }
.tier-chip { height:28px; padding:0 9px; font-family:var(--mono); font-size:8px; letter-spacing:3px; border:1px solid var(--border); color:var(--w3); cursor:pointer; background:rgba(255,255,255,.03); display:flex; align-items:center; transition:all .15s; }
.tier-chip:hover { border-color:var(--border2); color:var(--w2); }
.main { flex:1; overflow-y:auto; overflow-x:hidden; }
.scr  { padding:22px 26px; min-height:100%; }
@media(max-width:768px){ .scr { padding:16px 14px; padding-bottom:90px; } }

/* ── SECTION LABELS ── */
.s-lbl { font-family:var(--mono); font-size:8px; letter-spacing:4px; text-transform:uppercase; color:var(--w4); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.s-lbl::after { content:''; flex:1; height:1px; background:rgba(255,255,255,.05); }
.s-lbl .mi { font-size:10px; }
.s-mb { margin-bottom:28px; }

/* ── STAT CELLS ── */
.stat-row  { display:flex; flex-wrap:wrap; border-top:1px solid rgba(255,255,255,.05); }
.stat-cell { flex:1; min-width:90px; padding:14px 16px 14px 0; }
.stat-cell+.stat-cell { border-left:1px solid rgba(255,255,255,.05); padding-left:16px; }
@media(max-width:500px){ .stat-cell { min-width:50%; padding:12px 0; } .stat-cell:nth-child(odd){ padding-right:8px; } .stat-cell:nth-child(even){ border-left:1px solid rgba(255,255,255,.05); padding-left:8px; } }
.sc-lbl { font-family:var(--mono); font-size:7px; letter-spacing:3px; text-transform:uppercase; color:var(--w4); margin-bottom:5px; }
.sc-val { font-family:var(--disp); font-size:24px; letter-spacing:1px; line-height:1; color:var(--w); }
.sc-sub { font-size:10px; color:var(--w3); margin-top:3px; }

/* ── COIN LINES ── */
.coin-line { display:flex; align-items:center; padding:10px 0; border-bottom:1px solid rgba(255,255,255,.04); cursor:pointer; transition:padding-left .15s; position:relative; }
.coin-line:hover { padding-left:8px; }
.coin-line:hover::before { content:''; position:absolute; left:0; top:0; bottom:0; width:1px; background:rgba(255,255,255,.4); }
.c-rank { font-family:var(--mono); font-size:8px; color:var(--w4); width:22px; flex-shrink:0; }
.c-sym  { font-family:var(--mono); font-size:11px; color:var(--w); width:42px; flex-shrink:0; font-weight:500; }
.c-nm   { font-size:11px; color:var(--w3); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.c-spark{ width:46px; flex-shrink:0; padding:0 4px; }
.c-pr   { font-family:var(--mono); font-size:11px; color:var(--w); width:86px; text-align:right; flex-shrink:0; }
.c-ch   { font-family:var(--mono); font-size:10px; width:56px; text-align:right; flex-shrink:0; }
.c-ch.up { color:var(--w2); }
.c-ch.dn { color:var(--w4); }
.hl-star { width:18px; flex-shrink:0; font-size:12px; color:var(--w4); text-align:center; cursor:pointer; }
.hl-star.on { color:#ffc; }
.blurred-row    { opacity:.25; pointer-events:none; }
.blur-row-spark { filter:blur(4px); }

/* ── COIN DETAIL PANEL ── */
.coin-detail { position:fixed; inset:0; z-index:200; display:flex; flex-direction:column; justify-content:flex-end; animation:fadeIn .2s both; }
.cd-backdrop  { position:absolute; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(12px); }
.cd-panel     { position:relative; z-index:1; background:rgba(6,6,6,.96); border-top:1px solid var(--border); padding:24px; max-height:85vh; overflow-y:auto; animation:coinSlide .3s cubic-bezier(.4,0,.2,1) both; }
@media(min-width:768px){ .cd-panel { max-width:500px; margin:0 auto; border:1px solid var(--border); border-bottom:none; } }
.cd-head      { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:20px; }
.cd-sym       { font-family:var(--disp); font-size:36px; letter-spacing:3px; }
.cd-nm        { font-family:var(--mono); font-size:8px; color:var(--w4); letter-spacing:3px; margin-top:2px; text-transform:uppercase; }
.cd-price     { font-family:var(--mono); font-size:20px; color:var(--w); text-align:right; }
.cd-ch-big    { font-family:var(--mono); font-size:11px; margin-top:2px; text-align:right; }
.cd-close     { background:none; border:none; color:var(--w3); cursor:pointer; }
.cd-close .mi { font-size:20px; }
.cd-grid      { display:grid; grid-template-columns:repeat(3,1fr); gap:0; border-top:1px solid rgba(255,255,255,.05); margin-bottom:18px; }
.cd-gs        { padding:10px 0; }
.cd-gs+.cd-gs { border-left:1px solid rgba(255,255,255,.05); padding-left:12px; }
.cd-gs-lbl    { font-family:var(--mono); font-size:7px; letter-spacing:3px; color:var(--w4); text-transform:uppercase; margin-bottom:3px; }
.cd-gs-val    { font-family:var(--mono); font-size:13px; color:var(--w); }
.cd-verdict   { padding:14px; background:rgba(255,255,255,.04); border:1px solid var(--border); margin-bottom:14px; }
.cd-vt        { font-family:var(--mono); font-size:7px; letter-spacing:3px; color:var(--w4); text-transform:uppercase; margin-bottom:6px; }
.cd-vtxt      { font-size:13px; line-height:1.6; color:var(--w2); }
.cd-vdis      { font-family:var(--mono); font-size:7px; color:var(--w4); margin-top:7px; letter-spacing:1px; }
.budget-lock  { display:flex; align-items:center; gap:8px; padding:12px; border:1px solid var(--border); margin-top:8px; }
.budget-lock .mi   { font-size:13px; color:var(--w4); }
.budget-lock-t     { font-size:11px; color:var(--w3); flex:1; }
.budget-lock-cta   { font-family:var(--mono); font-size:8px; letter-spacing:2px; color:var(--w3); cursor:pointer; border:none; background:none; white-space:nowrap; }
.budget-lock-cta:hover { color:var(--w); }

/* ── LOCK OVERLAY ── */
.lock-ov { position:absolute; inset:0; background:rgba(0,0,0,.65); backdrop-filter:blur(8px); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; z-index:5; }
.lock-ov .mi { font-size:20px; color:var(--w3); }
.lock-lbl    { font-family:var(--mono); font-size:8px; letter-spacing:3px; color:var(--w4); text-transform:uppercase; }
.lock-btn    { padding:7px 16px; background:var(--w); color:#000; border:none; font-family:var(--sans); font-weight:700; font-size:8px; letter-spacing:2px; cursor:pointer; margin-top:2px; }

/* ── TABS ── */
.tabs { display:flex; border-bottom:1px solid rgba(255,255,255,.05); margin-bottom:18px; }
.tab  { padding:8px 0; margin-right:22px; font-family:var(--mono); font-size:8px; letter-spacing:3px; text-transform:uppercase; color:var(--w4); cursor:pointer; position:relative; transition:color .15s; }
.tab.on { color:var(--w2); }
.tab.on::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:1px; background:var(--w2); }

/* ── BOTNAV (mobile) ── */
.botnav { display:none; position:fixed; bottom:0; left:0; right:0; background:rgba(0,0,0,.3); backdrop-filter:blur(32px); -webkit-backdrop-filter:blur(32px); border-top:1px solid var(--border); z-index:100; padding-bottom:env(safe-area-inset-bottom,0); }
@media(max-width:768px){ .botnav { display:flex; } }
.bn-it { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 2px; cursor:pointer; color:var(--w4); font-family:var(--mono); font-size:6px; letter-spacing:1px; text-transform:uppercase; background:none; border:none; transition:color .15s; }
.bn-it.on { color:var(--w2); }
.bn-it .mi { font-size:17px; }
.bn-more-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; padding:8px 2px; cursor:pointer; background:none; border:none; }
.bn-sq     { width:30px; height:30px; border:1px solid var(--border); background:rgba(255,255,255,.04); display:flex; align-items:center; justify-content:center; }
.bn-sq .mi { font-size:15px; color:var(--w3); }
.bn-sq-lbl { font-family:var(--mono); font-size:6px; letter-spacing:1px; text-transform:uppercase; color:var(--w4); margin-top:2px; }

/* ── MOBILE NAV OVERLAY (full screen, vertical, blurred bg) ── */
.nav-ov {
  position: fixed; inset: 0; z-index: 150;
  background: rgba(0,0,0,.82);
  backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
  display: flex; flex-direction: column;
  animation: fadeIn .18s both;
}
.nav-ov-list {
  flex: 1; display: flex; flex-direction: column;
  padding: 0; overflow-y: auto;
}
.nav-ov-it {
  display: flex; align-items: center; gap:14px;
  padding: 18px 28px;
  border-bottom: 1px solid rgba(255,255,255,.06);
  cursor: pointer;
  font-family: var(--sans); font-size:15px; font-weight:400;
  color: var(--w3);
  transition: all .12s;
}
.nav-ov-it:hover, .nav-ov-it.on { background:rgba(255,255,255,.05); color:var(--w); }
.nav-ov-it .mi { font-size:20px; opacity:.7; }
.nav-ov-it.on .mi { opacity:1; }
.nav-ov-header {
  padding: 20px 28px 16px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  display: flex; align-items: center; justify-content: space-between;
}
.nav-ov-logo { font-family:var(--disp); font-size:20px; letter-spacing:3px; }
.nav-ov-close-btn {
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
  border:1px solid var(--border); background:none; color:var(--w3); cursor:pointer;
}
.nav-ov-close-btn .mi { font-size:18px; }

/* ── PORTFOLIO ── */
.port-row   { display:flex; align-items:center; padding:11px 0; border-bottom:1px solid rgba(255,255,255,.04); }
.port-asset { flex:1; }
.port-sym   { font-family:var(--mono); font-size:11px; color:var(--w); margin-bottom:2px; }
.port-amt   { font-family:var(--mono); font-size:9px; color:var(--w4); }
.port-val   { font-family:var(--mono); font-size:11px; color:var(--w2); width:80px; text-align:right; flex-shrink:0; }
.port-pnl   { font-family:var(--mono); font-size:10px; width:68px; text-align:right; flex-shrink:0; }
.port-pnl.up { color:var(--w2); }
.port-pnl.dn { color:var(--w4); }
.alloc-bar { display:flex; height:1px; margin:10px 0 6px; }
.alloc-seg { height:100%; background:var(--w); }
.alloc-seg:nth-child(1){ opacity:1;   }
.alloc-seg:nth-child(2){ opacity:.55; }
.alloc-seg:nth-child(3){ opacity:.32; }
.alloc-seg:nth-child(4){ opacity:.20; }
.alloc-seg:nth-child(5){ opacity:.10; }

/* ── PORTFOLIO SIMULATOR ── */
.sim-box    { padding:18px; background:rgba(255,255,255,.03); border:1px solid var(--border); margin-bottom:20px; }
.sim-title  { font-family:var(--mono); font-size:8px; letter-spacing:4px; text-transform:uppercase; color:var(--w4); margin-bottom:14px; }
.sim-row    { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:14px; }
.sim-field  { flex:1; min-width:100px; }
.sim-lbl    { font-family:var(--mono); font-size:7px; letter-spacing:3px; text-transform:uppercase; color:var(--w4); margin-bottom:6px; }
.sim-in     { width:100%; background:none; border-bottom:1px solid var(--border); color:var(--w); font-size:14px; font-weight:300; padding:6px 0; outline:none; caret-color:#fff; }
.sim-in:focus { border-bottom-color:var(--border2); }
.sim-sel    { width:100%; background:none; border-bottom:1px solid var(--border); color:var(--w); font-size:12px; padding:6px 0; outline:none; appearance:none; cursor:pointer; }
.sim-sel option { background:#0a0a0a; }
.sim-btn    { padding:10px 20px; background:var(--w); border:none; color:#000; font-family:var(--sans); font-weight:700; font-size:9px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:opacity .2s; }
.sim-btn:hover { opacity:.85; }
.sim-result { padding:16px; background:rgba(255,255,255,.04); border:1px solid var(--border); margin-top:14px; animation:fadeUp .3s ease both; }
.sim-rh     { font-family:var(--disp); font-size:30px; letter-spacing:1px; margin-bottom:4px; }
.sim-rs     { font-size:12px; color:var(--w3); margin-bottom:12px; line-height:1.6; }
.sim-verdict{ font-family:var(--mono); font-size:8px; letter-spacing:3px; text-transform:uppercase; padding:5px 10px; display:inline-block; }
.sim-verdict.good { border:1px solid rgba(255,255,255,.3); color:var(--w2); }
.sim-verdict.bad  { border:1px solid rgba(255,255,255,.15); color:var(--w4); }
.sim-dis    { font-family:var(--mono); font-size:7px; color:var(--w4); margin-top:9px; letter-spacing:1px; line-height:1.6; }

/* ── RISK BARS ── */
.risk-row  { margin-bottom:11px; }
.risk-hd   { display:flex; justify-content:space-between; font-family:var(--mono); font-size:8px; margin-bottom:4px; }
.risk-lbl  { color:var(--w4); }
.risk-val  { color:var(--w3); }
.risk-track{ height:1px; background:rgba(255,255,255,.07); }
.risk-fill { height:100%; background:var(--w3); transition:width .7s cubic-bezier(.4,0,.2,1); }

/* ── SEARCH ROW ── */
.srch-row { display:flex; align-items:center; gap:8px; border-bottom:1px solid rgba(255,255,255,.05); margin-bottom:14px; padding-bottom:9px; }
.srch-row .mi { font-size:14px; color:var(--w4); }
.srch-in  { flex:1; background:none; border:none; color:var(--w); font-size:12px; font-weight:300; outline:none; caret-color:#fff; }
.srch-in::placeholder { color:var(--w4); }

/* ── PRO BLUR ── */
.pro-blur-wrap    { position:relative; }
.pro-blur-content { filter:blur(4px); pointer-events:none; user-select:none; }
.pro-badge        { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:5; display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center; }
.pro-badge .mi    { font-size:18px; color:var(--w3); }
.pro-badge-lbl    { font-family:var(--mono); font-size:8px; letter-spacing:3px; color:var(--w4); text-transform:uppercase; }
.pro-badge-btn    { padding:6px 14px; background:var(--w); color:#000; border:none; font-family:var(--sans); font-weight:700; font-size:8px; letter-spacing:2px; cursor:pointer; margin-top:2px; }

/* ── DASHBOARD ── */
.alert-row { display:flex; align-items:flex-start; gap:10px; padding:12px 0; border-bottom:1px solid rgba(255,255,255,.04); margin-bottom:20px; }
.a-dot  { width:4px; height:4px; background:var(--w3); flex-shrink:0; margin-top:5px; animation:pulse 2s infinite; }
.a-txt  { font-size:12px; color:var(--w2); font-weight:300; line-height:1.5; }
.a-meta { font-family:var(--mono); font-size:7px; color:var(--w4); margin-top:3px; letter-spacing:2px; }
.insight { padding:14px 0; border-bottom:1px solid rgba(255,255,255,.04); }
.ins-tag { font-family:var(--mono); font-size:7px; letter-spacing:3px; border:1px solid var(--border); color:var(--w3); padding:1px 5px; text-transform:uppercase; display:inline-block; margin-bottom:7px; }
.ins-txt { font-size:12px; line-height:1.7; color:var(--w2); font-weight:300; }
.ins-txt strong { color:var(--w); font-weight:500; }

/* ── AI ── */
.ai-wrap     { display:flex; flex-direction:column; height:100%; overflow:hidden; }
.ai-header   { padding:14px 26px 12px; border-bottom:1px solid rgba(255,255,255,.05); flex-shrink:0; background:rgba(0,0,0,.08); }
@media(max-width:768px){ .ai-header { padding:12px 14px 10px; } }
.ai-model-row{ display:flex; align-items:center; gap:10px; margin-bottom:5px; }
.ai-mb       { font-family:var(--mono); font-size:8px; letter-spacing:3px; border:1px solid var(--border2); color:var(--w3); padding:3px 8px; text-transform:uppercase; }
.ai-dot      { width:5px; height:5px; background:var(--w3); animation:pulse 2s infinite; flex-shrink:0; }
.ai-dis      { font-family:var(--mono); font-size:8px; color:var(--w4); letter-spacing:1px; line-height:1.5; }
.qb-wrap     { padding:10px 26px 10px; border-bottom:1px solid rgba(255,255,255,.05); flex-shrink:0; }
@media(max-width:768px){ .qb-wrap { padding:8px 14px; } }
.qb-lbl      { font-family:var(--mono); font-size:7px; letter-spacing:4px; text-transform:uppercase; color:var(--w4); margin-bottom:7px; }
.qb-row      { display:flex; align-items:center; flex-wrap:wrap; gap:6px; }
.qb-sel      { background:none; border:none; border-bottom:1px solid var(--border2); color:var(--w2); font-family:var(--sans); font-size:12px; outline:none; cursor:pointer; padding:3px 0; appearance:none; -webkit-appearance:none; }
.qb-sel option { background:#0a0a0a; }
.qb-ask      { padding:6px 13px; background:var(--w); border:none; color:#000; font-family:var(--sans); font-weight:700; font-size:8px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:opacity .2s; }
.qb-ask:hover { opacity:.85; }
.ai-msgs     { flex:1; overflow-y:auto; padding:18px 26px; display:flex; flex-direction:column; gap:16px; }
@media(max-width:768px){ .ai-msgs { padding:12px 14px; } }
.msg-wrap    { animation:fadeUp .22s ease both; }
.msg-meta    { font-family:var(--mono); font-size:7px; letter-spacing:3px; color:var(--w4); text-transform:uppercase; margin-bottom:6px; display:flex; align-items:center; gap:5px; }
.msg-meta .mi{ font-size:10px; }
.msg-body    { font-size:13px; line-height:1.75; color:var(--w2); font-weight:300; max-width:680px; white-space:pre-wrap; }
.msg-body.usr{ color:var(--w); font-weight:400; }
@media(max-width:768px){ .msg-body { max-width:100%; } }
.thinking    { display:flex; gap:4px; padding:4px 0; align-items:center; }
.thinking span { width:4px; height:4px; background:var(--w4); animation:pulse 1.2s ease-in-out infinite; }
.thinking span:nth-child(2){ animation-delay:.2s; }
.thinking span:nth-child(3){ animation-delay:.4s; }
.ai-bar      { padding:12px 26px; border-top:1px solid rgba(255,255,255,.05); background:rgba(0,0,0,.12); backdrop-filter:blur(28px); display:flex; gap:10px; align-items:flex-end; flex-shrink:0; }
@media(max-width:768px){ .ai-bar { padding:10px 14px; padding-bottom:calc(10px + env(safe-area-inset-bottom,0)); } }
.ai-in       { flex:1; background:none; border:none; border-bottom:1px solid var(--border); color:var(--w); font-size:13px; font-weight:300; padding:8px 0; outline:none; resize:none; min-height:34px; max-height:90px; caret-color:#fff; }
.ai-in:focus { border-bottom-color:var(--border2); }
.ai-in::placeholder { color:var(--w4); }
.ai-send     { background:none; border:none; color:var(--w3); cursor:pointer; padding:5px; transition:color .15s; }
.ai-send:hover { color:var(--w2); }
.ai-send:disabled { opacity:.2; cursor:not-allowed; }
.ai-send .mi { font-size:18px; }

/* Mobile AI enhancement */
@media(max-width:768px) {
  .ai-wrap { font-size:14px; }
  .msg-body { font-size:14px; line-height:1.8; }
  .ai-header { background:rgba(0,0,0,.25); }
}

/* ── NEWS ── */
.news-it     { padding:15px 0; border-bottom:1px solid rgba(255,255,255,.04); cursor:pointer; transition:padding-left .15s; position:relative; }
.news-it:hover { padding-left:8px; }
.news-it:hover::before { content:''; position:absolute; left:0; top:0; bottom:0; width:1px; background:rgba(255,255,255,.35); }
.news-src    { font-family:var(--mono); font-size:7px; letter-spacing:3px; color:var(--w4); text-transform:uppercase; margin-bottom:5px; display:flex; align-items:center; gap:5px; }
.news-src .mi{ font-size:9px; }
.news-ttl    { font-size:13px; font-weight:400; line-height:1.5; color:var(--w2); margin-bottom:4px; }
.news-time   { font-family:var(--mono); font-size:7px; color:var(--w4); }

/* ── ACCOUNT ── */
.acct-wrap  { padding:26px; max-width:560px; }
@media(max-width:768px){ .acct-wrap { padding:16px 14px; padding-bottom:90px; } }
.acct-hero  { margin-bottom:28px; }
.acct-kid   { font-family:var(--disp); font-size:clamp(44px,8vw,68px); letter-spacing:10px; line-height:1; margin-bottom:4px; }
.acct-name  { font-size:14px; color:var(--w2); font-weight:400; margin-bottom:3px; }
.acct-email { font-family:var(--mono); font-size:9px; color:var(--w4); letter-spacing:2px; }
.acct-card  { padding:16px; background:rgba(255,255,255,.03); border:1px solid var(--border); margin-bottom:4px; }
.acct-row   { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid rgba(255,255,255,.04); }
.acct-row:last-child { border-bottom:none; }
.acct-rl    { font-family:var(--mono); font-size:8px; letter-spacing:2px; color:var(--w4); text-transform:uppercase; }
.acct-rv    { font-size:12px; color:var(--w2); font-family:var(--sans); }
.acct-tier-badge { padding:3px 10px; background:rgba(255,255,255,.07); border:1px solid var(--border2); font-family:var(--mono); font-size:8px; letter-spacing:3px; text-transform:uppercase; color:var(--w2); cursor:pointer; transition:all .15s; }
.acct-tier-badge:hover { background:rgba(255,255,255,.12); }
.acct-locked-section { position:relative; margin-bottom:4px; }
.acct-locked-blur    { filter:blur(4px); pointer-events:none; user-select:none; }
.acct-locked-ov      { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px; background:rgba(0,0,0,.5); }
.acct-locked-ov .mi  { font-size:18px; color:var(--w4); }
.acct-locked-ttl     { font-family:var(--mono); font-size:7px; letter-spacing:3px; color:var(--w4); text-transform:uppercase; }
.acct-locked-badge   { padding:3px 9px; border:1px solid rgba(255,255,255,.1); font-family:var(--mono); font-size:6px; letter-spacing:2px; color:rgba(255,255,255,.3); text-transform:uppercase; }
.acct-danger         { padding:16px; border:1px solid rgba(255,255,255,.07); margin-top:4px; }
.acct-sign-out-btn   { width:100%; padding:11px; background:none; border:1px solid var(--border2); color:var(--w3); font-family:var(--sans); font-weight:600; font-size:9px; letter-spacing:3px; text-transform:uppercase; cursor:pointer; transition:all .15s; margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:8px; }
.acct-sign-out-btn:hover { background:rgba(255,255,255,.05); color:var(--w); }
.acct-id-footer      { text-align:center; font-family:var(--mono); font-size:7px; color:var(--w4); letter-spacing:2px; }

/* ── PLANS ── */
.plans-page { position:relative; z-index:10; height:100vh; overflow-y:auto; overflow-x:hidden; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; }
.plans-page::-webkit-scrollbar { display:none; }
.plan-snap  { min-height:100vh; scroll-snap-align:start; display:flex; align-items:center; justify-content:center; padding:56px 24px 40px; }
.plan-card  { width:100%; max-width:500px; background:rgba(0,0,0,.08); backdrop-filter:blur(36px); -webkit-backdrop-filter:blur(36px); border:1px solid rgba(255,255,255,.09); padding:32px; animation:fadeUp .5s ease both; }
.plan-hd    { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:6px; }
.plan-nm    { font-family:var(--disp); font-size:40px; letter-spacing:3px; line-height:1; }
.plan-pr    { font-family:var(--disp); font-size:32px; letter-spacing:1px; }
.plan-desc  { font-family:var(--mono); font-size:8px; letter-spacing:2px; color:var(--w4); text-transform:uppercase; margin-bottom:20px; }
.plan-feats { margin-bottom:20px; }
.plan-feat  { font-size:12px; color:var(--w3); padding:5px 0; display:flex; align-items:flex-start; gap:8px; line-height:1.5; border-bottom:1px solid rgba(255,255,255,.03); }
.plan-feat .mi { font-size:10px; color:var(--w4); margin-top:2px; flex-shrink:0; }
.plan-cta   { width:100%; padding:12px; background:var(--w); border:none; color:#000; font-family:var(--sans); font-weight:700; font-size:10px; letter-spacing:3px; text-transform:uppercase; cursor:pointer; transition:opacity .2s; }
.plan-cta:hover { opacity:.85; }
.plan-cta.ghost { background:none; border:1px solid var(--border2); color:var(--w3); }
.plan-cta.ghost:hover { border-color:var(--border2); color:var(--w2); }
.plan-nav   { position:fixed; top:0; left:0; right:0; z-index:20; display:flex; align-items:center; justify-content:space-between; padding:14px 22px; background:rgba(0,0,0,.14); backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,.05); }
.plan-nav-logo { font-family:var(--disp); font-size:18px; letter-spacing:2px; cursor:pointer; }
.plan-dots  { display:flex; gap:5px; align-items:center; }
.plan-dot   { width:4px; height:4px; background:var(--w4); transition:all .3s; cursor:pointer; }
.plan-dot.on{ background:var(--w); width:14px; }
.plan-back  { display:flex; align-items:center; gap:5px; font-family:var(--mono); font-size:8px; letter-spacing:2px; color:var(--w3); cursor:pointer; background:none; border:none; }
.plan-back:hover { color:var(--w); }
.plan-back .mi { font-size:13px; }
.plan-hint  { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); font-family:var(--mono); font-size:7px; letter-spacing:3px; color:var(--w4); text-transform:uppercase; display:flex; flex-direction:column; align-items:center; gap:3px; animation:floatY 2s ease-in-out infinite; z-index:20; pointer-events:none; }
.plan-hint .mi { font-size:15px; }
.sub-coming-card { width:100%; max-width:500px; background:rgba(0,0,0,.08); backdrop-filter:blur(36px); border:1px solid rgba(255,255,255,.09); overflow:hidden; animation:fadeUp .5s ease both; position:relative; }
.sub-coming-blur { padding:32px; filter:blur(5px); pointer-events:none; user-select:none; opacity:.6; }
.sub-coming-ov   { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; background:rgba(0,0,0,.55); backdrop-filter:blur(3px); }
.sub-coming-icon .mi { font-size:32px; color:var(--w3); }
.sub-coming-ttl  { font-family:var(--disp); font-size:32px; letter-spacing:4px; color:var(--w); text-align:center; line-height:1; }
.sub-coming-sub  { font-family:var(--mono); font-size:8px; letter-spacing:3px; color:var(--w4); text-transform:uppercase; text-align:center; line-height:2; }
.sub-coming-badge{ padding:5px 14px; border:1px solid rgba(255,255,255,.14); font-family:var(--mono); font-size:7px; letter-spacing:3px; color:rgba(255,255,255,.35); text-transform:uppercase; margin-top:4px; }

/* ── PRIVACY ── */
.privacy-wrap { padding:26px; max-width:680px; }
@media(max-width:768px){ .privacy-wrap { padding:16px 14px; padding-bottom:90px; } }
.priv-h1 { font-family:var(--disp); font-size:34px; letter-spacing:2px; margin-bottom:5px; }
.priv-sub{ font-family:var(--mono); font-size:8px; letter-spacing:3px; color:var(--w4); text-transform:uppercase; margin-bottom:26px; }
.priv-sect { margin-bottom:22px; }
.priv-h2 { font-size:11px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--w2); margin-bottom:9px; font-family:var(--mono); }
.priv-p  { font-size:13px; line-height:1.75; color:var(--w3); font-weight:300; margin-bottom:8px; }
.priv-li { display:flex; align-items:flex-start; gap:8px; font-size:12px; color:var(--w3); padding:5px 0; border-bottom:1px solid rgba(255,255,255,.04); }
.priv-li .mi { font-size:10px; color:var(--w4); margin-top:2px; flex-shrink:0; }

/* ── CURRENCY SELECTOR ── */
.currency-modal { position:fixed; inset:0; z-index:300; display:flex; align-items:center; justify-content:center; animation:fadeIn .2s both; }
.currency-backdrop { position:absolute; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(12px); }
.currency-panel  { position:relative; z-index:1; background:rgba(8,8,8,.96); border:1px solid var(--border); padding:28px; width:90%; max-width:420px; animation:fadeUp .25s both; }
.currency-title  { font-family:var(--disp); font-size:28px; letter-spacing:3px; margin-bottom:6px; }
.currency-sub    { font-family:var(--mono); font-size:8px; color:var(--w4); letter-spacing:2px; margin-bottom:20px; }

<!-- Globals: pure JS, no JSX, loads synchronously before Babel runs -->
<script>
/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */

/* ── LOCAL STORAGE ── */
const LS = {

/* ── FREE PLAN COINS ── */
const FREE_COINS = ['BTC', 'SOL'];

/* ── TIERS ── */
const TIERS = ['free', 'budget', 'pro', 'atmosphere'];

/* ── PLANS ── */
const PLANS = [
  {
    id:'free', nm:'FREE', pr:'$0', desc:'Always free · no card required',
    feats:['Bitcoin & Solana — live data','Unlimited AI analysis','Live news feed','Investment simulator']
  },

    build:(sym,c,coins) => {

      return `Compare Bitcoin (BTC${btc ? ', currently '+fp(btc.price)+', 24h: '+fc(btc.ch) : ''}) against ${sym} (${c ? fp(c.price)+', 24h: '+fc(c.ch) : 'current price'}) as investments right now. Cover: risk profile, liquidity, growth potential, use case strength, which suits a conservative vs aggressive investor, and a clear verdict.`;
    }

/* ── UTILITIES ── */
function genId() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:5}, ()=>c[Math.floor(Math.random()*c.length)]).join('');
}
const fp = p => {
  if (p == null || isNaN(p)) return '—';
  if (p >= 1000) return '$' + p.toLocaleString('en', {minimumFractionDigits:2, maximumFractionDigits:2});
  if (p >= 1)    return '$' + p.toFixed(2);
  if (p >= 0.01) return '$' + p.toFixed(4);
  return '$' + p.toFixed(6);
};
const fc = c => {
  if (c == null || isNaN(c)) return '—';
  return (c >= 0 ? '+' : '') + c.toFixed(2) + '%';
};
const fv = v => {
  if (v == null || isNaN(v)) return '—';
  if (v >= 1e12) return '$' + (v/1e12).toFixed(2) + 'T';
  if (v >= 1e9)  return '$' + (v/1e9).toFixed(2) + 'B';
  if (v >= 1e6)  return '$' + (v/1e6).toFixed(2) + 'M';
  return '$' + v.toLocaleString('en', {maximumFractionDigits:0});
};

/* ── NAV ITEMS ── */
const NAV_ITEMS = [
  { id:'dashboard', lbl:'Feed',      icon:'bolt',              path:'/Dashboard/'  },
  { id:'markets',   lbl:'Markets',   icon:'candlestick_chart', path:'/Markets/'    },

/* ── SESSION ── */

/* ════════════════════════════════════════════════════
   LIVE PRICE ENGINE
   Fetches real data from CoinGecko.
   Falls back to Binance REST.
   Falls back to Kraken REST.
   If ALL fail → returns null (UI shows error, no fake data).
════════════════════════════════════════════════════ */

const PRICE_CACHE_KEY = 'kryptiv_prices';
const CACHE_TTL_MS    = 60_000; // 1 minute

/* Map CoinGecko response → our coin shape */
function cgToCoins(data) {
  return data.map((c, i) => ({
    id:    c.id,
    sym:   c.symbol.toUpperCase(),
    name:  c.name,
    price: c.current_price,
    ch:    c.price_change_percentage_24h ?? 0,
    ch1h:  c.price_change_percentage_1h_in_currency ?? null,
    ch7d:  c.price_change_percentage_7d_in_currency ?? null,
    mc:    c.market_cap ? c.market_cap / 1e9 : null,  // billions
    vol:   c.total_volume ? c.total_volume / 1e9 : null,
    rank:  c.market_cap_rank ?? (i + 1),
    ath:   c.ath,
    atl:   c.atl,
    supply:c.circulating_supply,
    hist:  null, // loaded on demand per coin
    _src:  'coingecko',
  }));
}

/* Binance fallback — only gets price + 24h change for top symbols */
const BINANCE_SYMS = ['BTCUSDT','ETHUSDT','SOLUSDT','BNBUSDT','XRPUSDT',
                      'ADAUSDT','AVAXUSDT','DOTUSDT','LINKUSDT','DOGEUSDT',
                      'MATICUSDT','UNIUSDT','NEARUSDT','ARBUSDT','OPUSDT'];
const BINANCE_MAP  = {
  'BTCUSDT':'BTC','ETHUSDT':'ETH','SOLUSDT':'SOL','BNBUSDT':'BNB',
  'XRPUSDT':'XRP','ADAUSDT':'ADA','AVAXUSDT':'AVAX','DOTUSDT':'DOT',
  'LINKUSDT':'LINK','DOGEUSDT':'DOGE','MATICUSDT':'POL','UNIUSDT':'UNI',
  'NEARUSDT':'NEAR','ARBUSDT':'ARB','OPUSDT':'OP'
};

async function fetchBinance() {
  const syms = BINANCE_SYMS.map(s => `"${s}"`).join(',');
  const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=[${syms}]`);
  if (!r.ok) throw new Error('Binance HTTP ' + r.status);
  const data = await r.json();
  return data.map((t, i) => {
    const sym  = BINANCE_MAP[t.symbol] || t.symbol.replace('USDT','');
    const meta = COIN_LIST.find(c => c.sym === sym) || { id:sym.toLowerCase(), name:sym };
    return {
      id:    meta.id,
      sym,
      name:  meta.name,
      price: parseFloat(t.lastPrice),
      ch:    parseFloat(t.priceChangePercent),
      ch1h:  null,
      ch7d:  null,
      mc:    null,
      vol:   parseFloat(t.quoteVolume) / 1e9,
      rank:  i + 1,
      ath:   null, atl:null, supply:null, hist:null,
      _src:  'binance',
    };
  }).filter(c => c.price > 0);
}

async function fetchKraken() {
  // Kraken has limited pairs but is reliable
  const pairs = 'XBTUSD,ETHUSD,SOLUSD,XRPUSD,ADAUSD,LINKUSD,DOGEUSD,UNIUSD,NEARUSD';
  const r = await fetch(`https://api.kraken.com/0/public/Ticker?pair=${pairs}`);
  if (!r.ok) throw new Error('Kraken HTTP ' + r.status);
  const data = await r.json();
  if (data.error?.length) throw new Error('Kraken: ' + data.error[0]);
  const KMAP = {'XXBTZUSD':'BTC','XETHZUSD':'ETH','SOLUSDT':'SOL','XXRPZUSD':'XRP',
                'XADAZUSD':'ADA','LINKUSD':'LINK','XDGUSD':'DOGE','UNIUSD':'UNI',
                'NEARUSD':'NEAR','SOLUSD':'SOL'};
  return Object.entries(data.result).map(([pair, t], i) => {
    const sym  = KMAP[pair] || pair.replace('USD','').replace('Z','').replace('X','').slice(0,4);
    const meta = COIN_LIST.find(c => c.sym === sym) || { id:sym.toLowerCase(), name:sym };
    const price = parseFloat(t.c[0]);
    const open  = parseFloat(t.o);
    const ch    = open > 0 ? ((price - open) / open) * 100 : 0;
    return {
      id:meta.id, sym, name:meta.name, price, ch,
      ch1h:null, ch7d:null, mc:null,
      vol: parseFloat(t.v[1]) * price / 1e9,
      rank:i+1, ath:null, atl:null, supply:null, hist:null,
      _src:'kraken',
    };
  }).filter(c => c.price > 0);
}

async function fetchCoinGecko() {
  const ids = COIN_LIST.map(c => c.id).join(',');
  const url = `https://api.coingecko.com/api/v3/coins/markets` +
    `?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=15&page=1` +
    `&sparkline=false&price_change_percentage=1h%2C24h%2C7d`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('CoinGecko HTTP ' + r.status);
  const data = await r.json();
  if (!Array.isArray(data) || data.length === 0) throw new Error('CoinGecko: empty response');
  return cgToCoins(data);
}

/* Fetch 7d historical sparkline for a single coin (CoinGecko) */
async function fetchCoinHistory(coinId) {
  const r = await fetch(
    `https://api.coingecko.com/api/v3/coins/${coinId}/market_chart?vs_currency=usd&days=7&interval=daily`
  );
  if (!r.ok) return null;
  const d = await r.json();
  return d.prices || null; // [[timestamp, price], ...]
}

/* ── MAIN FETCH — try CG → Binance → Kraken ── */
async function fetchLivePrices() {
  // Check cache first
  try {
    const cached = JSON.parse(sessionStorage.getItem(PRICE_CACHE_KEY) || 'null');
    if (cached && Date.now() - cached.ts < CACHE_TTL_MS) {
      return { coins: cached.coins, src: cached.src + ' (cached)' };
    }
  } catch {}

  const errors = [];

  // 1. CoinGecko
  try {
    const coins = await fetchCoinGecko();
    sessionStorage.setItem(PRICE_CACHE_KEY, JSON.stringify({ coins, ts: Date.now(), src:'CoinGecko' }));
    return { coins, src:'CoinGecko' };
  } catch(e) { errors.push('CoinGecko: ' + e.message); }

  // 2. Binance
  try {
    const coins = await fetchBinance();
    sessionStorage.setItem(PRICE_CACHE_KEY, JSON.stringify({ coins, ts: Date.now(), src:'Binance' }));
    return { coins, src:'Binance' };
  } catch(e) { errors.push('Binance: ' + e.message); }

  // 3. Kraken
  try {
    const coins = await fetchKraken();
    sessionStorage.setItem(PRICE_CACHE_KEY, JSON.stringify({ coins, ts: Date.now(), src:'Kraken' }));
    return { coins, src:'Kraken' };
  } catch(e) { errors.push('Kraken: ' + e.message); }

  // All failed
  return { coins: null, src: null, errors };
}

/* ── PRICE UPDATER — polls every 30s, updates window._liveCoins ── */
let _priceInterval = null;

function startPriceUpdates(onUpdate, onError) {
  async function tick() {
    const result = await fetchLivePrices();
    if (result.coins) {
      window._liveCoins = result.coins;
      window._priceSource = result.src;
      if (onUpdate) onUpdate(result.coins, result.src);
    } else {
      if (onError) onError(result.errors);
    }
  }
  tick(); // immediate
  if (_priceInterval) clearInterval(_priceInterval);
  _priceInterval = setInterval(tick, 30_000);
  return () => clearInterval(_priceInterval);
}

</script>
<!-- Single Babel block: shell components + page component + mount -->
<script type="text/babel">
const {useState, useEffect, useRef, useCallback, useMemo} = React;

/* ─────────────────────────── SHELL ─────────────────────────── */
/* ═══════════════════════════════════════════════════
   KRYPTIV · APP SHELL
   Loads real prices → renders app
   Shows error if all APIs fail (no fake fallback)
═══════════════════════════════════════════════════ */

/* ── SPARKLINE ── */
function Spark({prices, ch, w=44, h=20}) {
  // If we have real price array use it, else generate directional line
  let pts;
  if (prices && prices.length >= 2) {
    const vals = prices.slice(-12);
    const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx - mn || 1;
    pts = vals.map((v, i) => ({ x:(i/(vals.length-1))*w, y: h - ((v-mn)/rng)*h }));
  } else {
    pts = Array.from({length:12}, (_,i) => {
      const t = i/11, tr = (ch||0)>=0 ? t*.3 : -t*.3;
      return { x:(i/11)*w, y: h - (0.5 + tr + Math.sin(i*1.4)*.08)*h };
    });
  }
  const d = pts.map((p,i) => `${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const color = (ch||0) >= 0 ? 'rgba(255,255,255,.7)' : 'rgba(255,255,255,.3)';
  return (
    <svg width={w} height={h} style={{display:'block'}}>
      <path d={d} fill="none" stroke={color} strokeWidth="1.2"/>
    </svg>
  );
}

/* ── BIG SPARK ── */
function BigSpark({prices, ch}) {
  const sw=320, sh=72;
  let pts;
  if (prices && prices.length >= 2) {
    const vals = prices.map(p => typeof p === 'number' ? p : p[1]);
    const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx-mn||1;
    pts = vals.map((v,i) => ({ x:(i/(vals.length-1))*sw, y:sh-((v-mn)/rng)*sh }));
  } else {
    pts = Array.from({length:24}, (_,i) => {
      const t=i/23, base=(ch||0)/100*1.5;
      return { x:(i/23)*sw, y:sh-(0.5+base*t+Math.sin(i*.8)*.06)*sh };
    });
  }
  const d = pts.map((p,i) => `${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const color = (ch||0) >= 0 ? 'rgba(255,255,255,.6)' : 'rgba(255,255,255,.2)';
  return (
    <svg viewBox={`0 0 ${sw} ${sh}`} preserveAspectRatio="none" style={{width:'100%',height:sh,display:'block'}}>
      <defs>
        <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stopColor="#fff" stopOpacity={(ch||0)>=0?.08:.03}/>
          <stop offset="100%" stopColor="#fff" stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={`${d} L${sw},${sh} L0,${sh} Z`} fill="url(#sg)"/>
      <path d={d} fill="none" stroke={color} strokeWidth="1.5"/>
    </svg>
  );
}

/* ── TICKER ── */
function Ticker({coins}) {
  if (!coins || coins.length === 0) return <div className="tb-ticker"/>;
  const items = [...coins, ...coins];
  return (
    <div className="tb-ticker">
      <div className="ticker-track">
        {items.map((c,i) => (
          <div key={i} className="tick">
            <span className="tick-sym">{c.sym}</span>
            <span className="tick-pr">{fp(c.price)}</span>
            <span className={`tick-ch ${(c.ch||0)>=0?'up':'dn'}`}>
              {(c.ch||0)>=0?'▴':'▾'}{Math.abs(c.ch||0).toFixed(2)}%
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── PRICE ERROR STATE ── */
function PriceError({errors, onRetry}) {
  return (
    <div style={{
      position:'fixed', inset:0, zIndex:500,
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      background:'rgba(0,0,0,.92)', backdropFilter:'blur(20px)', padding:32, textAlign:'center',
    }}>
      <span className="mi" style={{fontSize:36, color:'rgba(255,100,80,.8)', marginBottom:16}}>wifi_off</span>
      <div style={{fontFamily:'var(--disp)', fontSize:28, letterSpacing:3, marginBottom:8}}>
        COULD NOT LOAD PRICES
      </div>
      <div style={{fontFamily:'var(--mono)', fontSize:8, color:'var(--w4)', letterSpacing:2, lineHeight:2.2, marginBottom:24, maxWidth:360}}>
        KRYPTIV REQUIRES A LIVE INTERNET CONNECTION.<br/>
        WE TRIED COINGECKO, BINANCE, AND KRAKEN.<br/>
        ALL FAILED. NO FAKE DATA WILL BE SHOWN.
      </div>
      {errors && errors.length > 0 && (
        <div style={{fontFamily:'var(--mono)', fontSize:8, color:'rgba(255,100,80,.5)', marginBottom:20, lineHeight:2}}>
          {errors.map((e,i) => <div key={i}>{e}</div>)}
        </div>
      )}
      <button
        onClick={onRetry}
        style={{padding:'11px 24px', background:'var(--w)', color:'#000', border:'none',
          fontFamily:'var(--sans)', fontWeight:700, fontSize:9, letterSpacing:3,
          textTransform:'uppercase', cursor:'pointer'}}
      >
        RETRY
      </button>
    </div>
  );
}

/* ── PRICE LOADING STATE ── */
function PriceLoading() {
  return (
    <div style={{
      position:'fixed', inset:0, zIndex:500,
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      background:'rgba(0,0,0,.88)', backdropFilter:'blur(12px)',
    }}>
      <div style={{fontFamily:'var(--disp)', fontSize:42, letterSpacing:2, marginBottom:8, animation:'pulse 1.8s ease-in-out infinite'}}>KRYPTIV</div>
      <div style={{fontFamily:'var(--mono)', fontSize:8, letterSpacing:5, color:'var(--w4)', textTransform:'uppercase', marginBottom:16}}>Fetching live prices…</div>
      <div style={{display:'flex', gap:6}}>
        {[0,1,2].map(i => <div key={i} style={{width:4,height:4,background:'var(--w4)',animation:`pulse 1.2s ease-in-out ${i*.2}s infinite`}}/>)}
      </div>
    </div>
  );
}

/* ── MOBILE NAV OVERLAY ── */
function NavOverlay({view, go, onClose}) {
  return (
    <div className="nav-ov" onClick={onClose}>
      <div className="nav-ov-header" onClick={e=>e.stopPropagation()}>
        <div className="nav-ov-logo">KRYPTIV</div>
        <button className="nav-ov-close-btn" onClick={onClose}>
          <span className="mi">close</span>
        </button>
      </div>
      <div className="nav-ov-list" onClick={e=>e.stopPropagation()}>
        {NAV_ITEMS.map(n => (
          <div key={n.id} className={`nav-ov-it${view===n.id?' on':''}`} onClick={()=>go(n.id)}>
            <span className="mi">{n.icon}</span>
            {n.lbl}
          </div>
        ))}
      </div>

}

/* ── APP SHELL ── */
function AppShell({user, setUser, view, children}) {
  const {useState: useS, useEffect: useE} = React;
  const [navOpen,   setNavOpen]   = useS(false);
  const [coins,     setCoins]     = useS(null);      // null = loading
  const [priceErr,  setPriceErr]  = useS(null);      // array of error strings
  const [priceSrc,  setPriceSrc]  = useS('');
  const [retryKey,  setRetryKey]  = useS(0);

  useE(() => {
    let stopped = false;
    const stop = startPriceUpdates(
      (newCoins, src) => {
        if (stopped) return;
        setCoins(newCoins);
        setPriceSrc(src);
        setPriceErr(null);
        window._liveCoins = newCoins;
      },
      (errors) => {
        if (stopped) return;
        // Only show error if we have no coins yet
        setCoins(prev => {
          if (!prev) setPriceErr(errors);
          return prev;
        });
      }
    );
    return () => { stopped = true; stop(); };
  }, [retryKey]);

  const go = id => {
    setNavOpen(false);
    const n = NAV_ITEMS.find(x => x.id === id);
    if (n) window.location.href = n.path;
  };

  const handleSignOut = () => { LS.clear(); window.location.href = '/'; };

  if (priceErr) return <PriceError errors={priceErr} onRetry={() => { setPriceErr(null); setRetryKey(k=>k+1); }}/>;
  if (!coins)   return <PriceLoading/>;

  const availCoins = user.tier === 'free'
    ? coins.filter(c => FREE_COINS.includes(c.sym))
    : coins;

  return (
    <div className="app">
      {/* ── SIDEBAR ── */}
      <div className="sidebar">
        <div className="sb-head">
          <div className="sb-logo">KRYPTIV</div>
          <div className="sb-uid">ID <span>{user.kryptid}</span></div>
        </div>
        <div className="sb-hr"/>
        <nav className="sb-nav">
          <div className="nav-grp">Navigation</div>
          {NAV_ITEMS.map(n => (
            <div key={n.id} className={`nav-it${view===n.id?' on':''}`} onClick={()=>go(n.id)}>
              <span className="mi">{n.icon}</span>
              {n.lbl}
              {n.id==='ai' && <span className="nav-badge">FREE</span>}
            </div>
          ))}
        </nav>
        <div className="sb-foot">
          <div className="sb-hr" style={{marginBottom:8}}/>
          <div className="tier-row" onClick={()=>go('plans')}>
            <div className="tier-dot"/>
            <div className="tier-info">
              <div className="tier-lbl">Plan</div>
              <div className="tier-nm">{(user.tier||'free').toUpperCase()}</div>
            </div>
            <span className="mi" style={{fontSize:13,color:'var(--w4)'}}>chevron_right</span>
          </div>
          <div className="sb-logout" onClick={handleSignOut}>
            <span className="mi">logout</span>{user.name}
          </div>
        </div>
      </div>

      {/* ── MAIN CONTENT ── */}
      <div className="content">
        <div className="topbar">
          <div className="tb-logo">KRYPTIV</div>
          <div className="tb-title">{NAV_ITEMS.find(n=>n.id===view)?.lbl}</div>
          <Ticker coins={coins}/>
          <div className="tb-right">
            <div className="ic-btn" title={`Live data · ${priceSrc}`}>
              <span className="mi" style={{fontSize:10, color:'rgba(130,255,150,.7)'}}>fiber_manual_record</span>
            </div>
            <div className="tier-chip" onClick={()=>go('plans')}>{(user.tier||'free').toUpperCase()}</div>
          </div>
        </div>

        <div className="main">
          {/* Pass coins + availCoins into children via context trick */}
          {React.cloneElement(children, { coins, availCoins, priceSrc })}
        </div>
      </div>

      {/* ── BOTTOM NAV (mobile) ── */}
      <div className="botnav">
        {['dashboard','ai','news'].map(id => {
          const n = NAV_ITEMS.find(x=>x.id===id);
          return (
            <button key={id} className={`bn-it${view===id?' on':''}`} onClick={()=>go(id)}>
              <span className="mi">{n.icon}</span>{n.lbl}
            </button>
          );
        })}
        <button className="bn-more-btn" onClick={()=>setNavOpen(true)}>
          <div className="bn-sq"><span className="mi">grid_view</span></div>
          <div className="bn-sq-lbl">More</div>
        </button>
      </div>

      {navOpen && <NavOverlay view={view} go={go} onClose={()=>setNavOpen(false)}/>}
    </div>
  );
}

/* Fetch real 7-day sparkline from CoinGecko */
async function fetchSparkline(coinId) {
  try {
    const r = await fetch(
      `https://api.coingecko.com/api/v3/coins/${coinId}/market_chart?vs_currency=usd&days=7&interval=hourly`
    );
    if (!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    return (d.prices||[]).map(p=>p[1]); // array of prices
  } catch { return null; }
}

function RealChart({coinId, ch}) {
  const [prices, setPrices] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(()=>{
    setLoading(true); setPrices(null);
    fetchSparkline(coinId).then(p=>{
      setPrices(p);
      setLoading(false);
    });
  },[coinId]);

  const sw=320, sh=80;
  if (loading) return (
    <div style={{height:sh,display:'flex',alignItems:'center',justifyContent:'center',borderTop:'1px solid rgba(255,255,255,.05)',marginBottom:16}}>
      <div style={{fontFamily:'var(--mono)',fontSize:7,color:'var(--w4)',letterSpacing:3}}>LOADING 7D CHART…</div>
    </div>
  );
  if (!prices || prices.length < 2) return (
    <div style={{height:sh,display:'flex',alignItems:'center',justifyContent:'center',borderTop:'1px solid rgba(255,255,255,.05)',marginBottom:16}}>
      <div style={{fontFamily:'var(--mono)',fontSize:7,color:'var(--w4)',letterSpacing:3}}>7D CHART UNAVAILABLE</div>
    </div>
  );
  const mn=Math.min(...prices), mx=Math.max(...prices), rng=mx-mn||1;
  const pts = prices.map((v,i)=>({
    x:(i/(prices.length-1))*sw,
    y:sh-((v-mn)/rng)*sh*0.88-sh*0.04
  }));
  const d = pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const color = (ch||0)>=0?'rgba(130,255,150,.7)':'rgba(255,100,80,.6)';
  const fillColor = (ch||0)>=0?'rgba(130,255,150,.06)':'rgba(255,100,80,.05)';
  // Day markers
  const dayCount = Math.floor(prices.length / 24);
  return (
    <div style={{marginBottom:16}}>
      <div style={{fontFamily:'var(--mono)',fontSize:7,color:'var(--w4)',letterSpacing:3,marginBottom:6}}>7-DAY CHART · {prices.length} DATA POINTS · COINGECKO</div>
      <svg viewBox={`0 0 ${sw} ${sh}`} preserveAspectRatio="none" style={{width:'100%',height:sh,display:'block'}}>
        <defs>
          <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={(ch||0)>=0?'rgba(130,255,150,1)':'rgba(255,100,80,1)'} stopOpacity="0.1"/>
            <stop offset="100%" stopColor="#000" stopOpacity="0"/>
          </linearGradient>
        </defs>
        <path d={`${d} L${sw},${sh} L0,${sh} Z`} fill="url(#cg)"/>
        <path d={d} fill="none" stroke={color} strokeWidth="1.5"/>
        {/* Current price dot */}
        <circle cx={pts[pts.length-1].x} cy={pts[pts.length-1].y} r="3" fill={color}/>
      </svg>
      <div style={{display:'flex',justifyContent:'space-between',fontFamily:'var(--mono)',fontSize:7,color:'var(--w4)',marginTop:4}}>
        <span>7D AGO</span>
        <span>NOW</span>
      </div>
    </div>
  );
}

function getVerdict(c) {
  // Based on actual price change data
  const s = [(c.ch||0)>0?1:0, (c.ch7d||0)>0?1:0, (c.ch1h||0)>0?1:0].reduce((a,b)=>a+b,0);
  const ch = c.ch||0, ch7 = c.ch7d||0;
  if (s >= 2 && ch > 0)
    return {rating:'BULLISH',   txt:`${c.sym} is showing positive momentum: ${fc(ch)} in 24h${ch7 ? ', '+fc(ch7)+' over 7 days' : ''}. Buying pressure is present. Watch for continuation above current levels.`};
  if (s >= 1)
    return {rating:'NEUTRAL',   txt:`Mixed signals on ${c.sym}. 24h: ${fc(ch)}${ch7?', 7d: '+fc(ch7):''} . No clear directional bias. Wait for a confirmed breakout before positioning.`};
  return {rating:'BEARISH',    txt:`${c.sym} is under selling pressure: ${fc(ch)} in 24h${ch7 ? ', '+fc(ch7)+' over 7 days' : ''}. Consider waiting for stabilisation before entering.`};
}

function Markets({user, coins, availCoins, priceSrc}) {
  const [q,      setQ]      = useState('');
  const [sort,   setSort]   = useState('rank');
  const [tab,    setTab]    = useState('all');
  const [detail, setDetail] = useState(null);

  const isFree = user.tier === 'free';
  const TIERS_I = t => TIERS.indexOf(t);
  const locked  = t => TIERS_I(user.tier) < TIERS_I(t);

  if (!availCoins) return null;

  const list = [...availCoins]
    .filter(c => tab==='gainers'?(c.ch||0)>0 : tab==='losers'?(c.ch||0)<0 : true)
    .filter(c => c.name.toLowerCase().includes(q.toLowerCase()) || c.sym.toLowerCase().includes(q.toLowerCase()))
    .sort((a,b) =>
      sort==='rank'  ? (a.rank||99)-(b.rank||99) :
      sort==='ch'    ? (b.ch||0)-(a.ch||0) :
      sort==='price' ? b.price-a.price : 0
    );

  return (
    <div className="scr">
      {isFree && (
        <div style={{padding:'8px 0 14px',fontFamily:'var(--mono)',fontSize:7,color:'var(--w4)',letterSpacing:2,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
          <span className="mi" style={{fontSize:9}}>lock</span>
          FREE · BTC & SOL ·{' '}
          <span onClick={()=>window.location.href='/Plans/'} style={{color:'var(--w3)',cursor:'pointer'}}>
            UPGRADE FOR ALL {coins?.length||15} LIVE COINS ▸
          </span>
          <span style={{marginLeft:'auto',color:'rgba(130,255,150,.5)'}}>● LIVE · {priceSrc}</span>
        </div>
      )}

      <div className="tabs">
        {[['ALL','all'],['GAINERS','gainers'],['LOSERS','losers']].map(([l,k])=>
          <div key={k} className={`tab${tab===k?' on':''}`} onClick={()=>setTab(k)}>{l}</div>
        )}
        <div style={{flex:1}}/>
        {['rank','ch','price'].map(s=>
          <div key={s} className={`tab${sort===s?' on':''}`} style={{fontSize:'7px'}} onClick={()=>setSort(s)}>
            {s==='rank'?'RANK':s==='ch'?'24H':s==='price'?'PRICE':''}
          </div>
        )}
      </div>

      <div className="srch-row">
        <span className="mi">search</span>
        <input className="srch-in" value={q} onChange={e=>setQ(e.target.value)} placeholder="Search…"/>
        {q && <span className="mi" style={{cursor:'pointer',fontSize:12,color:'var(--w4)'}} onClick={()=>setQ('')}>close</span>}
      </div>

      {/* Column headers */}
      <div style={{display:'flex',borderBottom:'1px solid rgba(255,255,255,.04)',paddingBottom:5,marginBottom:2}}>
        {[['#',22],['SYM',44],['NAME',0],['',48],['PRICE',88],['24H',58]].map(([l,w],i)=>
          <div key={i} style={{width:w||'auto',flex:w?'none':1,fontFamily:'var(--mono)',fontSize:7,letterSpacing:3,color:'var(--w4)',textAlign:i>=4?'right':'left'}}>{l}</div>
        )}
      </div>

      {list.map((c,i) => (
        <div key={c.id} className="coin-line" onClick={()=>setDetail(c)}>
          <div className="c-rank">{c.rank||i+1}</div>
          <div className="c-sym">{c.sym}</div>
          <div className="c-nm">{c.name}</div>
          <div className="c-spark"><Spark ch={c.ch}/></div>
          <div className="c-pr">{fp(c.price)}</div>
          <div className={`c-ch ${(c.ch||0)>=0?'up':'dn'}`}>{(c.ch||0)>=0?'▴':'▾'}{Math.abs(c.ch||0).toFixed(2)}%</div>
        </div>
      ))}

      {list.length===0 && (
        <div style={{padding:'28px 0',fontFamily:'var(--mono)',fontSize:9,color:'var(--w4)',letterSpacing:2}}>
          NO RESULTS
        </div>
      )}

      {/* DETAIL PANEL */}
      {detail && (
        <div className="coin-detail">
          <div className="cd-backdrop" onClick={()=>setDetail(null)}/>
          <div className="cd-panel">
            <div className="cd-head">
              <div>
                <div className="cd-sym">{detail.sym}</div>
                <div className="cd-nm">{detail.name}{detail.rank ? ' · Rank #'+detail.rank : ''}</div>
              </div>
              <div>
                <div className="cd-price">{fp(detail.price)}</div>
                <div className={`cd-ch-big c-ch ${(detail.ch||0)>=0?'up':'dn'}`}>{fc(detail.ch)} 24h</div>
              </div>
              <button className="cd-close" onClick={()=>setDetail(null)}>
                <span className="mi">close</span>
              </button>
            </div>

            <RealChart coinId={detail.id} ch={detail.ch}/>

            {/* Real change data — only show what we have */}
            <div className="cd-grid">
              {[
                ['1H',  detail.ch1h],
                ['24H', detail.ch],
                ['7D',  detail.ch7d],
              ].filter(([,v])=>v!=null).concat(
                detail.mc ? [['MCap', null, fv(detail.mc*1e9)]] : [],
                detail.vol ? [['Vol', null, fv(detail.vol*1e9)]] : [],
                detail.ath ? [['ATH', null, fp(detail.ath)]] : [],
              ).map(([l,v,display])=>(
                <div key={l} className="cd-gs">
                  <div className="cd-gs-lbl">{l}</div>
                  {display
                    ? <div className="cd-gs-val">{display}</div>
                    : <div className="cd-gs-val" style={{color:(v||0)>=0?'var(--w2)':'var(--w4)'}}>{(v||0)>=0?'+':''}{(v||0).toFixed(2)}%</div>
                  }
                </div>
              ))}
            </div>

            {locked('budget')
              ? <div className="budget-lock">
                  <span className="mi">lock</span>
                  <div className="budget-lock-t">AI market analysis requires Budget plan</div>
                  <button className="budget-lock-cta" onClick={()=>window.location.href='/Plans/'}>UPGRADE ▸</button>
                </div>
              : <div className="cd-verdict">
                  <div className="cd-vt">Analysis · {getVerdict(detail).rating}</div>
                  <div className="cd-vtxt">{getVerdict(detail).txt}</div>
                  <div className="cd-vdis">Based on live price data. Not financial advice.</div>
                </div>
            }
          </div>
        </div>
      )}
    </div>
  );
}

function Page() {
  const user = requireAuth();
  if (!user) return null;
  const [u, setU] = useState(user);
  return (
    <>
      <div className="wall clear"/>
      <AppShell user={u} setUser={setU} view="markets">
        <Markets user={u}/>
      </AppShell>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page/>);

</script>
