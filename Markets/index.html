                color:activeRange===r.id?'var(--w)':'var(--w4)',
                fontFamily:'var(--mono)',fontSize:7,letterSpacing:2,cursor:'pointer',transition:'all .12s'}}>
              {r.label}
            </button>
          ))}
          {isSynth&&!hover&&<span style={{marginLeft:'auto',fontFamily:'var(--mono)',fontSize:6,color:'rgba(255,200,80,.45)',letterSpacing:2}}>ESTIMATED</span>}
          {hover&&<span style={{marginLeft:'auto',fontFamily:'var(--mono)',fontSize:9,color:isUp?'rgba(130,255,150,.9)':'rgba(255,100,80,.9)',letterSpacing:1}}>{fp(hover.price)} <span style={{fontSize:6,color:'var(--w4)'}}>{fmtTime(hover.time)}</span></span>}
        </div>
      )}

      <svg ref={svgRef}
        viewBox={`0 0 ${W} ${H}`}
        preserveAspectRatio="xMidYMid meet"
        style={{width:'100%',display:'block',cursor:'crosshair'}}
        onMouseMove={handleMove}
        onMouseLeave={()=>setHover(null)}>
        <defs>
          <linearGradient id={`grad-${uid}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.15"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
          <linearGradient id={`bandg-${uid}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.06"/>
            <stop offset="100%" stopColor={color} stopOpacity="0.01"/>
          </linearGradient>
          <clipPath id={`cc-${uid}`}><rect x="0" y="0" width={W} height={H}/></clipPath>
          <clipPath id={`cc2-${uid}`}><rect x="0" y="0" width={W} height={CH}/></clipPath>
        </defs>

        {gridY.map((g,k)=>(
          <line key={k} x1={PAD.l} y1={g.y.toFixed(1)} x2={W-PAD.r} y2={g.y.toFixed(1)}
            stroke="rgba(255,255,255,.04)" strokeWidth="1"/>
        ))}
        {gridX.map((g,k)=>(
          <line key={k} x1={g.x.toFixed(1)} y1={PAD.t} x2={g.x.toFixed(1)} y2={CH}
            stroke="rgba(255,255,255,.03)" strokeWidth="1"/>
        ))}
        {gridY.filter((_,k)=>k>0&&k<5).map((g,k)=>(
          <text key={k} x={W-PAD.r-2} y={g.y} textAnchor="end" dominantBaseline="middle"
            fill="rgba(255,255,255,.15)" fontSize="8" fontFamily="monospace">{fp(g.v)}</text>
        ))}

        {/* Bollinger */}
        {bS.length>1&&<>
          <path d={bFill} fill={`url(#bandg-${uid})`} clipPath={`url(#cc2-${uid})`}/>
          <path d={bHi} fill="none" stroke={color} strokeWidth="0.5" opacity="0.18" strokeDasharray="2,3" clipPath={`url(#cc2-${uid})`}/>
          <path d={bLo} fill="none" stroke={color} strokeWidth="0.5" opacity="0.18" strokeDasharray="2,3" clipPath={`url(#cc2-${uid})`}/>
        </>}

        <line x1={PAD.l} y1={toY(vals[0]).toFixed(1)} x2={W-PAD.r} y2={toY(vals[0]).toFixed(1)}
          stroke="rgba(255,255,255,.08)" strokeWidth="0.6" strokeDasharray="3,4"/>

        {/* Volume bars */}
        {volSrc&&volSrc.map((v,k)=>{
          const bh=Math.max(1,(v.v/maxVol)*VOL_H);
          const bx=toX(k);
          const up=k>0?v.v>=volSrc[k-1].v:true;
          return <rect key={k} x={(bx-bw/2).toFixed(1)} y={(H-bh).toFixed(1)}
            width={bw.toFixed(1)} height={bh.toFixed(1)}
            fill={up?'rgba(130,255,150,.14)':'rgba(255,100,80,.11)'}
            clipPath={`url(#cc-${uid})`}/>;
        })}

        <path d={fillD} fill={`url(#grad-${uid})`} clipPath={`url(#cc2-${uid})`}/>
        <path d={pathD} fill="none" stroke={color} strokeWidth="1.6" clipPath={`url(#cc2-${uid})`}/>

        {/* Peak markers */}
        {peaks.map((pi,k)=>{
          const px=toX(pi),py=toY(vals[pi]);
          const ly=Math.max(10,py-13);
          return <g key={'p'+k}>
            <circle cx={px.toFixed(1)} cy={py.toFixed(1)} r="3" fill="rgba(130,255,150,.9)"/>
            <line x1={px.toFixed(1)} y1={py.toFixed(1)} x2={px.toFixed(1)} y2={(py-8).toFixed(1)} stroke="rgba(130,255,150,.4)" strokeWidth="1"/>
            <text x={px.toFixed(1)} y={ly.toFixed(1)} textAnchor="middle" fill="rgba(130,255,150,.75)" fontSize="7" fontFamily="monospace">H {fp(vals[pi])}</text>
          </g>;
        })}

        {/* Trough markers */}
        {troughs.map((ti,k)=>{
          const tx=toX(ti),ty=toY(vals[ti]);
          const ly=Math.min(CH-4,ty+18);
          return <g key={'t'+k}>
            <circle cx={tx.toFixed(1)} cy={ty.toFixed(1)} r="3" fill="rgba(255,100,80,.9)"/>
            <line x1={tx.toFixed(1)} y1={ty.toFixed(1)} x2={tx.toFixed(1)} y2={(ty+8).toFixed(1)} stroke="rgba(255,100,80,.4)" strokeWidth="1"/>
            <text x={tx.toFixed(1)} y={ly.toFixed(1)} textAnchor="middle" fill="rgba(255,100,80,.75)" fontSize="7" fontFamily="monospace">L {fp(vals[ti])}</text>
          </g>;
        })}

        {/* Crosshair + inline price tooltip */}
        {hx!=null&&(()=>{
          const priceStr=fp(hover.price);
          const tW=priceStr.length*5.5+14;
          const tH=15;
          const tX=Math.min(Math.max(hx-tW/2, PAD.l), W-PAD.r-tW);
          const tY=Math.max(PAD.t+2, hy-tH-9);
          return <>
            <line x1={hx.toFixed(1)} y1="0" x2={hx.toFixed(1)} y2={H}
              stroke="rgba(255,255,255,.15)" strokeWidth="1" strokeDasharray="3,3"/>
            <line x1="0" y1={hy.toFixed(1)} x2={W} y2={hy.toFixed(1)}
              stroke="rgba(255,255,255,.08)" strokeWidth="1" strokeDasharray="3,3"/>
            <circle cx={hx.toFixed(1)} cy={hy.toFixed(1)} r="4" fill={color} opacity="0.9"/>
            <circle cx={hx.toFixed(1)} cy={hy.toFixed(1)} r="7" fill="none" stroke={color} strokeWidth="0.8" opacity="0.3"/>
            <rect x={tX.toFixed(1)} y={tY.toFixed(1)} width={tW.toFixed(1)} height={tH}
              fill="rgba(0,0,0,.8)" rx="0"/>
            <rect x={tX.toFixed(1)} y={tY.toFixed(1)} width={tW.toFixed(1)} height={tH}
              fill="none" stroke={color} strokeWidth="0.5" opacity="0.6" rx="0"/>
            <text x={(tX+tW/2).toFixed(1)} y={(tY+tH/2).toFixed(1)}
              textAnchor="middle" dominantBaseline="middle"
              fill={color} fontSize="7.5" fontFamily="monospace" fontWeight="500">
              {priceStr}
            </text>
          </>;
        })()}

        {!hover&&<>
          <circle cx={(W-PAD.r).toFixed(1)} cy={toY(vals[vals.length-1]).toFixed(1)} r="3" fill={color}/>
          <circle cx={(W-PAD.r).toFixed(1)} cy={toY(vals[vals.length-1]).toFixed(1)} r="5.5" fill="none" stroke={color} strokeWidth="0.7" opacity="0.35"/>
        </>}

        {/* Time axis */}
        {gridX.map((g,k)=>(
          <text key={k} x={g.x.toFixed(1)} y={(H-1).toFixed(1)} textAnchor="middle"
            fill="rgba(255,255,255,.15)" fontSize="7" fontFamily="monospace">{fmtTime(g.t)}</text>
        ))}
      </svg>
    </div>
  );
}


/*  ADVANCED PROBABILITY CALCULATOR  */
// Uses real CoinGecko historical data to compute:
// - Realized volatility (rolling daily log-returns over 30d)
// - Momentum signal (trend slope via linear regression)
// - Mean-reversion component (Ornstein-Uhlenbeck tendency)
// - Monte Carlo simulation (500 paths, log-normal GBM with drift)
// - Drawdown / ATH proximity factor
// - Returns probability distribution + confidence bands
function ProbCalc({coin}) {
  const [target,  setTarget]  = useState('');
  const [period,  setPeriod]  = useState('14');
  const [result,  setResult]  = useState(null);
  const [loading, setLoading] = useState(false);
  const [histPrices, setHistPrices] = useState(null);
  const [histLoaded, setHistLoaded] = useState(false);

  // Fetch 30d history for this coin when mounted
  useEffect(()=>{
    if(!coin?.id) return;
    setHistLoaded(false);
    fetch('https://api.coingecko.com/api/v3/coins/'+coin.id+'/market_chart?vs_currency=usd&days=30&interval=daily')
      .then(r=>r.ok?r.json():null)
      .then(d=>{
        if(d?.prices) setHistPrices(d.prices.map(p=>p[1]));
        setHistLoaded(true);
      }).catch(()=>setHistLoaded(true));
  },[coin?.id]);

  // Normal CDF via Abramowitz & Stegun approximation (accurate to ±7.5e-8)
  function normCDF(x) {
    const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
    const sign = x<0?-1:1;
    x=Math.abs(x)/Math.SQRT2;
    const t=1/(1+p*x);
    const y=1-(((((a5*t+a4)*t+a3)*t+a2)*t+a1)*t)*Math.exp(-x*x);
    return 0.5*(1+sign*y);
  }

  function runCalc() {
    const tgt = parseFloat(target);
    if(!tgt||!coin?.price||tgt<=0) return;
    setLoading(true);
    setResult(null);

    setTimeout(()=>{
      const S0 = coin.price;
      const days = parseInt(period);
      const dir  = tgt > S0 ? 'up' : 'down';

      //  1. REALIZED VOLATILITY from historical prices 
      let dailyVol, dailyDrift, meanRevSpeed=0, meanRevLevel=S0;
      if(histPrices && histPrices.length>=5){
        const logRets = histPrices.slice(1).map((p,i)=>Math.log(p/histPrices[i]));
        const mean    = logRets.reduce((a,b)=>a+b,0)/logRets.length;
        const variance= logRets.reduce((a,b)=>a+(b-mean)**2,0)/logRets.length;
        dailyVol  = Math.sqrt(variance);
        dailyDrift= mean; // MLE estimate of daily drift

        // Mean reversion: estimate kappa using AR(1) on log-prices
        const lp = histPrices.map(p=>Math.log(p));
        let num=0,den=0,sumX=0,sumY=0;
        for(let i=1;i<lp.length;i++){ sumX+=lp[i-1];sumY+=lp[i]; }
        const mx=sumX/(lp.length-1),my=sumY/(lp.length-1);
        for(let i=1;i<lp.length;i++){ num+=(lp[i-1]-mx)*(lp[i]-my);den+=(lp[i-1]-mx)**2; }
        const phi=num/(den||1); // AR(1) coeff
        meanRevSpeed=Math.max(0,1-phi); // speed of mean reversion
        meanRevLevel=Math.exp(sumX/(lp.length-1)); // long-run mean
      } else {
        // Fallback: estimate from 24h/7d change if no history
        dailyVol  = Math.abs(coin.ch||2)/100 * 0.6;
        dailyDrift= (coin.ch7d||0)/7/100 * 0.5;
      }

      //  2. MOMENTUM SIGNAL via linear regression slope 
      let momentumAdj = 0;
      if(histPrices && histPrices.length>=7){
        const n=histPrices.length, xs=Array.from({length:n},(_,i)=>i);
        const xm=xs.reduce((a,b)=>a+b)/n, ym=histPrices.reduce((a,b)=>a+b)/n;
        let num2=0,den2=0;
        xs.forEach((x,i)=>{num2+=(x-xm)*(histPrices[i]-ym);den2+=(x-xm)**2;});
        const slope=num2/(den2||1); // price per day
        const slopePct=slope/S0;   // daily slope as fraction
        momentumAdj=Math.tanh(slopePct*20)*0.001; // bounded momentum contribution
      }

      //  3. MONTE CARLO — 1000 paths, Euler-Maruyama GBM 
      const PATHS = 1000;
      const dt    = 1; // 1 day per step
      const mu    = dailyDrift + momentumAdj;
      const sigma = Math.max(dailyVol, 0.005); // min 0.5% vol floor

      let hitCount=0, finalPrices=[];
      for(let p=0;p<PATHS;p++){
        let S=S0;
        let hit=false;
        for(let t=0;t<days;t++){
          // Box-Muller transform for normal random
          const u1=Math.random()||1e-10, u2=Math.random()||1e-10;
          const z=Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*u2);
          // Mean-reverting GBM (Vasicek-inspired)
          const revPull = meanRevSpeed * (Math.log(meanRevLevel/S)) * dt;
          const dLogS   = (mu - 0.5*sigma*sigma)*dt + sigma*Math.sqrt(dt)*z + revPull;
          S = S * Math.exp(dLogS);
          if(S<=0) { S=S0*0.001; break; }
          if(dir==='up'  && S>=tgt) { hit=true; break; }
          if(dir==='down'&& S<=tgt) { hit=true; break; }
        }
        if(hit) hitCount++;
        finalPrices.push(S);
      }

      //  4. ANALYTICAL CROSS-CHECK via Black-Scholes-like formula 
      const logRet  = Math.log(tgt/S0);
      const annMu   = mu * 365;
      const annSig  = sigma * Math.sqrt(365);
      const d1      = (logRet - (annMu - 0.5*annSig*annSig)*(days/365)) / (annSig * Math.sqrt(days/365));
      const bsProb  = dir==='up' ? normCDF(-d1) : normCDF(d1);

      // Blend MC and analytical (MC is better for path-dependent, BS for terminal)
      const mcProb  = hitCount/PATHS;
      const blended = 0.6*mcProb + 0.4*bsProb;
      const prob    = Math.round(Math.min(94,Math.max(3,blended*100)));

      //  5. DISTRIBUTION STATS 
      finalPrices.sort((a,b)=>a-b);
      const p10 = finalPrices[Math.floor(PATHS*0.10)];
      const p25 = finalPrices[Math.floor(PATHS*0.25)];
      const p50 = finalPrices[Math.floor(PATHS*0.50)];
      const p75 = finalPrices[Math.floor(PATHS*0.75)];
      const p90 = finalPrices[Math.floor(PATHS*0.90)];
      const meanFinal = finalPrices.reduce((a,b)=>a+b)/PATHS;

      //  6. SENTIMENT SIGNAL 
      const bullSignals = [
        coin.ch>0, coin.ch7d>0, coin.ch1h>0,
        (coin.ch||0)>2, (coin.ch7d||0)>5
      ].filter(Boolean).length;
      const sentiment = bullSignals>=4?'BULLISH':bullSignals<=1?'BEARISH':'NEUTRAL';
      const sentColor = sentiment==='BULLISH'?'rgba(130,255,150,.85)':sentiment==='BEARISH'?'rgba(255,100,80,.8)':'rgba(255,200,80,.7)';

      //  7. RISK RATING 
      const annVol = sigma*Math.sqrt(365)*100;
      const risk   = annVol<30?'LOW':annVol<70?'MEDIUM':annVol<120?'HIGH':'VERY HIGH';
      const riskColor = risk==='LOW'?'rgba(130,255,150,.7)':risk==='MEDIUM'?'rgba(255,200,80,.7)':risk==='HIGH'?'rgba(255,140,50,.8)':'rgba(255,80,80,.85)';

      setResult({
        prob, dir, tgt, days,
        pct: ((tgt-S0)/S0*100),
        p10,p25,p50,p75,p90, meanFinal,
        dailyVol: (sigma*100).toFixed(2),
        annVol:   (annVol).toFixed(1),
        drift:    (mu*100).toFixed(3),
        sentiment, sentColor,
        risk, riskColor,
        paths: PATHS,
        usedHistory: !!(histPrices && histPrices.length>=5),
      });
      setLoading(false);
    }, 120); // short delay so UI shows "calculating"
  }

  const mono7 = {fontFamily:'var(--mono)',fontSize:7,letterSpacing:2,color:'var(--w4)'};
  const mono9 = {fontFamily:'var(--mono)',fontSize:9,color:'var(--w)',letterSpacing:1};

  return (
    <div style={{marginTop:18,border:'1px solid rgba(255,255,255,.07)',background:'rgba(0,0,0,.25)'}}>
      {/* Header */}
      <div style={{padding:'12px 16px 10px',borderBottom:'1px solid rgba(255,255,255,.06)',
        display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontFamily:'var(--mono)',fontSize:7,letterSpacing:4,color:'var(--w4)',textTransform:'uppercase'}}>
           PRICE PROBABILITY ENGINE
        </div>
        <div style={{fontFamily:'var(--mono)',fontSize:6,color:'rgba(255,255,255,.2)',letterSpacing:1}}>
          {histLoaded ? (histPrices ? `30D DATA · ${histPrices.length} POINTS` : 'ESTIMATED') : 'LOADING HISTORY…'}
        </div>
      </div>

      {/* Note */}
      <div style={{padding:'10px 16px 0',fontFamily:'var(--mono)',fontSize:6.5,color:'rgba(255,255,255,.3)',
        letterSpacing:1,lineHeight:1.9,borderBottom:'1px solid rgba(255,255,255,.04)'}}>
        HOW IT WORKS · This calculator fetches real 30-day price history from CoinGecko and runs a 1,000-path
        Monte Carlo simulation using Geometric Brownian Motion with mean reversion. It estimates the
        probability of a coin reaching your target price within the chosen timeframe, based on how it
        actually moved in the past — including daily volatility, drift, and momentum. Results are blended
        with an analytical Black-Scholes approximation for terminal probability. Not financial advice.
      </div>

      {/* Inputs */}
      <div style={{padding:'14px 16px',display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-end'}}>
        <div style={{flex:1,minWidth:110}}>
          <div style={{...mono7,marginBottom:5,textTransform:'uppercase'}}>Target Price ({csym()})</div>
          <input value={target} onChange={e=>setTarget(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&runCalc()}
            placeholder={coin?fp(coin.price*1.15):'e.g. 100000'}
            style={{width:'100%',background:'none',border:'none',
              borderBottom:'1px solid rgba(255,255,255,.18)',color:'var(--w)',
              fontSize:14,fontWeight:300,padding:'5px 0',outline:'none',caretColor:'#fff'}}/>
        </div>
        <div style={{flex:1,minWidth:90}}>
          <div style={{...mono7,marginBottom:5,textTransform:'uppercase'}}>Timeframe</div>
          <select value={period} onChange={e=>setPeriod(e.target.value)}
            style={{width:'100%',background:'rgba(0,0,0,.6)',border:'none',
              borderBottom:'1px solid rgba(255,255,255,.18)',color:'var(--w)',
              fontSize:12,padding:'5px 0',outline:'none',appearance:'none',cursor:'pointer'}}>
            <option value="1">1 day</option>
            <option value="3">3 days</option>
            <option value="7">7 days</option>
            <option value="14">14 days</option>
            <option value="30">30 days</option>
            <option value="60">60 days</option>
            <option value="90">90 days</option>
          </select>
        </div>
        <button onClick={runCalc} disabled={loading||!histLoaded}
          style={{padding:'8px 18px',background:loading?'rgba(255,255,255,.1)':'var(--w)',
            border:'none',color:loading?'var(--w4)':'#000',fontFamily:'var(--sans)',
            fontWeight:700,fontSize:8,letterSpacing:2,cursor:loading?'default':'pointer',
            opacity:loading?0.6:1,transition:'all .15s',minWidth:100}}>
          {loading?'RUNNING…':'CALCULATE'}
        </button>
      </div>

      {/* Result panel */}
      {result && (
        <div style={{borderTop:'1px solid rgba(255,255,255,.07)'}}>
          {/* Main probability */}
          <div style={{padding:'16px 16px 12px',display:'flex',alignItems:'center',
            justifyContent:'space-between',borderBottom:'1px solid rgba(255,255,255,.05)'}}>
            <div>
              <div style={{...mono7,marginBottom:4,textTransform:'uppercase'}}>
                Probability of reaching {fp(result.tgt)} in {result.days}d
              </div>
              <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--w)',letterSpacing:1}}>
                {result.pct>=0?'+':''}{result.pct.toFixed(2)}% from current {fp(coin?.price)}
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontFamily:'var(--disp)',fontSize:52,
                color:result.dir==='up'?'rgba(130,255,150,.95)':'rgba(255,100,80,.9)',
                lineHeight:1,letterSpacing:2}}>
                {result.prob}%
              </div>
              <div style={{...mono7,color:result.dir==='up'?'rgba(130,255,150,.5)':'rgba(255,100,80,.5)'}}>
                {result.dir==='up'?'REACH TARGET ABOVE':'REACH TARGET BELOW'}
              </div>
            </div>
          </div>

          {/* Probability bar */}
          <div style={{padding:'10px 16px'}}>
            <div style={{height:6,background:'rgba(255,255,255,.06)',overflow:'hidden',position:'relative'}}>
              <div style={{position:'absolute',inset:0,width:result.prob+'%',
                background:`linear-gradient(90deg,${result.dir==='up'?'rgba(130,255,150,.3)':'rgba(255,100,80,.3)'},${result.dir==='up'?'rgba(130,255,150,.8)':'rgba(255,100,80,.75)'})`,
                transition:'width .6s cubic-bezier(.4,0,.2,1)'}}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:3,...mono7,fontSize:6}}>
              <span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span>
            </div>
          </div>

          {/* Price distribution */}
          <div style={{padding:'0 16px 14px'}}>
            <div style={{...mono7,marginBottom:8,textTransform:'uppercase',fontSize:6,letterSpacing:3}}>
              Price distribution after {result.days} days · 1,000 simulated paths
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:4}}>
              {[['P10',result.p10,'Bear case'],['P25',result.p25,'Low'],['P50',result.p50,'Median'],['P75',result.p75,'High'],['P90',result.p90,'Bull case']].map(([lbl,val,sub])=>(
                <div key={lbl} style={{padding:'8px 0',borderLeft:'1px solid rgba(255,255,255,.06)',paddingLeft:8}}>
                  <div style={{...mono7,fontSize:6,letterSpacing:2,color:'rgba(255,255,255,.25)'}}>{lbl} · {sub}</div>

  const items = [...coins, ...coins];
  return (
    <div className="tb-ticker">

function AppShell({user, setUser, view, children}) {
  const [navOpen,  setNavOpen]  = useState(false);
  const [settOpen, setSettOpen] = useState(false);
  const [coins,    setCoins]    = useState(null);
  const [priceErr, setPriceErr] = useState(null);
  const [priceSrc, setPriceSrc] = useState('');
  const [retryKey, setRetryKey] = useState(0);

  const [flash,     setFlash]     = useState(()=>isFlashMode());
  const [cacheAge,  setCacheAge]  = useState(0);
  const [rateLim,   setRateLim]   = useState(false);

  useEffect(() => {
    let stopped = false;
    const stop = startPriceUpdates(
      (newCoins, src, result) => {
        if (stopped) return;
        setCoins(newCoins);
        setPriceSrc(src);
        setPriceErr(null);
        setCacheAge(result ? result.ageMs : 0);
        setRateLim(result ? result.rateLimited : false);
      },
      (rateLimited) => {
        if (stopped) return;
        setCoins(prev => { if (!prev) setPriceErr(true); return prev; });
        setRateLim(rateLimited);
      }
    );
    return () => { stopped=true; stop(); };
  }, [retryKey, flash]);

  const toggleFlash = () => {
    const next = !flash;
    setFlashMode(next);
    setFlash(next);
    clearAllCache();
    setRetryKey(k=>k+1);
  };

  const go = id => {
    setNavOpen(false);
    if (id === view) return;
    const n = NAV_ITEMS.find(x => x.id===id);
    if (n) navigate(n.path);
  };

  const handleSignOut = () => { LS.clear(); navigate('/'); };

  if (priceErr) return <PriceError errors={priceErr} onRetry={()=>{setPriceErr(null);setRetryKey(k=>k+1);}}/>;
  if (!coins)   return <PriceLoading/>;

  const availCoins = user.tier==='free' ? coins.filter(c=>FREE_COINS.includes(c.sym)) : coins;

  return (
    <div className="app">
      {/* SIDEBAR */}
      <div className="sidebar">
        <div className="sb-head">
          <div className="sb-logo">KRYPTIV</div>
          <div className="sb-uid">ID <span>{user.kryptid}</span></div>

          <div className="nav-grp">Navigation</div>
          {NAV_ITEMS.map(n => (
            <div key={n.id} className={`nav-it${view===n.id?' on':''}`} onClick={()=>go(n.id)}>
              <MI n={n.icon}/>
              {n.lbl}
              {n.id==='ai' && <span className="nav-badge">FREE</span>}
            </div>
          ))}
        </nav>
        <div className="sb-foot">
          <div className="sb-hr" style={{marginBottom:8}}/>
          <div className="tier-row" onClick={()=>go('plans')}>
            <div className="tier-dot"/>
            <div className="tier-info">
              <div className="tier-lbl">Plan</div>
              <div className="tier-nm">{(user.tier||'free').toUpperCase()}</div>
            </div>
            <MI n="chevron_right" style={{fontSize:14,color:'var(--w4)'}}/>
          </div>
          <div className="sb-settings" onClick={()=>setSettOpen(true)}>
            <MI n="settings"/>Settings
          </div>
          <div className="sb-logout" onClick={handleSignOut}>
            <MI n="logout"/>{user.name}
          </div>
        </div>
      </div>

      {/* MAIN CONTENT */}

        <div className="topbar">
          <div className="tb-logo">KRYPTIV</div>
          <div className="tb-title">{NAV_ITEMS.find(n=>n.id===view)?.lbl}</div>

          <div className="tb-right">
            {rateLim && <div style={{fontFamily:'var(--mono)',fontSize:7,color:'rgba(255,140,0,.8)',letterSpacing:1,padding:'0 8px',border:'1px solid rgba(255,140,0,.3)'}}>RATE LIMITED · CACHED</div>}

function getVerdict(c) {
  const ch=c.ch||0, ch7=c.ch7d||0;
  const pos = (ch>2?1:0)+(ch7>5?1:0)+((c.ch1h||0)>0.5?1:0);
  if (pos>=2) return {rating:'BULLISH',   color:'rgba(130,255,150,.9)'};
  if (pos===0) return {rating:'BEARISH',  color:'rgba(255,100,80,.85)'};
  return {rating:'NEUTRAL', color:'rgba(255,200,80,.7)'};
}

function Markets({user, coins, availCoins, priceSrc}) {
  const isFree = user.tier==='free';
  const [pinned, setPinned] = useState(function() {
    try { return JSON.parse(localStorage.getItem('kryptiv_pinned')||'["BTC","SOL"]'); } catch { return ['BTC','SOL']; }
  });
  const togglePin = function(sym) {
    setPinned(function(prev) {
      var next = prev.includes(sym) ? prev.filter(function(s){return s!==sym;}) : prev.length < (isFree?2:99) ? prev.concat([sym]) : prev;
      localStorage.setItem('kryptiv_pinned', JSON.stringify(next));
      return next;
    });
  };
  const [query,   setQuery]   = useState('');
  const [detail,  setDetail]  = useState(null); // coin object when viewing detail
  const [tab,     setTab]     = useState('all');

  // PWA back handling
  const openDetail = (c) => {
    try { history.pushState({coin:c.sym},'',location.pathname+'#'+c.sym.toLowerCase()); } catch(e){}
    setDetail(c);
  };
  const closeDetail = () => {
    // Clear hash cleanly without full navigation
    try { history.replaceState(null,'',location.pathname+location.search); } catch(e){}
    setDetail(null);
  };
  useEffect(()=>{
    const onPop = ()=>setDetail(null);
    window.addEventListener('popstate',onPop);
    return ()=>window.removeEventListener('popstate',onPop);
  },[]);

  const filtered = useMemo(()=>{
    let list = coins || [];
    if (tab==='top') list = [...list].sort((a,b)=>(b.ch||0)-(a.ch||0)).slice(0,5);
    if (tab==='down') list = [...list].sort((a,b)=>(a.ch||0)-(b.ch||0)).slice(0,5);
    if (query) list = list.filter(c=>c.sym.includes(query.toUpperCase())||c.name.toLowerCase().includes(query.toLowerCase()));
    return list;
  }, [coins, tab, query]);

  if (!coins) return null;

  //  If coin detail is open, show the full in-page sub-view 
  if (detail) {
    // Sync coin data with latest prices
    const live = coins.find(c=>c.id===detail.id)||detail;
    return <CoinDetailPage coin={live} onBack={closeDetail}/>;
  }

  return (
    <div className="scr">
      <div className="s-lbl">
        <MI n="candlestick_chart"/>LIVE MARKETS
        <span className="live-badge" style={{marginLeft:'auto'}}>
          <span className="live-dot"/>LIVE · {priceSrc}
        </span>
      </div>

      {/* Search */}
      <div style={{display:'flex',alignItems:'center',gap:8,
        borderBottom:'1px solid rgba(255,255,255,.05)',marginBottom:14,paddingBottom:10}}>
        <MI n="search" style={{fontSize:15,color:'var(--w4)'}}/>
        <input
          style={{flex:1,background:'none',border:'none',color:'var(--w)',fontSize:13,
            fontWeight:300,outline:'none',caretColor:'#fff'}}
          placeholder="Search coins…"
          value={query}
          onChange={e=>setQuery(e.target.value)}
        />
        {query && <MI n="close" style={{fontSize:15,color:'var(--w4)',cursor:'pointer'}} onClick={()=>setQuery('')}/>}
      </div>

      {/* Tabs */}
      <div className="tabs">
        {[['all','All'],['top','Top Gainers'],['down','Top Losers']].map(([id,lbl])=>(
          <div key={id} className={`tab${tab===id?' on':''}`} onClick={()=>setTab(id)}>{lbl}</div>
        ))}
      </div>

      {/* Table header */}
      <div className="mkt-table-header">
        <div className="mth-rank">#</div>
        <div className="mth-name">COIN</div>
        <div className="mth-spark">7D</div>
        <div className="mth-price">PRICE</div>
        <div className="mth-ch">24H</div>
      </div>

      {filtered.map((c,i)=>{
        const locked = isFree && !FREE_COINS.includes(c.sym);
        const row = (
          <div key={c.id} className="coin-line"
            onClick={()=>!locked && openDetail(c)}
            style={{cursor:locked?'default':'pointer'}}>
            {!locked&&<span className={'hl-star'+(pinned.includes(c.sym)?' on':'')}
              onClick={e=>{e.stopPropagation();togglePin(c.sym);}}></span>}
            {locked&&<span className="hl-star" style={{opacity:.3}}></span>}
            <div className="c-rank">{c.rank||i+1}</div>
            <div style={{flex:1,display:'flex',alignItems:'center',gap:8,minWidth:0}}>
              <div className="c-sym">{c.sym}</div>
              <div className="c-nm">{c.name}</div>
            </div>
            <div className="c-spark"><Spark ch={c.ch}/></div>
            <div className="c-pr">{fp(c.price)}</div>
            <div className={`c-ch ${(c.ch||0)>=0?'up':'dn'}`}>
              {(c.ch||0)>=0?'':''}{Math.abs(c.ch||0).toFixed(2)}%
            </div>
          </div>
        );
        if (!locked) return row;
        return (
          <div key={c.id} className="pro-blur-wrap">
            <div className="pro-blur-content">{row}</div>
            <div className="pro-lock-ov">
              <div className="pro-lock-left">
                <MI n="lock" className="pro-lock-icon"/>
                <div className="pro-lock-lbl">BUDGET & PRO</div>
              </div>
              <button className="pro-lock-btn" onClick={()=>navigate('/Plans/')}>UPGRADE</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Page() {
  const [u, setU] = React.useState(() => LS.get());
  React.useEffect(() => {
    if (!u?.kryptid) { window.location.href = '/'; }
  }, []);
  if (!u?.kryptid) return null;
  return (<>
    <div className="wall clear"/>
    <AppShell user={u} setUser={setU} view="markets">
      <Markets user={u}/>
    </AppShell>
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Page/>);

</script>
</body>
</html>
