<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SUSG · Social Update Screen Generator · KRYPTIV</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --w: #fff; --w2:rgba(255,255,255,.88); --w3:rgba(255,255,255,.6); --w4:rgba(255,255,255,.36);
  --border:rgba(255,255,255,.1); --border2:rgba(255,255,255,.2);
  --mono:'DM Mono',monospace; --sans:'Space Grotesk',sans-serif; --disp:'Bebas Neue',sans-serif;
}
html,body { background:#0a0a0a; color:#fff; font-family:var(--sans); min-height:100vh; }

/* ── PAGE LAYOUT ── */
.page { max-width:1100px; margin:0 auto; padding:32px 24px 60px; }
.hdr { display:flex; align-items:baseline; gap:12px; margin-bottom:4px; }
.hdr-logo { font-family:var(--disp); font-size:32px; letter-spacing:3px; }
.hdr-tool { font-family:var(--mono); font-size:8px; letter-spacing:4px; color:var(--w4); text-transform:uppercase; }
.hdr-sub   { font-family:var(--mono); font-size:7px; letter-spacing:3px; color:var(--w4); text-transform:uppercase; margin-bottom:32px; }

/* ── TWO-COL ── */
.cols { display:grid; grid-template-columns:280px 1fr; gap:28px; }
@media(max-width:760px){ .cols { grid-template-columns:1fr; } }

/* ── CONTROLS ── */
.panel { background:rgba(255,255,255,.02); border:1px solid var(--border); padding:20px; }
.panel-title { font-family:var(--mono); font-size:7px; letter-spacing:4px; text-transform:uppercase; color:var(--w4); margin-bottom:16px; }
.ctrl { margin-bottom:16px; }
.ctrl-lbl { font-family:var(--mono); font-size:7px; letter-spacing:3px; text-transform:uppercase; color:var(--w4); margin-bottom:6px; display:block; }
.ctrl-in { width:100%; background:none; border:none; border-bottom:1px solid var(--border); color:var(--w); font-family:var(--sans); font-size:13px; font-weight:300; padding:7px 0; outline:none; caret-color:#fff; }
.ctrl-in:focus { border-bottom-color:var(--border2); }
.ctrl-in::placeholder { color:rgba(255,255,255,.2); }
.ctrl-ta { width:100%; background:rgba(255,255,255,.03); border:1px solid var(--border); color:var(--w); font-family:var(--sans); font-size:12px; font-weight:300; padding:9px 10px; outline:none; caret-color:#fff; resize:vertical; min-height:60px; line-height:1.6; }
.ctrl-ta:focus { border-color:var(--border2); }
.ctrl-sel { width:100%; background:rgba(0,0,0,.6); border:none; border-bottom:1px solid var(--border); color:var(--w); font-family:var(--mono); font-size:10px; padding:7px 0; outline:none; cursor:pointer; }
.ctrl-sel option { background:#0a0a0a; }
.hr { height:1px; background:rgba(255,255,255,.06); margin:16px 0; }

/* Color row */
.color-row { display:flex; gap:5px; flex-wrap:wrap; margin-top:5px; }
.sw { width:24px; height:24px; cursor:pointer; border:2px solid transparent; transition:border-color .12s; flex-shrink:0; }
.sw.on { border-color:#fff; }

/* Buttons */
.btn-primary { width:100%; padding:12px; background:#fff; color:#000; border:none; font-family:var(--sans); font-weight:700; font-size:9px; letter-spacing:3px; text-transform:uppercase; cursor:pointer; transition:opacity .15s; margin-top:6px; }
.btn-primary:hover { opacity:.88; }
.btn-ghost { width:100%; padding:10px; background:none; border:1px solid var(--border); color:var(--w3); font-family:var(--mono); font-size:8px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .15s; margin-top:5px; }
.btn-ghost:hover { border-color:var(--border2); color:var(--w); }

/* Icon picker */
.icon-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:4px; max-height:120px; overflow-y:auto; margin-top:6px; }
.icon-opt { width:36px; height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:1px solid transparent; font-size:20px; transition:all .12s; background:rgba(255,255,255,.03); }
.icon-opt:hover { border-color:var(--border2); background:rgba(255,255,255,.07); }
.icon-opt.on { border-color:var(--w2); background:rgba(255,255,255,.1); }
.icon-opt span { font-family:'Material Icons Sharp','Material Icons',sans-serif; font-feature-settings:'liga'; }

/* ── PREVIEW AREA ── */
.preview-col { display:flex; flex-direction:column; gap:16px; }
.preview-lbl { font-family:var(--mono); font-size:7px; letter-spacing:4px; color:var(--w4); text-transform:uppercase; }
.canvas-wrap { position:relative; }
canvas#c { display:block; width:100%; height:auto; border:1px solid rgba(255,255,255,.08); box-shadow:0 8px 40px rgba(0,0,0,.7); }
.preview-dims { font-family:var(--mono); font-size:7px; color:var(--w4); margin-top:6px; }

/* Format tabs */
.fmt-tabs { display:flex; gap:6px; flex-wrap:wrap; }
.fmt-tab { padding:5px 12px; background:none; border:1px solid var(--border); color:var(--w4); font-family:var(--mono); font-size:7px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .12s; }
.fmt-tab.on { border-color:var(--border2); color:var(--w2); background:rgba(255,255,255,.05); }

/* File upload area for custom icon */
.upload-zone { border:1px dashed var(--border); padding:12px; text-align:center; cursor:pointer; transition:all .12s; font-family:var(--mono); font-size:7px; color:var(--w4); letter-spacing:2px; }
.upload-zone:hover { border-color:var(--border2); }
</style>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp" rel="stylesheet">
</head>
<body>
<div class="page">
  <div class="hdr">
    <div class="hdr-logo">SUSG</div>
    <div class="hdr-tool">Social Update Screen Generator</div>
  </div>
  <div class="hdr-sub">KRYPTIV · Create update banners for social media</div>

  <div class="cols">
    <!-- ── CONTROLS ── -->
    <div>
      <div class="panel">
        <div class="panel-title">Content</div>

        <div class="ctrl">
          <label class="ctrl-lbl">App Name</label>
          <input class="ctrl-in" id="appName" value="KRYPTIV" oninput="render()">
        </div>

        <div class="ctrl">
          <label class="ctrl-lbl">Version</label>
          <input class="ctrl-in" id="ver" value="0.2.0" placeholder="0.0.1" oninput="render()">
          <div style="font-family:var(--mono);font-size:7px;color:var(--w4);margin-top:4px;letter-spacing:1px;">e.g. 0.1.0 · 0.2.1 · 1.0.0</div>
        </div>

        <div class="ctrl">
          <label class="ctrl-lbl">Update Tagline</label>
          <textarea class="ctrl-ta" id="tagline" oninput="render()">LIVE NEWS · AI ANALYSIS
NOW AVAILABLE</textarea>
        </div>

        <div class="ctrl">
          <label class="ctrl-lbl">Update Notes (one per line)</label>
          <textarea class="ctrl-ta" id="notes" rows="5" oninput="render()">Real-time crypto news feed
AI analysis presets
Mobile navigation upgrade
Performance improvements</textarea>
        </div>
      </div>

      <div class="panel" style="margin-top:12px;">
        <div class="panel-title">Style</div>

        <div class="ctrl">
          <label class="ctrl-lbl">Accent Color</label>
          <div class="color-row" id="swatches"></div>
        </div>

        <div class="ctrl">
          <label class="ctrl-lbl">Layout</label>
          <select class="ctrl-sel" id="layout" onchange="render()">
            <option value="standard" selected>Standard — earth right, text left</option>
            <option value="split">Split — earth left half, content right</option>
            <option value="minimal">Minimal — dark, no earth</option>
            <option value="centered">Centered — earth bg, text center</option>
          </select>
        </div>

        <div class="hr"></div>

        <div class="panel-title" style="margin-top:0;">App Icon</div>

        <div class="ctrl">
          <label class="ctrl-lbl">Material Icon</label>
          <div class="icon-grid" id="iconGrid"></div>
        </div>

        <div class="ctrl" style="margin-top:8px;">
          <label class="ctrl-lbl">Or upload custom icon (PNG)</label>
          <div class="upload-zone" id="uploadZone" onclick="document.getElementById('iconFile').click()">
            CLICK TO UPLOAD PNG ICON
          </div>
          <input type="file" id="iconFile" accept="image/png,image/jpeg,image/svg+xml" style="display:none">
        </div>
      </div>

      <div style="margin-top:12px;">
        <button class="btn-primary" onclick="exportPNG()">EXPORT PNG</button>
        <button class="btn-ghost" onclick="copyToClipboard()">COPY TO CLIPBOARD</button>
      </div>
    </div>

    <!-- ── PREVIEW ── -->
    <div class="preview-col">
      <div>
        <div class="preview-lbl" style="margin-bottom:8px;">Format</div>
        <div class="fmt-tabs" id="fmtTabs"></div>
      </div>
      <div>
        <div class="preview-lbl" style="margin-bottom:8px;">Preview</div>
        <div class="canvas-wrap">
          <canvas id="c"></canvas>
        </div>
        <div class="preview-dims" id="dims"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════
   SUSG ENGINE
   Uses: https://i.ibb.co/5X6swM2n/myersalex216-planet-2638122-1920.jpg
══════════════════════════════════════════════════ */

const IMG_URL = 'https://i.ibb.co/5X6swM2n/myersalex216-planet-2638122-1920.jpg';

const FORMATS = [
  { id:'banner',    label:'Banner 800×300',      w:800,  h:300  },
  { id:'wide',      label:'Wide 1200×400',        w:1200, h:400  },
  { id:'square',    label:'Square 1080×1080',     w:1080, h:1080 },
  { id:'story',     label:'Story 1080×1920',      w:1080, h:1920 },
  { id:'twitter',   label:'Twitter Card 1200×628',w:1200, h:628  },
];

const COLORS = [
  '#ffffff','#a8f0c0','#a0c8ff','#ffd080',
  '#ffb0b0','#d0a8ff','#80ffe8','#fff080',
];

const ICONS = [
  'bolt','show_chart','candlestick_chart','currency_bitcoin',
  'trending_up','analytics','account_balance_wallet','smart_toy',
  'rocket_launch','star','verified','workspace_premium',
  'security','shield','diamond','local_fire_department',
];

let selectedFmt   = 'banner';
let selectedColor = '#ffffff';
let selectedIcon  = 'bolt';
let customIconImg = null;
let earthImg      = null;
let earthReady    = false;

// ── Build UI ──
function buildSwatches() {
  const el = document.getElementById('swatches');
  COLORS.forEach(hex => {
    const sw = document.createElement('div');
    sw.className = 'sw' + (hex === selectedColor ? ' on' : '');
    sw.style.background = hex;
    sw.onclick = () => { selectedColor = hex; buildSwatches(); render(); };
    el.appendChild(sw);
  });
}

function buildIconGrid() {
  const el = document.getElementById('iconGrid');
  el.innerHTML = '';
  // None option
  const none = document.createElement('div');
  none.className = 'icon-opt' + (selectedIcon === '' ? ' on' : '');
  none.title = 'No icon';
  none.innerHTML = '<span style="font-size:12px;font-family:var(--mono);color:var(--w4)">—</span>';
  none.onclick = () => { selectedIcon = ''; customIconImg = null; buildIconGrid(); render(); };
  el.appendChild(none);
  ICONS.forEach(ic => {
    const d = document.createElement('div');
    d.className = 'icon-opt' + (selectedIcon === ic ? ' on' : '');
    d.title = ic;
    d.innerHTML = `<span class="material-icons-sharp">${ic}</span>`;
    d.onclick = () => { selectedIcon = ic; customIconImg = null; buildIconGrid(); render(); };
    el.appendChild(d);
  });
}

function buildFmtTabs() {
  const el = document.getElementById('fmtTabs');
  FORMATS.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'fmt-tab' + (f.id === selectedFmt ? ' on' : '');
    btn.textContent = f.label;
    btn.onclick = () => { selectedFmt = f.id; buildFmtTabs(); render(); };
    el.appendChild(btn);
  });
}

// ── Custom Icon Upload ──
document.getElementById('iconFile').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => { customIconImg = img; selectedIcon = '__custom'; buildIconGrid(); render(); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// ── Load Earth ──
function loadEarth() {
  earthImg = new Image();
  earthImg.crossOrigin = 'anonymous';
  earthImg.onload = () => { earthReady = true; render(); };
  earthImg.onerror = () => { earthReady = false; render(); };
  earthImg.src = IMG_URL + '?cb=' + Date.now(); // cache bust for CORS
}

// ── MAIN RENDER ──
function render() {
  const fmt    = FORMATS.find(f => f.id === selectedFmt);
  const {w, h} = fmt;
  const canvas = document.getElementById('c');
  canvas.width  = w;
  canvas.height = h;

  // Scale for display
  const maxW = Math.min(document.querySelector('.preview-col').offsetWidth || 700, 800);
  const scale = Math.min(maxW / w, 500 / h, 1);
  canvas.style.width  = Math.round(w * scale) + 'px';
  canvas.style.height = Math.round(h * scale) + 'px';
  document.getElementById('dims').textContent = w + ' × ' + h + ' px · ' + fmt.label;

  const ctx = canvas.getContext('2d');
  const acc = hexToRgb(selectedColor);
  const isWide = w > h * 1.5; // banner/wide/twitter
  const pad  = Math.round(w * 0.055);
  const padV = Math.round(h * 0.14);

  // ── BG ──
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);

  // ── EARTH ──
  const layout = document.getElementById('layout').value;
  if (earthReady && earthImg && layout !== 'minimal') {
    ctx.save();
    if (layout === 'standard' || layout === 'split') {
      // earth on the right
      const aspect = earthImg.naturalWidth / earthImg.naturalHeight;
      const eh = h * (isWide ? 1.6 : 1.3);
      const ew = eh * aspect;
      const ex = layout === 'split' ? 0 : w - ew * 0.45;
      const ey = (h - eh) / 2;
      ctx.globalAlpha = layout === 'split' ? 0.55 : 0.48;
      ctx.drawImage(earthImg, ex, ey, ew, eh);
    } else if (layout === 'centered') {
      const aspect = earthImg.naturalWidth / earthImg.naturalHeight;
      const ew = Math.max(w, h * aspect) * 1.1;
      const eh = ew / aspect;
      const ex = (w - ew) / 2, ey = (h - eh) / 2;
      ctx.globalAlpha = 0.38;
      ctx.drawImage(earthImg, ex, ey, ew, eh);
    }
    ctx.restore();
  }

  // ── GRADIENT OVERLAY ──
  ctx.save();
  if (layout === 'standard' || layout === 'split') {
    const stops = layout === 'split'
      ? [[0,'rgba(0,0,0,.1)'],[0.45,'rgba(0,0,0,.55)'],[0.5,'rgba(0,0,0,.92)'],[1,'rgba(0,0,0,.98)']]
      : [[0,'rgba(0,0,0,.96)'],[0.5,'rgba(0,0,0,.88)'],[0.75,'rgba(0,0,0,.4)'],[1,'rgba(0,0,0,.1)']];
    const grd = ctx.createLinearGradient(0, 0, w, 0);
    stops.forEach(([s,c]) => grd.addColorStop(s, c));
    ctx.fillStyle = grd;
  } else if (layout === 'centered') {
    const grd = ctx.createRadialGradient(w/2,h/2,0, w/2,h/2,Math.max(w,h)*0.65);
    grd.addColorStop(0, 'rgba(0,0,0,.08)');
    grd.addColorStop(0.55, 'rgba(0,0,0,.65)');
    grd.addColorStop(1, 'rgba(0,0,0,.96)');
    ctx.fillStyle = grd;
  } else {
    ctx.fillStyle = 'rgba(0,0,0,.04)';
  }
  ctx.fillRect(0, 0, w, h);
  ctx.restore();

  // ── TOP LINE ──
  ctx.fillStyle = `rgba(${acc.r},${acc.g},${acc.b},.6)`;
  ctx.fillRect(0, 0, w, Math.max(2, Math.round(h * 0.006)));

  const cx = layout === 'centered' ? w/2 : layout === 'split' ? w * 0.55 : pad;
  const align = layout === 'centered' ? 'center' : 'left';

  // ── ICON ──
  const iconSize = Math.round(h * (isWide ? 0.28 : 0.14));
  const iconY = padV;
  let iconEndX = cx;

  if (selectedIcon === '__custom' && customIconImg) {
    const iw = iconSize, ih = iconSize;
    const ix = layout === 'centered' ? w/2 - iw/2 : cx;
    ctx.save();
    ctx.globalAlpha = 0.92;
    ctx.drawImage(customIconImg, ix, iconY, iw, ih);
    ctx.restore();
    iconEndX = ix + iw + iconSize * 0.4;
  } else if (selectedIcon && selectedIcon !== '__custom') {
    // Draw material icon via off-screen canvas text
    ctx.save();
    ctx.font = `${iconSize}px 'Material Icons Sharp', 'Material Icons'`;
    ctx.fillStyle = `rgba(${acc.r},${acc.g},${acc.b},.85)`;
    ctx.textAlign = align === 'center' ? 'center' : 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(selectedIcon, align === 'center' ? w/2 : cx, iconY);
    ctx.restore();
    if (align !== 'center') iconEndX = cx + iconSize + Math.round(iconSize * 0.35);
  }

  // ── APP NAME (top-left or top for non-center) ──
  const appName = document.getElementById('appName').value || 'KRYPTIV';
  const version = document.getElementById('ver').value || '0.0.1';
  const nmSize  = Math.round(h * (isWide ? 0.22 : 0.16));
  const nmY     = align === 'center'
    ? iconY + iconSize + Math.round(h*0.04)
    : iconY + (iconSize - nmSize)/2 + nmSize * 0.05;

  ctx.save();
  ctx.font = `${nmSize}px 'Bebas Neue', sans-serif`;
  ctx.fillStyle = `rgba(${acc.r},${acc.g},${acc.b},1)`;
  ctx.textAlign = align;
  ctx.textBaseline = 'top';
  ctx.fillText(appName.toUpperCase(), align === 'center' ? w/2 : iconEndX, nmY);
  ctx.restore();

  // ── TAGLINE ──
  const tagRaw  = document.getElementById('tagline').value || '';
  const tagLines = tagRaw.split('\n').filter(Boolean);
  const tagSize  = Math.round(h * (isWide ? 0.13 : 0.095));
  const tagStartY = align === 'center'
    ? nmY + nmSize + Math.round(h * 0.05)
    : nmY + nmSize + Math.round(h * 0.04);

  ctx.save();
  ctx.font = `700 ${tagSize}px 'Bebas Neue', sans-serif`;
  ctx.fillStyle = `rgba(${acc.r},${acc.g},${acc.b},1)`;
  ctx.textAlign = align;
  ctx.textBaseline = 'top';
  tagLines.forEach((line, i) => {
    ctx.fillText(line.toUpperCase(), align === 'center' ? w/2 : cx, tagStartY + i * tagSize * 1.1);
  });
  ctx.restore();

  // ── UPDATE NOTES ──
  const notesRaw  = document.getElementById('notes').value || '';
  const noteLines = notesRaw.split('\n').filter(Boolean);
  const noteSize  = Math.round(h * (isWide ? 0.07 : 0.055));
  const noteStartY = tagStartY + tagLines.length * tagSize * 1.1 + Math.round(h * 0.04);

  ctx.save();
  ctx.font = `300 ${noteSize}px 'Space Grotesk', sans-serif`;
  ctx.textAlign = align;
  ctx.textBaseline = 'top';
  noteLines.forEach((line, i) => {
    const alpha = Math.max(0.3, 0.65 - i * 0.08);
    ctx.fillStyle = `rgba(${acc.r},${acc.g},${acc.b},${alpha})`;
    const prefix = align === 'center' ? '' : '· ';
    ctx.fillText(prefix + line, align === 'center' ? w/2 : cx, noteStartY + i * noteSize * 1.75);
  });
  ctx.restore();

  // ── VERSION (bottom left) ──
  const verSize = Math.round(h * (isWide ? 0.065 : 0.055));
  ctx.save();
  ctx.font = `400 ${verSize}px 'DM Mono', monospace`;
  ctx.fillStyle = `rgba(${acc.r},${acc.g},${acc.b},.4)`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'bottom';
  ctx.fillText('v' + version, pad, h - Math.round(h * 0.06));
  ctx.restore();

  // ── KRYPTIV WATERMARK (bottom right) ──
  const wmSize = Math.round(h * (isWide ? 0.06 : 0.05));
  ctx.save();
  ctx.font = `${wmSize}px 'Bebas Neue', sans-serif`;
  ctx.fillStyle = `rgba(255,255,255,.18)`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('KRYPTIV', w - pad, h - Math.round(h * 0.06));
  ctx.restore();

  // ── BOTTOM LINE ──
  ctx.fillStyle = `rgba(${acc.r},${acc.g},${acc.b},.25)`;
  ctx.fillRect(0, h - Math.max(2, Math.round(h * 0.006)), w, Math.max(2, Math.round(h * 0.006)));
}

function hexToRgb(hex) {
  return {
    r: parseInt(hex.slice(1,3),16),
    g: parseInt(hex.slice(3,5),16),
    b: parseInt(hex.slice(5,7),16),
  };
}

function exportPNG() {
  render();
  const c    = document.getElementById('c');
  const name = (document.getElementById('appName').value||'KRYPTIV').replace(/\s+/g,'_');
  const ver  = document.getElementById('ver').value || '0.0.0';
  const fmt  = selectedFmt;
  const link = document.createElement('a');
  link.download = `${name}_update_v${ver}_${fmt}.png`;
  link.href = c.toDataURL('image/png');
  link.click();
}

async function copyToClipboard() {
  render();
  const c = document.getElementById('c');
  c.toBlob(async blob => {
    try {
      await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
      const btn = document.querySelectorAll('.btn-ghost')[0];
      const orig = btn.textContent;
      btn.textContent = 'COPIED ✓';
      setTimeout(() => btn.textContent = orig, 2000);
    } catch { const btn=document.querySelectorAll('.btn-ghost')[0];const o=btn.textContent;btn.textContent='USE EXPORT PNG';setTimeout(()=>btn.textContent=o,2500); }
  }, 'image/png');
}

// ── INIT ──
buildSwatches();
buildIconGrid();
buildFmtTabs();
loadEarth();
render();
window.addEventListener('resize', render);
</script>
</body>
</html>
