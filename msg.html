<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYPTIV</title>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap"></noscript>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: white;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            letter-spacing: 0.2em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>K R Y P T I V</h1>
        <p>Invest Smart. Trade Smarter.</p>
        <div id="status-message"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Hardcoded messages for each status
            const statusMessages = {
                "online": "",
                "maintenance": "We’re currently performing maintenance. We’ll be back shortly.",
                "update": "We’re currently working on a new update. See you soon!",
                "offline": "We’re temporarily offline. Please check back later.",
                "error": "Something went wrong. We’re working to fix it.",
            };

            // Fetch the state.txt file from GitHub
            fetch('https://raw.githubusercontent.com/kryptivapp/kryptivapp.github.io/refs/heads/main/state.txt')
                .then(response => response.text())
                .then(text => {
                    // Extract the current status (first line, trimmed and lowercase)
                    const lines = text.trim().split('\n');
                    const currentStatus = lines[0].trim().toLowerCase();

                    // Log the status for debugging
                    console.log("Current status:", currentStatus);

                    // Display the message if the status is recognized
                    if (currentStatus && statusMessages[currentStatus]) {
                        document.getElementById("status-message").innerHTML = `
                            <p>${statusMessages[currentStatus]}</p>
                        `;
                    } else {
                        document.getElementById("status-message").innerHTML = `
                            <p>Something went wrong. Please try again later.</p>
                        `;
                    }
                })
                .catch(error => {
                    console.error('Error fetching status:', error);
                    document.getElementById("status-message").innerHTML = `
                        <p>Something went wrong. Please try again later.</p>
                    `;
                });
        });
    </script>
</body>
</html>
