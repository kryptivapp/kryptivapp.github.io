<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Message</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        #status-message {
            text-align: center;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div id="status-message"></div>

    <script>
        // Fetch the state.txt file from GitHub
        fetch('https://raw.githubusercontent.com/kryptivapp/kryptivapp.github.io/refs/heads/main/state.txt')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok ' + response.statusText);
                }
                return response.text();
            })
            .then(data => {
                // Trim any whitespace from the fetched data
                const currentState = data.trim();
                const states = {
                    "!ONLINE": "",
                    "!MAINTENANCE": "We’re currently performing maintenance. We’ll be back shortly.",
                    "!UPDATE": "We’re currently working on a new update. See you soon!",
                    "!OFFLINE": "We’re temporarily offline. Please check back later.",
                    "!ERROR": "Something went wrong. We’re working to fix it.",
                };

                if (currentState && currentState !== "!ONLINE") {
                    const statusMessageElement = document.getElementById("status-message");
                    if (statusMessageElement) {
                        statusMessageElement.innerHTML = `<p>${states[currentState]}</p>`;
                    } else {
                        console.error("Element with ID 'status-message' not found.");
                    }
                }
            })
            .catch(error => {
                console.error('There was a problem with the fetch operation:', error);
                const statusMessageElement = document.getElementById("status-message");
                if (statusMessageElement) {
                    statusMessageElement.innerHTML = `<p>Something went wrong. We’re working to fix it.</p>`;
                }
            });
    </script>
</body>
</html>
