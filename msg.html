<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYPTIV</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: white;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            letter-spacing: 0.2em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>K R Y P T I V</h1>
        <p>Invest Smart. Trade Smarter.</p>
        <div id="status-message"></div>
    </div>

    <script>
        // Define possible states and their messages
        const states = {
            "!ONLINE": "", // No message shown if online
            "!MAINTENANCE": "We’re currently performing maintenance. We’ll be back shortly.",
            "!UPDATE": "We’re currently working on a new update. See you soon!",
            "!OFFLINE": "We’re temporarily offline. Please check back later.",
            "!ERROR": "Something went wrong. We’re working to fix it.",
        };

        // Fetch the state.txt file
        fetch('state.txt')
            .then(response => response.text())
            .then(text => {
                // Extract the current state (first line)
                const lines = text.trim().split('\n');
                const currentState = lines[0].trim();

                // Display the message if not "!ONLINE"
                if (currentState !== "!ONLINE") {
                    document.getElementById("status-message").innerHTML = `
                        <p>${states[currentState]}</p>
                    `;
                }
            })
            .catch(error => {
                console.error('Error fetching state:', error);
                document.getElementById("status-message").innerHTML = `
                    <p>Something went wrong. Please try again later.</p>
                `;
            });
    </script>
</body>
</html>
