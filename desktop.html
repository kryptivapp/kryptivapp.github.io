<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYPTIV</title>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #ffffff;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 0.3em;
            margin-bottom: 25px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin: 10px 0;
        }

        .hint {
            margin-top: 20px;
            opacity: 0;
            transition: opacity 0.5s ease;
            font-size: 1rem;
        }

        .show {
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>K R Y P T I V</h1>

    <p><strong>We’re setting things up.</strong></p>
    <p>Please enable your internet connection.</p>

    <div id="hint" class="hint">
        If the app doesn’t display in 3 seconds, please check your network or permissions (--no-sandbox).
    </div>
</div>

<script>
    // Show hint after 3 seconds
    setTimeout(() => {
        document.getElementById("hint").classList.add("show");
    }, 3000);
</script>

</body>
</html>
