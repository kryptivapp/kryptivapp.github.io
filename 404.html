<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KRYPTIV · 404</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--mono:'DM Mono',monospace;--sans:'Space Grotesk',sans-serif;--disp:'Bebas Neue',sans-serif;}
html,body{background:#000;color:#fff;font-family:var(--sans);height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.bg{position:fixed;inset:-4%;background:url('https://i.ibb.co/5X6swM2n/myersalex216-planet-2638122-1920.jpg') center/cover;filter:blur(22px) brightness(.28);z-index:0;}
.bg::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.6);}
.content{position:relative;z-index:1;padding:32px;}
.num{font-family:var(--disp);font-size:clamp(80px,20vw,160px);letter-spacing:-4px;line-height:1;opacity:.12;}
.title{font-family:var(--disp);font-size:clamp(28px,6vw,48px);letter-spacing:4px;margin-top:-20px;margin-bottom:8px;}
.sub{font-family:var(--mono);font-size:9px;letter-spacing:4px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:32px;}
.btn{padding:12px 28px;background:#fff;color:#000;border:none;font-family:var(--sans);font-weight:700;font-size:9px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-block;margin:4px;}
.btn:hover{opacity:.85;}
.btn.ghost{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);}
.btn.ghost:hover{border-color:rgba(255,255,255,.4);color:#fff;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="content">
  <div class="num">404</div>
  <div class="title">PAGE NOT FOUND</div>
  <div class="sub">This page doesn't exist or moved</div>
  <div>
    <a class="btn" id="homeBtn" href="/">GO HOME</a>
    <a class="btn ghost" href="/Dashboard/">DASHBOARD</a>
  </div>
</div>
<script>
// If user is logged in, send to dashboard; else auth
try {
  const u = JSON.parse(localStorage.getItem('kryptiv_u')||'null');
  if (u?.kryptid) document.getElementById('homeBtn').href = '/Dashboard/';
} catch {}
</script>
</body>
</html>
